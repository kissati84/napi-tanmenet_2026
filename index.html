<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi tanmenet — Közigazgatási szakvizsga 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --kremes: #faf6ed;
  --kremes-melyebb: #f3ebd9;
  --pergamen: #ede2c8;
  --tinta: #1a1f2e;
  --tinta-vilagos: #4a4f5e;
  --tinta-halvany: #7a7f8e;
  --arany: #b8923a;
  --arany-vilagos: #d4b366;
  --arany-melyebb: #8a6a1a;
  --vonal: #c9b88a;
}

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--kremes);
  color: var(--tinta);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(184, 146, 58, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(58, 90, 122, 0.04) 0%, transparent 50%);
}

/* === FEJLÉC === */
.fejlec {
  background: linear-gradient(180deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
  padding: 48px 32px 56px;
  position: relative;
  overflow: hidden;
}
.fejlec::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--arany-melyebb), var(--arany), var(--arany-melyebb));
}
.fejlec::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--arany);
  opacity: 0.4;
}
.fejlec-belso { max-width: 920px; margin: 0 auto; }
.fejlec-kategoria {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--arany-vilagos);
  margin-bottom: 14px;
  font-weight: 500;
}
.fejlec h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 500;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.fejlec h1 em {
  font-style: italic;
  color: var(--arany-vilagos);
  font-weight: 400;
}
.fejlec-alcim {
  font-family: 'EB Garamond', serif;
  font-size: 16px;
  color: #c5beac;
  font-style: italic;
  margin-bottom: 28px;
}
.fejlec-stat {
  display: flex; gap: 32px; flex-wrap: wrap;
  padding-top: 20px;
  border-top: 1px solid rgba(184, 146, 58, 0.25);
}
.stat-elem { font-family: 'Inter', sans-serif; }
.stat-szam {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--arany-vilagos);
  line-height: 1;
}
.stat-felirat {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #9b9484;
  margin-top: 4px;
}

/* === NAVIGÁCIÓ === */
.nav-wrapper {
  background: var(--kremes-melyebb);
  border-bottom: 1px solid var(--vonal);
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 4px 20px rgba(26, 31, 46, 0.06);
}
.nav-belso {
  max-width: 920px; margin: 0 auto;
  padding: 14px 24px 10px;
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: flex-start;
}
.nap-nav {
  background: var(--kremes);
  border-top: 1px dashed var(--vonal);
  padding: 10px 24px 12px;
  max-width: 920px;
  margin: 0 auto;
  display: flex; flex-wrap: wrap; gap: 5px;
}
.nap-nav-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  width: 100%;
  margin-bottom: 4px;
}
.nap-gomb {
  border: 1px solid var(--vonal);
  background: #fff;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--tinta-vilagos);
  padding: 5px 9px;
  border-radius: 14px;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.nap-gomb:hover {
  border-color: var(--gomb-szin, var(--arany));
  background: var(--gomb-bg, var(--pergamen));
  color: var(--tinta);
  transform: translateY(-1px);
}
.nap-gomb-pont {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gomb-szin, var(--arany));
  flex-shrink: 0;
}
.nap-gomb.szombat { --gomb-szin: #b8923a; --gomb-bg: #f9f1d8; }
.nap-gomb.unnep { --gomb-szin: #b85a3a; --gomb-bg: #f5e0d8; }
.nap-gomb.vizsga {
  --gomb-szin: var(--arany);
  background: var(--tinta);
  color: var(--kremes);
  font-weight: 600;
  border-color: var(--tinta);
}
.nap-gomb.vizsga:hover { background: var(--tinta); color: var(--arany-vilagos); }
.nap-gomb-mod1 { --gomb-szin: #2c4a6b; --gomb-bg: #e8eef5; }
.nap-gomb-mod2 { --gomb-szin: #3a6a4a; --gomb-bg: #e8f1ea; }
.nap-gomb-mod3 { --gomb-szin: #8a5a2a; --gomb-bg: #f5edd8; }
.nap-gomb-mod4 { --gomb-szin: #5a3a6b; --gomb-bg: #eee5f0; }
.nap-gomb-mod5 { --gomb-szin: #2a3a6b; --gomb-bg: #e6eaf5; }
.nap-gomb-mod0 { --gomb-szin: #5a5a4a; --gomb-bg: #ededdf; }

/* Highlight ha megnyitva */
.nap.highlighted {
  animation: villan 1.4s ease;
}
@keyframes villan {
  0% { box-shadow: 0 0 0 3px var(--arany); }
  100% { box-shadow: 0 6px 20px rgba(26, 31, 46, 0.08); }
}

.nav-gomb {
  border: 1px solid var(--vonal);
  background: var(--kremes);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--tinta-vilagos);
  padding: 8px 14px;
  border-radius: 22px;
  white-space: nowrap;
  transition: all 0.25s ease;
  letter-spacing: 0.3px;
}
.nav-gomb:hover {
  background: var(--pergamen);
  border-color: var(--arany);
  color: var(--tinta);
}
.nav-gomb.on {
  background: var(--tinta);
  border-color: var(--tinta);
  color: var(--kremes);
  box-shadow: 0 2px 8px rgba(26, 31, 46, 0.2);
}
.nav-gomb.on::before {
  content: '◆';
  margin-right: 5px;
  color: var(--arany-vilagos);
}

/* === FŐ TARTALOM === */
.fo {
  max-width: 920px; margin: 0 auto;
  padding: 32px 24px 60px;
}

/* === HETI FEJLÉC === */
.het-fejlec {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin: 36px 0 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--vonal);
  position: relative;
}
.het-fejlec::before {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 60px;
  height: 2px;
  background: var(--arany);
}
.het-szam-nagy {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 500;
  color: var(--arany);
  line-height: 0.9;
  font-style: italic;
}
.het-info { flex: 1; padding-top: 10px; }
.het-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--tinta);
  font-weight: 500;
  margin-bottom: 4px;
}
.het-datum {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
}

/* === NAP KÁRTYA === */
.nap {
  background: #ffffff;
  border: 1px solid var(--vonal);
  border-radius: 4px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.3s ease;
  position: relative;
}
.nap:hover {
  box-shadow: 0 6px 20px rgba(26, 31, 46, 0.08);
  transform: translateY(-1px);
}
.nap.nyitva { box-shadow: 0 8px 28px rgba(26, 31, 46, 0.1); }
.nap::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--szin, var(--arany));
}

.nap-fej {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px 20px 16px 22px;
  cursor: default;
}
.nap-fej.kattintható { cursor: pointer; }
.nap-fej.kattintható:hover .nap-tema { color: var(--szin, var(--tinta)); }

.nap-datum-blokk {
  flex-shrink: 0;
  text-align: center;
  width: 64px;
  padding: 6px 0;
  border-right: 1px solid var(--pergamen);
  padding-right: 14px;
}
.nap-honap {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  margin-bottom: 2px;
}
.nap-szam {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--szin, var(--tinta));
  line-height: 1;
}
.nap-honap-nev {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  margin-top: 3px;
}

.nap-info {
  flex: 1;
  min-width: 0;
}
.nap-tipus-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.nap-hetnev {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--szin, var(--arany-melyebb));
}
.tipus-pill {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--szin-vil, var(--pergamen));
  color: var(--szin, var(--arany-melyebb));
  border: 1px solid var(--szin-bor, var(--vonal));
}
.nap-stat {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--tinta-halvany);
  letter-spacing: 0.5px;
}
.nap-tema {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--tinta);
  line-height: 1.35;
  transition: color 0.2s;
  margin-bottom: 8px;
}


.nap-nyil {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--vonal);
  border-radius: 50%;
  color: var(--tinta-vilagos);
  font-size: 11px;
  transition: all 0.3s;
}
.nap.nyitva .nap-nyil {
  background: var(--tinta);
  border-color: var(--tinta);
  color: var(--kremes);
  transform: rotate(180deg);
}

/* === KIBONTOTT TARTALOM === */
.nap-body {
  display: none;
  border-top: 1px solid var(--pergamen);
  background: linear-gradient(180deg, #fdfaf3 0%, #ffffff 100%);
}

.tetel {
  padding: 18px 22px;
  border-bottom: 1px solid var(--pergamen);
}
.tetel:last-child { border-bottom: none; }

.tetel-fej {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--vonal);
}
.tetel-kod {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  background: var(--szin, var(--tinta));
  color: #fff;
  border-radius: 3px;
}
.tetel-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--szin, var(--tinta));
  flex: 1;
  line-height: 1.3;
}

/* === KÉRDÉSEK === */
.kerdes-csoport {
  margin-bottom: 14px;
}
.kerdes-csoport:last-child { margin-bottom: 0; }

.csoport-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--csop-szin);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.csoport-cim::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--csop-szin);
}
.csoport-cim::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--csop-szin);
  opacity: 0.2;
}

.kerdes {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.55;
}
.kerdes-jelolo {
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  padding-top: 1px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--csop-szin);
}
.kerdes-szoveg {
  color: var(--tinta);
  font-family: 'EB Garamond', serif;
}
.kerdes.k15 .kerdes-szoveg {
  font-weight: 600;
  font-size: 15px;
}

/* Csoport színváltozók */
.k15-csop { --csop-szin: var(--szin); }
.k10-csop { --csop-szin: var(--szin); opacity: 0.95; }
.k5-csop { --csop-szin: var(--szin-vilagos, var(--szin)); }

/* === SPECIÁLIS NAPOK === */
.nap.szombat::before { background: var(--arany); }
.nap.szombat .nap-szam { color: var(--arany-melyebb); }
.nap.unnep::before { background: #b85a3a; }
.nap.vizsga {
  background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
}
.nap.vizsga::before { background: var(--arany); }
.nap.vizsga .nap-honap,
.nap.vizsga .nap-honap-nev,
.nap.vizsga .nap-stat { color: #9b9484; }
.nap.vizsga .nap-szam { color: var(--arany-vilagos); }
.nap.vizsga .nap-tema { color: var(--kremes); font-style: italic; font-size: 20px; }
.nap.vizsga .tipus-pill {
  background: var(--arany);
  color: var(--tinta);
  border-color: var(--arany);
}

/* === MODUL SZÍNEK === */
.m1 { --szin: #2c4a6b; --szin-vilagos: #5a7a9b; --szin-vil: #e8eef5; --szin-bor: #b8c6d6; }
.m2 { --szin: #3a6a4a; --szin-vilagos: #6a9a7a; --szin-vil: #e8f1ea; --szin-bor: #b8ceb8; }
.m3 { --szin: #8a5a2a; --szin-vilagos: #b8923a; --szin-vil: #f5edd8; --szin-bor: #d6c490; }
.m4 { --szin: #5a3a6b; --szin-vilagos: #8a6a9b; --szin-vil: #eee5f0; --szin-bor: #c8b5d0; }
.m5 { --szin: #2a3a6b; --szin-vilagos: #5a6a9b; --szin-vil: #e6eaf5; --szin-bor: #b5bbd6; }
.m0 { --szin: #5a5a4a; --szin-vilagos: #8a8a7a; --szin-vil: #ededdf; --szin-bor: #c8c5b5; }

/* ═══════════════ ÖSSZEFOGLALÓ ═══════════════ */
.os-bevez {
  background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
  padding: 18px 22px;
  margin: 4px 0 18px;
  border-radius: 3px;
  text-align: center;
  border-left: 4px solid var(--arany);
}
.os-bevez-katlb {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--arany-vil);
  margin-bottom: 6px;
}
.os-bevez-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  font-style: italic;
}
.os-bevez-alcim {
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  color: #c5beac;
  margin-top: 4px;
  font-style: italic;
}

.os-tetel {
  background: #ffffff;
  border: 1px solid var(--vonal);
  border-radius: 3px;
  margin-bottom: 14px;
  overflow: hidden;
  position: relative;
}
.os-tetel::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: #2c4a6b;
}
.os-tetel-fej {
  padding: 13px 18px 10px;
  border-bottom: 1px solid var(--pergamen);
  background: linear-gradient(180deg, #fdfaf3 0%, #ffffff 100%);
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.os-tetel-kod {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--arany);
  font-style: italic;
  line-height: 1;
}
.os-tetel-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--tinta);
  line-height: 1.25;
  flex: 1;
}
.os-tetel-body { padding: 14px 18px 16px; }

.os-szek { margin-bottom: 14px; }
.os-szek:last-child { margin-bottom: 0; }
.os-szek-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--arany-mel, #8a6a1a);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.os-szek-cim::before {
  content: '';
  width: 12px; height: 1px;
  background: var(--arany);
}

.os-lista { list-style: none; padding-left: 0; }
.os-lista li {
  padding: 3px 0 3px 16px;
  position: relative;
  line-height: 1.5;
  font-size: 13.5px;
  font-family: 'EB Garamond', serif;
}
.os-lista li::before {
  content: '◆';
  position: absolute;
  left: 0;
  color: var(--arany);
  font-size: 8px;
  top: 7px;
}
.os-szam { padding-left: 22px; counter-reset: os-cnt; }
.os-szam li {
  padding: 3px 0 3px 4px;
  line-height: 1.5;
  font-size: 13.5px;
  font-family: 'EB Garamond', serif;
  counter-increment: os-cnt;
  position: relative;
  list-style: none;
}
.os-szam li::before {
  content: counter(os-cnt) ".";
  position: absolute;
  left: -20px;
  width: 16px;
  text-align: right;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  color: var(--arany-mel, #8a6a1a);
  font-size: 11px;
  top: 5px;
}
.os-kulcs { font-weight: 600; color: #2c4a6b; }
.os-tul {
  background: linear-gradient(180deg, transparent 60%, rgba(212, 179, 102, 0.4) 60%);
  font-weight: 500;
  padding: 0 2px;
}
.os-ev {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  background: var(--pergamen);
  padding: 1px 6px;
  border-radius: 2px;
  font-weight: 600;
  color: var(--arany-mel, #8a6a1a);
  white-space: nowrap;
}
.os-megj {
  font-style: italic;
  font-size: 12.5px;
  color: var(--tinta-vilagos);
  padding: 7px 10px;
  background: #fdfaf3;
  border-left: 3px solid var(--arany-vil);
  margin-top: 6px;
  border-radius: 0 2px 2px 0;
}
.os-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.os-grid > div {
  background: #fdfaf3;
  padding: 9px 12px;
  border: 1px solid var(--pergamen);
  border-radius: 2px;
}
.os-grid .alcim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--arany-mel, #8a6a1a);
  font-weight: 700;
  margin-bottom: 4px;
}
.os-tanacs {
  margin-top: 18px;

OSSZEF.h2='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 2. Hét</div><div class="os-bevez-cim">I. Modul (folytatás)</div><div class="os-bevez-alcim">Ügyészség, önkormányzatok, közigazgatás · I/12—I/16.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/12.</div><div class="os-tetel-cim">Az ügyészség feladatkörei a büntető eljárás során</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az ügyészség alkotmányos helye</div><ul class="os-lista"><li><span class="os-kulcs">Független</span> az igazságszolgáltatás közreműködője</li><li><span class="os-kulcs">Legfőbb ügyész</span> — Ogy választja <span class="os-tul">9 évre</span>, 2/3-os szavazással</li><li>Hierarchikus szervezet: legfőbb ügyészség → fellebbviteli → fő-/megyei → járási</li></ul></div><div class="os-szek"><div class="os-szek-cim">Büntetőeljárási feladatok</div><ol class="os-szam"><li><span class="os-kulcs">Nyomozás felügyelete</span> — törvényesség biztosítása</li><li><span class="os-kulcs">Vádemelés</span> — vagy elejtés / elterelés</li><li><span class="os-kulcs">Képviselet a bíróság előtt</span> — közvádló</li><li>Jogorvoslat (fellebbezés, felülvizsgálati indítvány)</li><li><span class="os-kulcs">Büntetés-végrehajtás</span> törvényességének felügyelete</li></ol></div><div class="os-szek"><div class="os-szek-cim">Egyéb feladatok</div><ul class="os-lista"><li>Közérdek védelmében közigazgatási bírósági eljárás kezdeményezése</li><li>Magánjogi perben fellépés a közérdek védelmében</li><li>Gyermekvédelmi, polgárjogi intézkedések</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/13.</div><div class="os-tetel-cim">Helyi önkormányzatok autonómiájának korlátai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Mit jelent az önkormányzati autonómia?</div><ul class="os-lista"><li><span class="os-kulcs">Helyi közhatalom</span> gyakorlása választott testülettel</li><li>Önálló gazdálkodás, vagyonkezelés</li><li>Helyi rendeletalkotási jog</li><li>Önkormányzati közszolgáltatások szervezése</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az autonómia korlátai</div><ol class="os-szam"><li><span class="os-kulcs">Törvényi keretek</span> — csak az Mötv. és más törvények szerint</li><li><span class="os-kulcs">Pénzügyi korlátok</span> — központi költségvetési függés, ÁSZ-ellenőrzés</li><li><span class="os-kulcs">Stabilitási törvény</span> — adósságkeletkeztető ügyletekhez kormányhozzájárulás</li><li><span class="os-kulcs">Kormányhivatali felügyelet</span> — törvényességi vizsgálat, kúriai eljárás</li><li><span class="os-kulcs">Kötelező feladatok</span> — államilag előírt szolgáltatások</li><li>Alkotmánybírósági kontroll az önkormányzati rendeleteken</li></ol></div><div class="os-megj">💡 A helyi hatáskör is csak <span class="os-kulcs">törvényi felhatalmazás</span> alapján gyakorolható — az önkormányzat soha nem teljesen szuverén.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/14.</div><div class="os-tetel-cim">Közigazgatás funkciói — igazgatástudomány vs. jogtudomány</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Két megközelítés</div><div class="os-grid"><div><div class="alcim">Igazgatástudomány (POSDCORB)</div><span class="os-kulcs">Planning</span> · <span class="os-kulcs">Organizing</span> · <span class="os-kulcs">Staffing</span> · <span class="os-kulcs">Directing</span> · <span class="os-kulcs">Coordinating</span> · <span class="os-kulcs">Reporting</span> · <span class="os-kulcs">Budgeting</span> — Gulick és Urwick</div><div><div class="alcim">Jogtudomány</div>A közigazgatás <span class="os-tul">végrehajtó hatalmi ág</span>; jogi normák alkalmazása + jogalkotási hatáskör</div></div></div><div class="os-szek"><div class="os-szek-cim">Két nagy alrendszer</div><ul class="os-lista"><li><span class="os-kulcs">Államigazgatás</span> — központi, területi, helyi szervek (kormányhivatalok)</li><li><span class="os-kulcs">Önkormányzati igazgatás</span> — helyi önkormányzatok</li><li>Kapcsolódó: <span class="os-kulcs">kvázi-államigazgatási</span> szervek (köztestületek, autonóm szervek)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Központi fogalmak</div><ul class="os-lista"><li><span class="os-kulcs">Közhatalom</span> — kötelező döntéshozatal</li><li><span class="os-kulcs">Közszolgáltatás</span> — társadalmi szükségletek kielégítése</li><li><span class="os-kulcs">Közérdek</span> — a magán-érdektől elhatárolt cél</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/15.</div><div class="os-tetel-cim">Kormányzati főhivatal vs. fővárosi/vármegyei kormányhivatal</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Összehasonlítás</div><div class="os-grid"><div><div class="alcim">Kormányzati főhivatal</div><span class="os-kulcs">Országos illetékesség</span>, a Kormány alá rendelve. Pl. KSH, NMHH, NAIH</div><div><div class="alcim">Fővárosi/vármegyei kormányhivatal</div><span class="os-kulcs">Területi illetékesség</span> (1 főváros + 19 vármegye), általános államigazgatási hatáskör</div></div></div><div class="os-szek"><div class="os-szek-cim">A kormányhivatal jellemzői</div><ul class="os-lista"><li>Vezetője a <span class="os-kulcs">kormánymegbízott</span> — politikai kinevezett</li><li>Több szakigazgatási feladatkört egyesít</li><li>Felügyeli az <span class="os-kulcs">önkormányzatok</span> törvényes működését</li><li>Hatósági feladatok: építésügy, gyámügy, népegészségügy stb.</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/16.</div><div class="os-tetel-cim">Helyi önkormányzatok feladatrendszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Három feladatcsoport</div><ol class="os-szam"><li><span class="os-kulcs">Kötelező önkormányzati</span> feladatok — törvény írja elő (szennyvíz, hulladék, óvoda, helyi közutak)</li><li><span class="os-kulcs">Önként vállalt</span> feladatok — saját döntés alapján (helyi múzeum, sportlétesítmény)</li><li><span class="os-kulcs">Államigazgatási</span> feladatok — átruházott államigazgatási hatáskörök (anyakönyvi ügyek)</li></ol></div><div class="os-szek"><div class="os-szek-cim">Önkormányzati szervek (Mötv.)</div><ul class="os-lista"><li><span class="os-kulcs">Képviselő-testület</span> — legfőbb döntéshozó szerv</li><li><span class="os-kulcs">Polgármester</span> — testület vezetője, közvetlenül választott</li><li><span class="os-kulcs">Bizottságok</span> — szakterületi munka</li><li><span class="os-kulcs">Jegyző</span> — a hivatal vezetője</li><li><span class="os-kulcs">Önkormányzati hivatal</span> — végrehajtási apparátus</li></ul></div><div class="os-megj">💡 Település mérete határozza meg, mekkora apparátust kell fenntartani — <span class="os-kulcs">közös önkormányzati hivatal</span> lehetőség kis falvaknál.</div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Az I. modul teljes! Most már mind a 16 tétel a fejében kell legyen. Próbálja meg <em>fejből</em>, vázlat nélkül elmondani őket.</div></div>';
OSSZEF.h3='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 3. Hét</div><div class="os-bevez-cim">I. Modul — Teljes áttekintés</div><div class="os-bevez-alcim">Mind a 16 tétel kompakt összegzése</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">A 16 tétel egy oldalon — kulcsfogalom-térkép</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Alkotmányos alapok (I/1—I/5)</div><ul class="os-lista"><li><span class="os-kulcs">I/1</span> Alkotmányfejlődés: Aranybulla → Tripartitum → 1848 → 1949 → 1989 → 2012 (Alaptörvény)</li><li><span class="os-kulcs">I/2</span> Alapjogok: 4 generáció (Vasak) + 5 tárgyi csoport</li><li><span class="os-kulcs">I/3</span> Állami kötelezettségek: negatív (tartózkodás) + pozitív (intézményvédelmi)</li><li><span class="os-kulcs">I/4</span> Házasság = férfi+nő; család = házasság vagy szülő-gyermek</li><li><span class="os-kulcs">I/5</span> Diszkriminációtilalom (formális) ↔ esélyegyenlőség (anyagi) — pozitív diszkrimináció</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az államhatalmi szervek (I/6—I/9)</div><ul class="os-lista"><li><span class="os-kulcs">I/6</span> Ogy: 199 fő, 4 év, egykamarás · törvényjavaslat 8 lépésben</li><li><span class="os-kulcs">I/7</span> Köztárs. elnök: 5 év, 3 hatáskör-csoport, ellenjegyzés (önálló vs. kötött)</li><li><span class="os-kulcs">I/8</span> Tisztség megszűnése: K.eln. (lejár, halál, lemond, megfoszt) · Mineln. (Ogy, bizalmatl., bizalmi)</li><li><span class="os-kulcs">I/9</span> Kormány: miniszterelnöki kormányzás · megalakulás 5 lépésben</li></ul></div><div class="os-szek"><div class="os-szek-cim">Bíróságok és Alkotmánybíróság (I/10—I/12)</div><ul class="os-lista"><li><span class="os-kulcs">I/10</span> AB: 15 fő, 12 év, 2/3 · normakontroll + alkotmányjogi panasz (3 típus)</li><li><span class="os-kulcs">I/11</span> Bíróságok 4 szint: járás → törvényszék → ítélőtábla → Kúria</li><li><span class="os-kulcs">I/12</span> Ügyészség: legfőbb ügyész 9 év · nyomozásfelügyelet, vádemelés, képviselet</li></ul></div><div class="os-szek"><div class="os-szek-cim">Helyi önkormányzatok és közigazgatás (I/13—I/16)</div><ul class="os-lista"><li><span class="os-kulcs">I/13</span> Önkorm. autonómia korlátai: törvényi, pénzügyi, kormányhivatali, AB-i</li><li><span class="os-kulcs">I/14</span> Közigazgatás: POSDCORB (igazg.tud.) vs. végrehajtás (jog.tud.)</li><li><span class="os-kulcs">I/15</span> Korm.főhivatal (országos) vs. korm.hivatal (területi, 1+19)</li><li><span class="os-kulcs">I/16</span> Önkorm. feladatok: kötelező + önként vállalt + államigazgatási</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Ez egy „fejlapozható lista" — első olvasásra elég legyen <em>5 perc</em>. Aki tudja a kulcsszavakat, már jó úton jár.</div></div>';

rogazdasági mutatók</div><ul class="os-lista"><li><span class="os-kulcs">GDP</span> — gazdasági növekedés</li><li><span class="os-kulcs">Infláció</span> — árszínvonal-emelkedés (MNB-cél: 3%)</li><li><span class="os-kulcs">Államadósság</span> — Alaptörvény szerint 50% GDP cél</li><li><span class="os-kulcs">Fizetési mérleg</span> — folyó + tőkemérleg + finanszírozás</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/4.</div><div class="os-tetel-cim">Elkülönített állami pénzalapok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Jellemzők</div><ul class="os-lista"><li><span class="os-kulcs">Külön elszámolási egység</span> a központi költségvetésen belül</li><li>Törvénnyel hozzák létre, meghatározott feladatra</li><li>Saját bevételei vannak (járulékok, díjak)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Működő alapok (5 db)</div><ol class="os-szam"><li><span class="os-kulcs">NFA</span> — Nemzeti Foglalkoztatási Alap</li><li><span class="os-kulcs">Bethlen Gábor Alap</span> — határon túli magyarok</li><li><span class="os-kulcs">KNPA</span> — Központi Nukleáris Pénzügyi Alap</li><li><span class="os-kulcs">NKA</span> — Nemzeti Kulturális Alap</li><li><span class="os-kulcs">NKFIA</span> — Nemzeti Kutatási, Fejlesztési és Innovációs Alap</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/5.</div><div class="os-tetel-cim">Állami Számvevőszék jogállása és feladatai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Jogállás</div><ul class="os-lista"><li><span class="os-kulcs">Ogy</span> alá rendelt, független pénzügyi-gazdasági ellenőrző szerv</li><li>Elnök: Ogy választja <span class="os-tul">12 évre</span>, 2/3-os szavazással</li><li>Sem a Kormánynak, sem más szervnek nincs alárendelve</li></ul></div><div class="os-szek"><div class="os-szek-cim">Főbb feladatok</div><ol class="os-szam"><li><span class="os-kulcs">Költségvetés végrehajtásának ellenőrzése</span></li><li><span class="os-kulcs">Önkormányzatok</span> gazdálkodásának ellenőrzése</li><li><span class="os-kulcs">Pártok</span> és <span class="os-kulcs">alapítványok</span> gazdálkodása</li><li><span class="os-kulcs">Állami vagyon</span> kezelésének vizsgálata</li><li>Véleményezés a költségvetési törvényhez</li></ol></div><div class="os-megj">💡 Az ÁSZ <span class="os-kulcs">nem szabhat ki büntetést</span>, csak <span class="os-kulcs">jelentést készít</span> — de a jelentés bizonyítékként szolgálhat más eljárásokban.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/6.</div><div class="os-tetel-cim">Gazdálkodási alapelvek</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az 5 fő alapelv</div><ol class="os-szam"><li><span class="os-kulcs">Teljesség</span> — minden bevétel és kiadás megjelenik</li><li><span class="os-kulcs">Bruttó elszámolás</span> — nem nettósítva</li><li><span class="os-kulcs">Évenkéntiség</span> — naptári év alapján</li><li><span class="os-kulcs">Felhasználási kötöttség</span> — célhoz kötött pénz csak arra</li><li><span class="os-kulcs">Közbeszerzési kötelezettség</span> — versenyeztetés</li></ol></div><div class="os-szek"><div class="os-szek-cim">Jogi garanciák</div><ul class="os-lista"><li><span class="os-kulcs">ÁSZ ellenőrzés</span> utólagos</li><li><span class="os-kulcs">Belső kontrollok</span> — minden ktgvetési szervnél</li><li><span class="os-kulcs">Magyar Államkincstár</span> — pénzügyi végrehajtó</li><li><span class="os-kulcs">Költségvetési Tanács</span> — előzetes véleményezés</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/7.</div><div class="os-tetel-cim">Költségvetési szervek irányítása és felügyelete</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A ktgvetési szerv  és hazai</li></ol></div><div class="os-szek"><div class="os-szek-cim">Helyi adók</div><ul class="os-lista"><li><span class="os-kulcs">Helyi iparűzési adó</span> (HIPA) — legjelentősebb</li><li><span class="os-kulcs">Építményadó</span>, <span class="os-kulcs">telekadó</span></li><li><span class="os-kulcs">Idegenforgalmi adó</span></li><li><span class="os-kulcs">Kommunális adó</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Adósságkorlátozás</div><ul class="os-lista"><li><span class="os-kulcs">Stabilitási tv.</span>: adósságot keletkeztető ügylethez Kormány hozzájárulás</li><li>Csak meghatározott céllal és összeghatáron belül</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/9.</div><div class="os-tetel-cim">Államháztartási kiadások csoportosítása</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Kiadások funkciók szerint</div><ol class="os-szam"><li><span class="os-kulcs">Általános közigazgatás</span> — államigazgatás, jogalkotás</li><li><span class="os-kulcs">Védelem</span> — honvédelem, közrend</li><li><span class="os-kulcs">Közbiztonság, jogszolgáltatás</span></li><li><span class="os-kulcs">Gazdaság</span> — beruházások, támogatások</li><li><span class="os-kulcs">Egészségügy, oktatás, kultúra</span></li><li><span class="os-kulcs">Szociális biztonság</span> — nyugdíj, segélyek</li><li><span class="os-kulcs">Adósságszolgálat</span> — kamatok, törlesztések</li></ol></div><div class="os-szek"><div class="os-szek-cim">Központi költségvetési tartalékok</div><ul class="os-lista"><li><span class="os-kulcs">Általános tartalék</span> — előre nem látható kiadásokra</li><li><span class="os-kulcs">Céltartalék</span> — meghatározott célra elkülönítve</li><li><span class="os-kulcs">Stabilitási tartalék</span> — Stabilitási tv. szerint</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">III. modul a fejében! Sok új fogalom van (Áht., ÁSZ, ktgvetési Tanács) — a struktúrát fontos átlátni: ki ellenőriz kit, és milyen pénzből.</div></div>';
OSSZEF.h8='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 8. Hét</div><div class="os-bevez-cim">III. Modul + I-III. ismétlés</div><div class="os-bevez-alcim">Államháztartás összefoglaló</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">III. modul kompakt áttekintés</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 9 tétel egy sorban</div><ul class="os-lista"><li><span class="os-kulcs">III/1</span> Ktgvetési Tanács: 3 tag (elnök, MNB, ÁSZ), vétójog adósságra</li><li><span class="os-kulcs">III/2</span> Nemzeti vagyon: forgalomképes vs. forgalomképtelen, átláthatóság</li><li><span class="os-kulcs">III/3</span> Jogszabályok: Alaptörvény, Áht., Stab.tv. + ciklus 4 fázis (terv→elf→végr→szám)</li><li><span class="os-kulcs">III/4</span> Elkülönített pénzalapok 5 db: NFA, Bethlen, KNPA, NKA, NKFIA</li><li><span class="os-kulcs">III/5</span> ÁSZ: 12 év, 2/3, Ogynek felelős, gazdálkodás ellenőrzése</li><li><span class="os-kulcs">III/6</span> Alapelvek: teljesség, bruttó, évenkéntiség, kötöttség, közbeszerzés</li><li><span class="os-kulcs">III/7</span> Ktgvetési szervek: irányítás vs. felügyelet + belső kontroll + KEHI + MÁK</li><li><span class="os-kulcs">III/8</span> Önkorm. bevételek: saját + átengedett + támogatás + hitel + pályázat · HIPA legfontosabb</li><li><span class="os-kulcs">III/9</span> Kiadások funkció szerint: közigazg., védelem, gazd., eü/okt/kultúra, szociális, adósság</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">I-III. modul keresztkapcsolatok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Hogyan kapcsolódnak a modulok?</div><ul class="os-lista"><li><span class="os-kulcs">I/6 Ogy + III/3 ciklus</span>: az Ogy fogadja el a ktgvetést és a zárszámadást</li><li><span class="os-kulcs">I/7 K.eln + III/1 Tanács</span>: feloszlathatja az Ogyt, ha késik a ktgvetés</li><li><span class="os-kulcs">I/10 AB + II. jogalkotás</span>: normakontroll, ha az Áht. alkotmányellenes</li><li><span class="os-kulcs">I/13 Önkorm. korlátok + III/8 bevételek</span>: adósságkeletkeztetés Korm.engedéllyel</li><li><span class="os-kulcs">II. Ákr. + III. ÁSZ</span>: mindkettő közigazgatási eljárás-jellegű, de eltérő tárgyak</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Most már 37 tétel a fejében (16+12+9). Készülj fel a IV. modulra — vezetés- és szervezéstudomány, sok szerző és modell.</div></div>';
OSSZEF.h9='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 9. Hét</div><div class="os-bevez-cim">Gyenge pontok célzott ismétlése</div><div class="os-bevez-alcim">I-III. modul a hét utolsó napjaiban felidézve</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">Tipikusan nehéz részek I-III. modulban</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">I. modul nehéz részek</div><ul class="os-lista"><li><span class="os-kulcs">I/2</span> Alapjog-generációk pontos sorrendje és tartalma (4 db, Vasak)</li><li><span class="os-kulcs">I/14</span> POSDCORB hét eleme angolul — <span class="os-kulcs">Planning, Organizing, Staffing, Directing, Coordinating, Reporting, Budgeting</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">II. modul nehéz részek</div><ul class="os-lista"><li><span class="os-kulcs">II/12</span> Jogorvoslat 5 fajtája és sorrendje (fellebbezés → közig. per → Kúria → saját h. → felügyeleti)</li><li><span class="os-kulcs">II/2</span> Jogszabályi hierarchia 7 lépcsője — <span class="os-kulcs">pontos sorrend!</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">III. modul nehéz részek</div><ul class="os-lista"><li><span class="os-kulcs">III/3</span> Költségvetési ciklus 4 fázisa időbeli sorrendje (júl-okt → dec → tárgyév → utólag)</li><li><span class="os-kulcs">III/7</span> Belső ellenőrzés vs. kormányzati ellenőrzés vs. ÁSZ — <span class="os-kulcs">ki mit csinál</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Tipp a jövő hétre</div><ul class="os-lista"><li>A IV. modul (<span class="os-kulcs">vezetéstudomány</span>) sok szerzőt tartalmaz — készíts egy <span class="os-tul">név-évszám-elmélet</span> táblázatot!</li><li>Az 1900-as évek elejétől halad: Weber → Taylor → Mayo (1924) → Maslow (1943) → McGregor (1960) → Lewin → modern</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">A felkészülés első harmadán túl vagy! Az I-III. modul az alap — innen építjük a IV-V. modult.</div></div>';
OSSZEF.h10='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 10. Hét</div><div class="os-bevez-cim">IV. Modul — kezdés</div><div class="os-bevez-alcim">Vezetés- és szervezéstudomány · IV/1—IV/8.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/1.</div><div class="os-tetel-cim">Max Weber bürokrácia-modellje</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Weber életműve</div><ul class="os-lista"><li><span class="os-kulcs">Max Weber</span> (1864–1920) német szociológus</li><li>Fő mű: <span class="os-kulcs">Gazdaság és társadalom</span> (1922, posztumusz)</li><li>A klasszikus iskola alapítója</li></ul></div><div class="os-szek"><div class="os-szek-cim">A bürokratikus szervezet ideáltípusa</div><ol class="os-szam"><li><span class="os-kulcs">Hierarchikus felépítés</span> — egyértelmű alá-fölérendeltség</li><li><span class="os-kulcs">Munkamegosztás</span> — speciális szakképzés</li><li><span class="os-kulcs">Írott szabályok</span> — formalizált eljárás</li><li><span class="os-kulcs">Személytelenség</span> — érzelemmentes ügyintézés</li><li><span class="os-kulcs">Karrierrendszer</span> — előmenetel teljesítmény alapján</li><li><span class="os-kulcs">Szakképzettség</span> — kompetencia alapján kiválasztás</li></ol></div><div class="os-megj">💡 Weber szerint a bürokrácia <span class="os-kulcs">racionalitást</span> és <span class="os-kulcs">kiszámíthatóságot</span> biztosít — de túlzott formalizmus is lehet (Merton: „bürokratikus személyiség").</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/2.</div><div class="os-tetel-cim">Emberközpontú irányzatok képviselői</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 fő képviselő</div><ol class="os-szam"><li><span class="os-kulcs">Elton Mayo</span> (1880-1949) — <span class="os-ev">1924-32</span> <span class="os-tul">Hawthorne-kísérletek</span>, Human Relations</li><li><span class="os-kulcs">Abraham Maslow</span> (1908-70) — <span class="os-ev">1943</span> <span class="os-tul">szükséglethierarchia</span> (piramis)</li><li><span class="os-kulcs">Douglas McGregor</span> (1906-64) — <span class="os-ev">1960</span> <span class="os-tul">X és Y elmélet</span></li><li><span class="os-kulcs">Kurt Lewin</span> (1890-1947) — csoportdinamika, <span class="os-tul">változás 3 fázisa</span> (unfreeze-change-refreeze)</li></ol></div><div class="os-szek"><div class="os-szek-cim">Maslow szükséglethierarchia</div><ol class="os-szam"><li>1. <span class="os-kulcs">Fiziológiai</span> (étel, ital, alvás)</li><li>2. <span class="os-kulcs">Biztonság</span></li><li>3. <span class="os-kulcs">Szeretet, kapcsolat</span></li><li>4. <span class="os-kulcs">Megbecsülés</span></li><li>5. <span class="os-kulcs">Önmegvalósítás</span></li></ol></div><div class="os-szek"><div class="os-szek-cim">McGregor X és Y</div><div class="os-grid"><div><div class="alcim">X elmélet</div><span class="os-kulcs">Pesszimista</span> — ember alapból lusta, kényszerítés kell</div><div><div class="alcim">Y elmélet</div><span class="os-kulcs">Optimista</span> — ember alapból motivált, csak teret kell adni</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/3.</div><div class="os-tetel-cim">Autokratikus, laissez-faire és demokratikus stílusok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Lewin három stílusa</div><div class="os-grid"><div><div class="alcim">Autokratikus</div><span class="os-kulcs">Egyszemélyi döntés</span> · gyors · alacsony elégedettség · alkalmas válsághelyzetben</div><div><div class="alcim">Demokratikus</div><span class="os-kulcs">Csoportos döntés</span> · lassabb · magas elégedettség · jó normál működésnél</div><div><div class="alcim">Laissez-faire</div><span class="os-kulcs">Szabad kezet ad</span> · minimális vezetés · csak érett, képzett csoportnál</div></div></div><div class="os-szek"><div class="os-szek-cim">Mikor melyiket érdemes</div><ul class="os-lista"><li><span class="os-kulcs">Autokratikus</span> — krízis, gyors döntés, fegyelmezett szervezet</li><li><span class="os-kulcs">Demokratikus</span> — kreatív munka, hosszú távú projektek</li><li><span class="os-kulcs">Laissez-faire</span> — kutatási csoportok, művészeti alkotás</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/4.</div><div class="os-tetel-cim">Döntésközpontú vezetési stílusok — Lewin/Likert</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Likert 4 stílusa</div><ol class="os-szam"><li><span class="os-kulcs">Kizsákmányoló autokrata</span> — félelmen alapuló, parancsoló</li><li><span class="os-kulcs">Jóságos autokrata</span> — paternalisztikus, „atyai"</li><li><span class="os-kulcs">Konzultatív</span> — vélemények meghallgatása</li><li><span class="os-kulcs">Részvételi</span> — közös döntéshozatal</li></ol></div><div class="os-szek"><div class="os-szek-cim">SWOT analízis</div><ul class="os-lista"><li><span class="os-kulcs">S</span> Strengths (erősségek) — belső</li><li><span class="os-kulcs">W</span> Weaknesses (gyengeségek) — belső</li><li><span class="os-kulcs">O</span> Opportunities (lehetőségek) — külső</li><li><span class="os-kulcs">T</span> Threats (fenyegetések) — külső</li><li>Stratégiai döntésekhez használatos</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/5.</div><div class="os-tetel-cim">Személyiségközpontú vezetési stílusok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Blake-Mouton menedzseri rács</div><div class="os-grid"><div><div class="alcim">Tengelyek</div><span class="os-kulcs">Emberek iránti érdeklődés</span> (függőleges) + <span class="os-kulcs">Termelés iránti érdeklődés</span> (vízszintes)</div><div><div class="alcim">Stílusok</div>1.1 lemondó · 1.9 country club · 5.5 középút · 9.1 hatalom · <span class="os-kulcs">9.9 csapatvezető</span> (ideális)</div></div></div><div class="os-szek"><div class="os-szek-cim">Stratégiai tervezés elemei</div><ul class="os-lista"><li><span class="os-kulcs">Misszió</span> — miért létezünk?</li><li><span class="os-kulcs">Vízió</span> — hova akarunk eljutni?</li><li><span class="os-kulcs">Célok</span> — mit akarunk elérni? (SMART)</li><li><span class="os-kulcs">Stratégia</span> — hogyan?</li><li><span class="os-kulcs">Akcióterv</span> — konkrét lépések</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/6.</div><div class="os-tetel-cim">Vezetés mint döntés; döntéstípusok és delegálás</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Döntéstípusok</div><ol class="os-szam"><li><span class="os-kulcs">Programozott</span> — rutin döntés, szabályok alapján</li><li><span class="os-kulcs">Programozatlan</span> — egyedi, kreatív megoldás</li><li><span class="os-kulcs">Stratégiai</span> — hosszú távú, magas szintű</li><li><span class="os-kulcs">Taktikai</span> — középtávú</li><li><span class="os-kulcs">Operatív</span> — napi, alacsony szintű</li></ol></div><div class="os-szek"><div class="os-szek-cim">A delegálás</div><ul class="os-lista"><li><span class="os-kulcs">Felhatalmazás</span> beosztottra (feladat + jogkör + felelősség)</li><li><span class="os-kulcs">Előnyök</span>: fejlődik a beosztott, mentesít a vezető</li><li><span class="os-kulcs">Buktatók</span>: túl-/aluldelegálás, ellenőrzés hiánya</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/7.</div><div class="os-tetel-cim">Négy vezetési funkció</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 fő funkció (Fayol)</div><ol class="os-szam"><li><span class="os-kulcs">Tervezés</span> — célok, eszközök, határidők meghatározása</li><li><span class="os-kulcs">Szervezés</span> — struktúrák, hatáskörök kialakítása</li><li><span class="os-kulcs">Vezetés/irányítás</span> — emberek motiválása, koordináció</li><li><span class="os-kulcs">Ellenőrzés</span> — visszacsatolás, korrekció</li></ol></div><div class="os-megj">💡 Egy közigazgatási munkakörben (pl. osztályvezető) mind a 4 funkció megjelenik — gondold végig saját munkádon keresztül!</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/8.</div><div class="os-tetel-cim">Ellenőrzési tevékenység</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Ellenőrzés tárgya</div><ul class="os-lista"><li><span class="os-kulcs">Eredmények</span> — mi született?</li><li><span class="os-kulcs">Folyamatok</span> — hogyan?</li><li><span class="os-kulcs">Erőforrások</span> — mire fordították?</li><li><span class="os-kulcs">Szabályok betartása</span> — törvényesség</li></ul></div><div class="os-szek"><div class="os-szek-cim">Ellenőrzés típusai</div><ol class="os-szam"><li><span class="os-kulcs">Időbeli</span>: előzetes, folyamatos, utólagos</li><li><span class="os-kulcs">Kötelezettség szerint</span>: belső, külső</li><li><span class="os-kulcs">Tartalom szerint</span>: pénzügyi, teljesítmény, szabályossági</li><li><span class="os-kulcs">Mélysége szerint</span>: eseti, átfogó, célzott</li></ol></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Hét fő szerző Webertől McGregorig — készíts egy <span class="os-kulcs">idővonalat</span> (1900-1960) név-évszám-elmélet hármasokkal!</div></div>';

ika</span>: cél → result → output → tevékenység</li><li><span class="os-kulcs">Horizontális logika</span>: mutató + forrás + feltételezések</li><li>Az EU-finanszírozású projektek kötelező eszköze</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/12.</div><div class="os-tetel-cim">Szervezeti változás</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Változás jellege</div><ul class="os-lista"><li><span class="os-kulcs">Tervezett</span> vs. spontán</li><li><span class="os-kulcs">Folyamatos</span> vs. radikális</li><li><span class="os-kulcs">Strukturális</span> vs. kulturális</li></ul></div><div class="os-szek"><div class="os-szek-cim">Fogadtatás (Kotter)</div><ol class="os-szam"><li><span class="os-kulcs">Támogatók</span> — aktívan részt vesznek</li><li><span class="os-kulcs">Semlegesek</span> — kivárnak</li><li><span class="os-kulcs">Ellenállók</span> — passzívan/aktívan ellenállnak</li><li><span class="os-kulcs">Bizonytalanok</span> — döntésképtelenek</li></ol></div><div class="os-megj">💡 Lewin változás-modellje: <span class="os-kulcs">felolvasztás → változtatás → befagyasztás</span>.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/13.</div><div class="os-tetel-cim">Munkanap-fényképezés</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Mit jelent?</div><ul class="os-lista"><li><span class="os-kulcs">Időmérési módszer</span> — egy munkanap megfigyelése</li><li>Cél: <span class="os-kulcs">hatékonyság javítása</span>, időpazarlás csökkentése</li><li>Hol használjuk: ügymenetvizsgálat, létszámtervezés</li></ul></div><div class="os-szek"><div class="os-szek-cim">A 4 fő lépés</div><ol class="os-szam"><li><span class="os-kulcs">Előkészítés</span> — célok, megfigyelési forma</li><li><span class="os-kulcs">Megfigyelés</span> — folyamatos jegyzetelés</li><li><span class="os-kulcs">Elemzés</span> — os-szek-cim">Pályázati eljárás</div><ol class="os-szam"><li><span class="os-kulcs">Pályázat kiírása</span> (KÖZIGÁLLÁS portál)</li><li><span class="os-kulcs">Pályázatok beérkezése</span></li><li><span class="os-kulcs">Előszűrés</span> — feltételek</li><li><span class="os-kulcs">Interjú</span> és <span class="os-kulcs">kompetenciafelmérés</span></li><li><span class="os-kulcs">Döntés</span> — jelölt kiválasztása</li></ol></div><div class="os-szek"><div class="os-szek-cim">Interjú szakaszai</div><ul class="os-lista"><li><span class="os-kulcs">Előkészítés</span> — kérdések, kompetenciák</li><li><span class="os-kulcs">Bevezetés</span> — bemutatkozás, légkör</li><li><span class="os-kulcs">Fő rész</span> — kérdés-válasz, példák</li><li><span class="os-kulcs">Lezárás</span> — összegzés, következő lépések</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/18.</div><div class="os-tetel-cim">HR-áramlás 4 alapmodellje</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 modell</div><ol class="os-szam"><li><span class="os-kulcs">Egész életre szóló (japán)</span> — egész életen át egy munkáltató, belső karrier</li><li><span class="os-kulcs">Karrier-orientált (európai)</span> — szakmán belül vándorlás, kompetenciafejlesztés</li><li><span class="os-kulcs">Munkaköralapú (amerikai)</span> — gyakori munkahely-váltás, „nyílt" piac</li><li><span class="os-kulcs">Kompetenciaalapú (modern)</span> — készségek vándorolnak, nem személyek</li></ol></div><div class="os-szek"><div class="os-szek-cim">EE-gazdálkodás fejlődése (5 szakasz)</div><ol class="os-szam"><li><span class="os-kulcs">1900-1930</span> Személyzetügyi adminisztráció</li><li><span class="os-kulcs">1930-1960</span> Human Relations</li><li><span class="os-kulcs">1960-1980</span> Személyzeti menedzsment</li><li><span class="os-kulcs">1980-2000</span> HR menedzsment</li><li><span class="os-kulcs">2000-tól</span> Stratégiai HRM</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/19.</div><div class="os-tetel-cim">Közszolgálati életpálya-menedzsment</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Munkaerőhiány kezelése</div><ul class="os-lista"><li><span class="os-kulcs">Toborzás</span> (külső, belső pályázat)</li><li><span class="os-kulcs">Áthelyezés</span> (más szervezet)</li><li><span class="os-kulcs">Megtartás</span>: bérfejlesztés, fejlesztés, képzés</li><li><span class="os-kulcs">Külső munkavégzés</span>: távmunka, otthoni munkavégzés</li></ul></div><div class="os-szek"><div class="os-szek-cim">Munkaerő-többlet kezelése</div><ol class="os-szam"><li><span class="os-kulcs">Természetes fogyás</span> kihasználása</li><li><span class="os-kulcs">Belső átcsoportosítás</span> — más szervezetbe</li><li><span class="os-kulcs">Felmentés</span> — törvényi okból</li><li><span class="os-kulcs">Korai nyugdíjazás</span> — egyes esetekben</li></ol></div><div class="os-szek"><div class="os-szek-cim">Felmentési védelem</div><div class="os-grid"><div><div class="alcim">Szigorúbb védelem</div>Várandós, GYED, GYES, betegszabadság — <span class="os-kulcs">semmi okból sem</span></div><div><div class="alcim">Enyhébb védelem</div>Nyugdíj előtt 5 év, gyermekes szülő — <span class="os-kulcs">csak fontos okból</span></div></div></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">IV. modul teljes — vezetéstudományi alapok a fejedben. Aki tudja a 7 fő szerzőt + 5 vezetési stílust + 4 HR-modellt, sikerre lesz!</div></div>';
OSSZEF.h12='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 12. Hét</div><div class="os-bevez-cim">IV. Modul — Teljes áttekintés</div><div class="os-bevez-alcim">A 19 tétel egy oldalon</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">A IV. modul a fejedben — kulcsfogalmak</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Klasszikus iskola és emberközpontú irányzat (IV/1-2)</div><ul class="os-lista"><li><span class="os-kulcs">IV/1</span> Weber: hierarchia, munkamegosztás, írott szabály, személytelenség, karrier, szakképzettség (6 elem)</li><li><span class="os-kulcs">IV/2</span> 4 szerző: Mayo, Maslow (5 szinten), McGregor (X/Y), Lewin (3 fázis)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Vezetési stílusok (IV/3-6)</div><ul class="os-lista"><li><span class="os-kulcs">IV/3</span> Lewin: autokrata vs. demokrata vs. laissez-faire</li><li><span class="os-kulcs">IV/4</span> Likert 4: kizsákmányoló → jóságos → konzultatív → részvételi · SWOT</li><li><span class="os-kulcs">IV/5</span> Blake-Mouton: 9.9 csapatvezető ideális · stratégiai tervezés 5 elem</li><li><span class="os-kulcs">IV/6</span> Döntéstípusok 5 + delegálás</li></ul></div><div class="os-szek"><div class="os-szek-cim">Vezetési funkciók (IV/7-9)</div><ul class="os-lista"><li><span class="os-kulcs">IV/7</span> Fayol 4 funkció: tervezés, szervezés, vezetés, ellenőrzés</li><li><span class="os-kulcs">IV/8</span> Ellenőrzés tárgya (eredmény, folyamat, erőforrás, törvény) és típusai</li><li><span class="os-kulcs">IV/9</span> Koordinációs eszközök 5 + javadalmazás 5 elem</li></ul></div><div class="os-szek"><div class="os-szek-cim">Modern eszközök (IV/10-13)</div><ul class="os-lista"><li><span class="os-kulcs">IV/10</span> E-szolgáltatás 5 szint: tájékoztatás → tranzakció → személyre szabás</li><li><span class="os-kulcs">IV/11</span> Projekt: 5 fázis + LFA logikai keret</li><li><span class="os-kulcs">IV/12</span> Változás: Lewin 3 fázis + Kotter fogadtatás</li><li><span class="os-kulcs">IV/13</span> Munkanap-fényképezés: 4 lépés</li></ul></div><div class="os-szek"><div class="os-szek-cim">Csoport- és HR-menedzsment (IV/14-19)</div><ul class="os-lista"><li><span class="os-kulcs">IV/14</span> Tuckman 5 fázis (forming-storming-norming-performing-adjourning) + Belbin szerepek</li><li><span class="os-kulcs">IV/15-16</span> Brainstorming vs. nominál csoport</li><li><span class="os-kulcs">IV/17</span> Álláshely-alapú létszámgazdálkodás (Kit.) + interjú 4 szakasz</li><li><span class="os-kulcs">IV/18</span> HR-áramlás 4 modell + EE-gazdálkodás 5 szakasz</li><li><span class="os-kulcs">IV/19</span> Életpálya-menedzsment: munkaerőhiány/többlet + felmentési védelem</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">IV. modul — 19 tétel — jelentős mennyiség. Most már 56 tételt tudsz az 5 modulból (16+12+9+19 = 56). Még az V. modul a 10 tételével!</div></div>';
OSSZEF.h13='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 13. Hét</div><div class="os-bevez-cim">I-IV. modul · Keresztismétlés</div><div class="os-bevez-alcim">A gyenge pontokra fókuszálva</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">Tipikus „elcsúsztatható" részek</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Évszámok és időpontok</div><ul class="os-lista"><li><span class="os-kulcs">1222</span> Aranybulla · <span class="os-kulcs">1514</span> Tripartitum · <span class="os-kulcs">1848</span> áprilisi tv. · <span class="os-kulcs">1867</span> kiegyezés</li><li><span class="os-kulcs">1949</span> szocialista alkotmány · <span class="os-kulcs">1989</span> rendszerváltó módosítás · <span class="os-kulcs">2011</span> Alaptörvény</li><li><span class="os-kulcs">2018</span> Ákr. hatálybalépés · <span class="os-kulcs">2020</span> közigazgatási bíráskodás reform</li></ul></div><div class="os-szek"><div class="os-szek-cim">Mandátumok hosszai</div><ul class="os-lista"><li><span class="os-kulcs">Köztárs. elnök</span> 5 év · <span class="os-kulcs">Ogy képviselő</span> 4 év · <span class="os-kulcs">Önkorm.</span> 5 év</li><li><span class="os-kulcs">Alkotmánybíró</span> 12 év (nem újra) · <span class="os-kulcs">ÁSZ elnök</span> 12 év · <span class="os-kulcs">Legfőbb ügyész</span> 9 év</li><li><span class="os-kulcs">OBH elnök</span> 9 év</li></ul></div><div class="os-szek"><div class="os-szek-cim">Választási szótöbbség</div><ul class="os-lista"><li><span class="os-kulcs">Egyszerű többség</span>: sok tisztség (miniszterelnök, polgármester)</li><li><span class="os-kulcs">2/3-os</span>: Alaptörvény, sarkalatos tv., AB, ÁSZ, Kúria, legfőbb ügyész</li></ul></div><div class="os-szek"><div class="os-szek-cim">5+5+4+4 vagy 7+12 ... rejtélyes számok</div><ul class="os-lista"><li><span class="os-kulcs">I. modul</span>: Ogy 199 fő · Bíróság 4 szint · 19 vármegye · 5 elkül. pénzalap</li><li><span class="os-kulcs">IV. modul</span>: POSDCORB 7 elem · Likert 4 stílus · Lewin 3 fázis · Tuckman 5 fázis · Maslow 5 szint · McGregor 2 elmélet · E-szolg. 5 szint · HR 4 modell</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Még 2 hét, és az V. modul is a tied lesz! Erősítsd meg a gyenge pontokat — minden évszám, név, szám fontos lehet.</div></div>';
OSSZEF.h14='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 14. Hét</div><div class="os-bevez-cim">V. Modul — kezdés</div><div class="os-bevez-alcim">EU szervezete és működése · V/1—V/8.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/1.</div><div class="os-tetel-cim">Lisszaboni Szerződés és EU bővítései</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Lisszaboni Szerződés (<span class="os-ev">2009</span>)</div><ul class="os-lista"><li><span class="os-kulcs">Reform</span> a 2005-ös alkotmány-tervezet kudarca után</li><li><span class="os-kulcs">Hatályba lépés</span>: 2009. december 1.</li><li><span class="os-kulcs">Új intézmények</span>: Európai Tanács elnöke, Külügyi Főképviselő</li><li><span class="os-kulcs">Alapjogi Charta</span> kötelező jellege</li><li><span class="os-kulcs">Kilépési klauzula</span> (50. cikk) — Brexit alapja</li></ul></div><div class="os-szek"><div class="os-szek-cim">Bővítési körök</div><ol class="os-szam"><li><span class="os-kulcs">1957</span> Római Szerződés — 6 alapító tag</li><li><span class="os-kulcs">1973</span> Északi: UK, Írország, Dánia</li><li><span class="os-kulcs">1981</span> Görögország · <span class="os-kulcs">1986</span> Spanyolo., Portug. (mediterrán)</li><li><span class="os-kulcs">1995</span> Ausztria, Finnország, Svédország</li><li><span class="os-kulcs">2004</span> <span class="os-tul">Big Bang</span> — 10 új tag (köztük Magyarország!)</li><li><span class="os-kulcs">2007</span> Románia, Bulgária · <span class="os-kulcs">2013</span> Horvátország</li></ol></div><div class="os-szek"><div class="os-szek-cim">Mérföldkövek</div><ul class="os-lista"><li><span class="os-kulcs">Üres székek politikája</span> (1965) — francia tiltakozás → luxemburgi kompromisszum (1966)</li><li><span class="os-kulcs">Fehér Könyv</span> (1985) + <span class="os-kulcs">Egységes Európai Okmány</span> (1986) — belső piac</li><li><span class="os-kulcs">Maastricht</span> (1992) — EU létrejötte, euró</li><li><span class="os-kulcs">Lisszabon</span> (2007/2009) — jelenlegi forma</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/2.</div><div class="os-tetel-cim">Uniós jog elsődleges forrásai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Elsődleges források</div><ol class="os-szam"><li><span class="os-kulcs">Alapító szerződések</span> — EUSZ, EUMSZ</li><li><span class="os-kulcs">Csatlakozási szerződések</span> — minden új tagországnál</li><li><span class="os-kulcs">Alapjogi Charta</span> (Lisszabon óta)</li><li><span class="os-kulcs">Általános jogelvek</span> — Bíróság fejlesztette ki</li></ol></div><div class="os-szek"><div class="os-szek-cim">Másodlagos jogforrások</div><div class="os-grid"><div><div class="alcim">Rendelet</div><span class="os-kulcs">Közvetlenül alkalmazandó</span> — minden tagállamban kötelező</div><div><div class="alcim">Irányelv</div><span class="os-kulcs">Eredményt</span> kötelez — átültetés tagállamonként</div><div><div class="alcim">Határozat</div><span class="os-kulcs">Konkrét címzett</span>re kötelező</div><div><div class="alcim">Ajánlás/Vélemény</div><span class="os-kulcs">Nem kötelező</span> — soft law</div></div></div><div class="os-szek"><div class="os-szek-cim">Uniós és belső jog viszonya</div><ul class="os-lista"><li><span class="os-kulcs">Elsőbbség</span> — uniós jog megelőzi a tagállami jogot (Costa v. ENEL, 1964)</li><li><span class="os-kulcs">Közvetlen hatály</span> — egyén közvetlenül hivatkozhat (Van Gend en Loos, 1963)</li><li><span class="os-kulcs">Állami felelősség</span> — Francovich-elv</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/3.</div><div class="os-tetel-cim">Uniós alapjogvédelem</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Kialakulása</div><ul class="os-lista"><li>Eredeti szerződések <span class="os-kulcs">nem tartalmaztak</span> alapjogvédelmet</li><li><span class="os-kulcs">Bírósági gyakorlat</span>: Stauder (1969), Internationale Handelsgesellschaft (1970)</li><li><span class="os-kulcs">Alapelvként</span> fejlődött ki általános jogelvekből</li><li><span class="os-kulcs">Alapjogi Charta</span> (2000) — Lisszabon óta <span class="os-tul">kötelező</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Alapjogi Charta</div><ul class="os-lista"><li>7 fejezet, 54 cikk</li><li>Fejezetek: <span class="os-kulcs">méltóság, szabadság, egyenlőség, szolidaritás, polgári jogok, igazságszolgáltatás</span></li><li><span class="os-kulcs">Alkalmazási kör</span>: csak ha tagállam uniós jogot alkalmaz</li><li><span class="os-kulcs">EJEE</span> (Emberi Jogok Európai Egyezménye) — kapcsolódó, de külön rendszer</li></ul></div><div class="os-szek"><div class="os-szek-cim">Koppenhágai kritériumok (<span class="os-ev">1993</span>)</div><ul class="os-lista"><li><span class="os-kulcs">Politikai</span>: demokrácia, jogállam, kisebbségvédelem</li><li><span class="os-kulcs">Gazdasági</span>: működő piacgazdaság</li><li><span class="os-kulcs">Acquis átvétele</span>: az uniós joganyag elfogadása</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/4.</div><div class="os-tetel-cim">Az EU intézményei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az 5 fő intézmény</div><ol class="os-szam"><li><span class="os-kulcs">Európai Tanács</span> — állam-/kormányfők, <span class="os-tul">stratégia</span> · elnök 2,5 év · KORMÁNYKÖZI</li><li><span class="os-kulcs">Tanács (Miniszterek Tanácsa)</span> — szakminiszterek · <span class="os-tul">jogalkotás</span> · KORMÁNYKÖZI</li><li><span class="os-kulcs">Európai Bizottság</span> — 27 biztos · <span class="os-tul">jogszabály-javaslat</span> · SZUPRANACIONÁLIS</li><li><span class="os-kulcs">Európai Parlament</span> — 720 EP-képviselő · <span class="os-tul">együttdöntés</span> · SZUPRANACIONÁLIS</li><li><span class="os-kulcs">EU Bíróság</span> — Bíróság + Törvényszék · <span class="os-tul">jogértelmezés</span> · SZUPRANACIONÁLIS</li></ol></div><div class="os-szek"><div class="os-szek-cim">További intézmények</div><ul class="os-lista"><li><span class="os-kulcs">Európai Számvevőszék</span> — pénzügyi ellenőrzés</li><li><span class="os-kulcs">EKB</span> — Európai Központi Bank, euró</li><li><span class="os-kulcs">Gazdasági és Szociális Bizottság</span> (EGSZB) — tanácsadó</li><li><span class="os-kulcs">Régiók Bizottsága</span> (RB) — tanácsadó</li></ul></div><div class="os-szek"><div class="os-szek-cim">Bizottság szerepe</div><ul class="os-lista"><li><span class="os-kulcs">Szerződések őre</span> — végrehajtás felügyelete</li><li><span class="os-kulcs">Integráció motorja</span> — jogszabály-javaslatok</li><li><span class="os-kulcs">EU képviselete</span> — külkapcsolatokban</li><li><span class="os-kulcs">Komitológia</span> — delegált jogalkotás</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/5.</div><div class="os-tetel-cim">Uniós jogalkotás folyamata</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A rendes jogalkotási eljárás</div><ol class="os-szam"><li><span class="os-kulcs">Bizottság javaslata</span> — kizárólagos kezdeményezési jog</li><li><span class="os-kulcs">Első olvasat</span> — EP és Tanács</li><li><span class="os-kulcs">Második olvasat</span> — ha eltérnek</li><li><span class="os-kulcs">Egyeztető bizottság</span> — ha még mindig eltérnek</li><li><span class="os-kulcs">Harmadik olvasat</span> — végső döntés</li></ol></div><div class="os-szek"><div class="os-szek-cim">Tagállami parlamentek szerepe</div><ul class="os-lista"><li><span class="os-kulcs">Szubszidiaritás-vizsgálat</span> — 8 hét</li><li><span class="os-kulcs">Sárga lap</span> — ha 1/3 ellenez</li><li><span class="os-kulcs">Narancssárga lap</span> — ha 1/2 ellenez</li><li><span class="os-kulcs">Magyar érintettség</span>: Ogy Európai Ügyek Biz.</li></ul></div><div class="os-szek"><div class="os-szek-cim">Civil részvétel</div><ul class="os-lista"><li><span class="os-kulcs">Polgári kezdeményezés</span> — 1 millió aláírás 7 országból</li><li><span class="os-kulcs">Petíciós jog</span> — EP Petíciós Biz.</li><li><span class="os-kulcs">EP biztos</span> (ombudsman) — rossz közigazgatás vizsgálata</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/6.</div><div class="os-tetel-cim">EU többéves pénzügyi keret</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A MFF (Multiannual Financial Framework)</div><ul class="os-lista"><li><span class="os-kulcs">7 éves</span> költségvetési keret</li><li>Jelenlegi: <span class="os-kulcs">2021-2027</span></li><li>Volumen: kb. 1100 milliárd EUR + NextGenerationEU (750 mrd)</li><li>Tanács <span class="os-kulcs">egyhangú</span> döntése, EP egyetértése</li></ul></div><div class="os-szek"><div class="os-szek-cim">EU bevételei (saját források)</div><ol class="os-szam"><li><span class="os-kulcs">Vámbevételek</span> (harmadik országokból)</li><li><span class="os-kulcs">HÉA-alapú</span> hozzájárulás (kis arány)</li><li><span class="os-kulcs">GNI-alapú</span> (legnagyobb, kb. 70%)</li><li><span class="os-kulcs">Új</span> (2021-től): műanyag-csomagolási befizetés</li></ol></div><div class="os-szek"><div class="os-szek-cim">Gazdaságpolitikai koordináció</div><ul class="os-lista"><li><span class="os-kulcs">Európai szemeszter</span> — éves ciklus</li><li><span class="os-kulcs">Stabilitási és Növekedési Paktum</span> (SNP)</li><li><span class="os-kulcs">Túlzott deficit eljárás</span> — 3% GDP, 60% adósság</li><li><span class="os-kulcs">Eurózóna</span> — közös valuta, EKB monetáris politika</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/7.</div><div class="os-tetel-cim">Hatáskör-átruházás és uniós hatáskörök</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az átruházás elve (EUSZ 5. cikk)</div><ul class="os-lista"><li>Az EU <span class="os-kulcs">csak akkor</span> járhat el, ha a tagállamok <span class="os-tul">hatáskört átruháztak</span></li><li>Konkrét felhatalmazás kell — <span class="os-kulcs">attribuált hatáskör</span></li><li><span class="os-kulcs">Szubszidiaritás</span> és <span class="os-kulcs">arányosság</span> korlátai</li></ul></div><div class="os-szek"><div class="os-szek-cim">Hatáskörök 3 fő típusa</div><ol class="os-szam"><li><span class="os-kulcs">Kizárólagos EU</span>: vámunió, közös ker.politika, monetáris (eurózóna), versenyjog</li><li><span class="os-kulcs">Megosztott</span>: belső piac, mezőgazdaság, energetika, fogyasztóvédelem, környezetvédelem</li><li><span class="os-kulcs">Támogató/koordináló</span>: egészségügy, oktatás, ipar, kultúra</li></ol></div><div class="os-szek"><div class="os-szek-cim">Rugalmassági klauzula</div><ul class="os-lista"><li><span class="os-kulcs">EUMSZ 352. cikk</span> — egyhangú döntéssel új területre</li><li><span class="os-kulcs">Beleértett hatáskör</span> — Bíróság fejlesztette ki</li><li><span class="os-kulcs">Külpolitika</span> — speciális hatásköri rendszer</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/8.</div><div class="os-tetel-cim">EU regionális politikák</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A regionális politika célja</div><ul class="os-lista"><li><span class="os-kulcs">Kohézió</span> — gazdasági/társadalmi egyenlőtlenségek mérséklése</li><li><span class="os-kulcs">Strukturális alapok</span> és Kohéziós Alap</li><li><span class="os-kulcs">Magyarország</span> nettó haszonélvező</li></ul></div><div class="os-szek"><div class="os-szek-cim">Alapok</div><ol class="os-szam"><li><span class="os-kulcs">ERFA</span> — Európai Regionális Fejlesztési Alap</li><li><span class="os-kulcs">ESZA+</span> — Európai Szociális Alap (humán fejlesztés)</li><li><span class="os-kulcs">Kohéziós Alap</span> — alacsonyabb GDP-jű tagok</li><li><span class="os-kulcs">EMVA</span> — Vidékfejlesztés</li><li><span class="os-kulcs">ETHA</span> — Halászati Alap</li></ol></div><div class="os-szek"><div class="os-szek-cim">KAP (Közös Agrárpolitika)</div><ul class="os-lista"><li><span class="os-kulcs">1962</span> óta működik</li><li><span class="os-kulcs">2 pillér</span>: közvetlen kifizetések + vidékfejlesztés</li><li><span class="os-kulcs">Reform 2023-</span>: zöldebb, fiatal gazdák, technológia</li></ul></div><div class="os-szek"><div class="os-szek-cim">Közbeszerzés és transzeurópai hálózatok</div><ul class="os-lista"><li><span class="os-kulcs">Közbeszerzési irányelvek</span> — átláthatóság, versenyalapú</li><li><span class="os-kulcs">TEN-T</span> (közlekedés), <span class="os-kulcs">TEN-E</span> (energia), <span class="os-kulcs">TEN-Telecom</span></li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Az V. modul a legtágasabb — uniós intézmények, jogforrások, hatáskörök. Készíts intézmény-térképet: ki kicsoda, mit csinál?</div></div>';
OSSZEF.h15='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 15. Hét</div><div class="os-bevez-cim">V. Modul (befejezés)</div><div class="os-bevez-alcim">EU külpolitika és magyar kapcsolat · V/9—V/10.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/9.</div><div class="os-tetel-cim">EU közös kül- és biztonságpolitika (KKBP)</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">KKBP alapelvei</div><ul class="os-lista"><li><span class="os-kulcs">Egyhangú döntéshozatal</span> — Tanácsban (nem rendes jogalkotás)</li><li><span class="os-kulcs">Külügyi Főképviselő</span> vezeti (Mogherini, majd Borrell, jelenleg Kallas)</li><li><span class="os-kulcs">Európai Külügyi Szolgálat</span> (EEAS) támogatja</li><li><span class="os-kulcs">Kettős mandátum</span>: főképv. + Bizottság alelnöke</li></ul></div><div class="os-szek"><div class="os-szek-cim">Főbb eszközök</div><ol class="os-szam"><li><span class="os-kulcs">Nemzetközi megállapodások</span> kötése (Tanács dönt)</li><li><span class="os-kulcs">Szankciók</span> (gazdasági, diplomáciai)</li><li><span class="os-kulcs">Békefenntartás</span> — civil és katonai missziók</li><li><span class="os-kulcs">Fejlesztési együttműködés</span> — humanitárius segítségnyújtás</li><li><span class="os-kulcs">Diplomáciai képviseletek</span> (EEAS)</li></ol></div><div class="os-szek"><div class="os-szek-cim">További politikák</div><ul class="os-lista"><li><span class="os-kulcs">Kereskedelempolitika</span> — kizárólagos EU hatáskör (Lisszabon óta)</li><li><span class="os-kulcs">Bővítési politika</span> — koppenhágai krit. + tárgyalási fejezetek</li><li><span class="os-kulcs">Szomszédságpolitika</span> (ENP) — keleti és déli partnerség</li><li><span class="os-kulcs">Védelempolitika</span> (KBVP) — PESCO, Európai Védelmi Alap</li></ul></div><div class="os-szek"><div class="os-szek-cim">Aktuális válságok</div><ul class="os-lista"><li><span class="os-kulcs">Brexit</span> utáni viszony</li><li><span class="os-kulcs">Ukrajna háború</span> — szankciók, fegyverzet, energiaválság</li><li><span class="os-kulcs">Migráció</span> — közös menekültpolitika</li><li><span class="os-kulcs">Klímavédelem</span> — European Green Deal</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/10.</div><div class="os-tetel-cim">Uniós és magyar közigazgatás kapcsolata</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Magyarország-EU történet</div><ul class="os-lista"><li><span class="os-kulcs">1988</span> Diplomáciai kapcsolatok felvétele</li><li><span class="os-kulcs">1991</span> Társulási megállapodás</li><li><span class="os-kulcs">1994</span> Csatlakozási kérelem</li><li><span class="os-kulcs">1998</span> Tárgyalások kezdete</li><li><span class="os-kulcs">2003. ápr. 12.</span> Csatlakozási népszavazás (83.76% igen)</li><li><span class="os-kulcs">2004. máj. 1.</span> Tagság!</li><li><span class="os-kulcs">2011. első félév</span> Magyar elnökség</li><li><span class="os-kulcs">2024. második félév</span> Második magyar elnökség</li></ul></div><div class="os-szek"><div class="os-szek-cim">Hazai EU-koordináció</div><ul class="os-lista"><li><span class="os-kulcs">Európai Koordinációs Tárcaközi Bizottság (EKTB)</span> — fő szerv</li><li><span class="os-kulcs">Külügyminisztérium</span> (EU Ügyek Államtitkársága)</li><li><span class="os-kulcs">Miniszterelnökség</span> — EU stratégia</li><li><span class="os-kulcs">Magyar EU-állandó képviselet</span> (Brüsszel)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Magyarország szerepe az EU-ban</div><ul class="os-lista"><li><span class="os-kulcs">Európai Parlament</span>: 21 magyar EP-képviselő</li><li><span class="os-kulcs">Európai Bizottság</span>: 1 magyar biztos (jelenleg: Várhelyi Olivér)</li><li><span class="os-kulcs">Európai Tanács</span>: miniszterelnök</li><li><span class="os-kulcs">Tanács</span>: miniszterek szakterületenként</li><li><span class="os-kulcs">Régiók Bizottsága</span> és <span class="os-kulcs">EGSZB</span>: magyar küldöttek</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az Ogy szerepe az Európa-politikában</div><ul class="os-lista"><li><span class="os-kulcs">Európai Ügyek Bizottsága</span> (EÜB)</li><li><span class="os-kulcs">Szubszidiaritás-vizsgálat</span> (sárga lap)</li><li><span class="os-kulcs">Mandátumadás</span> a miniszterelnöknek EU Tanácshoz</li><li><span class="os-kulcs">Ratifikáció</span> nemzetközi szerződéseknél</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">V. modul kész! 66 tételt tudsz mind az 5 modulból. Még 4 hét tart a felkészülés — most már csak az ismétlés van hátra.</div></div>';
OSSZEF.h16='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 16. Hét</div><div class="os-bevez-cim">V. Modul + Összes</div><div class="os-bevez-alcim">Teljes V. modul + korábbi tételek áttekintése</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">V. modul kompakt áttekintés</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 10 tétel egy oldalon</div><ul class="os-lista"><li><span class="os-kulcs">V/1</span> Lisszabon (2009) + bővítések: 1957→1973→1981/86→1995→2004(Big Bang)→2007→2013</li><li><span class="os-kulcs">V/2</span> Elsődleges: szerződések + Charta + általános jogelvek · Másodlagos: rendelet/irányelv/határozat</li><li><span class="os-kulcs">V/3</span> Alapjogvédelem: Bíróság fejlesztette → 2000 Charta → 2009 kötelező · Koppenhágai krit.</li><li><span class="os-kulcs">V/4</span> 5 intézmény: Eu.Tanács · Tanács · Bizottság · EP · Bíróság (kormányközi vs. szupranac.)</li><li><span class="os-kulcs">V/5</span> Jogalkotás: Bizottság javasol → EP+Tanács dönt · Polgári kezdeményezés (1M aláírás)</li><li><span class="os-kulcs">V/6</span> MFF 7 éves · saját források: vám, ÁFA, GNI · Európai szemeszter</li><li><span class="os-kulcs">V/7</span> Hatáskörök: kizárólagos · megosztott · támogató (szubszidiaritás)</li><li><span class="os-kulcs">V/8</span> Regionális: ERFA, ESZA+, Kohéziós, EMVA, ETHA · KAP 2 pillér</li><li><span class="os-kulcs">V/9</span> KKBP: Külügyi Főképviselő · egyhangúság · szankciók, missziók</li><li><span class="os-kulcs">V/10</span> Mo-EU: 2004 csatlakozás · EKTB · 21 EP-képviselő · 2024 elnökség</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">Összes modul kulcsmodelljei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Számokban</div><ul class="os-lista"><li><span class="os-kulcs">I. modul</span
