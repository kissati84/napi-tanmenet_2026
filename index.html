></li><li><span class="os-kulcs">Rendes jogalkotási eljárásban</span> a Tanács mellett társ-jogalkotó</li><li>Az <span class="os-kulcs">uniós éves költségvetést</span> különleges jogalkotási eljárás keretében határozza meg</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/5.</div><div class="os-tetel-cim">Az uniós jogalkotás folyamata</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A rendes jogalkotási eljárás (vázlatosan)</div><ul class="os-lista"><li><span class="os-kulcs">Bizottság javaslata</span> — kizárólagos kezdeményezési jog</li><li><span class="os-kulcs">EP és Tanács társ-jogalkotó</span></li><li>A jogalkotás <span class="os-kulcs">a tagállami parlamentek</span> számára is biztosítja a részvételt</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az uniós intézmények szerepe</div><ul class="os-lista"><li><span class="os-kulcs">Bizottság</span> — javaslat</li><li><span class="os-kulcs">Tanács</span> — társ-jogalkotó</li><li><span class="os-kulcs">Parlament</span> — társ-jogalkotó</li></ul></div><div class="os-szek"><div class="os-szek-cim">Tagállami parlamentek szerepe</div><ul class="os-lista"><li><span class="os-kulcs">Szubszidiaritás-vizsgálat</span></li><li>A nemzeti parlamentek érdemi részvétele a jogalkotási folyamatban</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/6.</div><div class="os-tetel-cim">Az uniós többéves pénzügyi keret</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A többéves pénzügyi keret</div><ul class="os-lista"><li><span class="os-kulcs">Hosszú távú</span> költségvetési keret</li><li>Az EU költségvetés tervezésének alapja</li><li>A keret gyakorlati megvalósulása az <span class="os-kulcs">éves költségvetéseken</span> keresztül történik</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/7.</div><div class="os-tetel-cim">A hatáskör-átruházás elve és az uniós hatáskörök rendszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A hatáskör-átruházás elve</div><ul class="os-lista"><li>Az EU <span class="os-kulcs">csak a Szerződésekben kifejezetten ráruházott hatáskörök</span> szerint járhat el</li><li>A <span class="os-kulcs">beleértett uniós hatáskörök doktrínája</span> — a Bíróság fejlesztette ki: ha a Szerződés feladattal bíz meg egy intézményt, a teljesítéshez nélkülözhetetlen hatáskört is biztosítja</li></ul></div><div class="os-szek"><div class="os-szek-cim">A hatáskörgyakorlás elvei (2. sz. jegyzőkönyv)</div><div class="os-grid"><div><div class="alcim">Szubszidiaritás elve</div>A nem kizárólagos uniós hatáskörbe tartozó területeken — az unió <span class="os-kulcs">csak akkor és annyiban jár el</span>, amikor és amennyiben a tagállamok (központi, regionális, helyi) <span class="os-tul">nem tudják kielégítően megvalósítani</span> a célt</div><div><div class="alcim">Arányosság elve</div>Az uniós intézkedések <span class="os-kulcs">sem formailag, sem tartalmilag nem terjeszkedhetnek túl azon</span>, ami a célok eléréséhez szükséges</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/8.</div><div class="os-tetel-cim">Az EU regionális politikáinak rendszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az uniós regionális politika célja</div><ul class="os-lista"><li><span class="os-kulcs">Az elmaradottabb régiók felzárkóztatása</span></li><li>Az <span class="os-kulcs">EU egyes régiói közötti fejlettségi különbségek csökkentése</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A regionális politika megvalósítása</div><ul class="os-lista"><li><span class="os-kulcs">Statisztikai-tervezési egységek</span> (<span class="os-tul">NUTS</span> rendszer)</li><li><span class="os-kulcs">Régiók Bizottsága</span> — regionális és helyi szervezetek bevonása</li><li><span class="os-kulcs">Konvergencia régiók</span>: uniós GDP-átlag 75%-a alatti régiók</li><li><span class="os-kulcs">1975-óta ERFA</span> (Európai Regionális Fejlesztési Alap)</li><li><span class="os-kulcs">Partnerség elve</span> — a források felhasználásába be kell vonni a régiókat</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az eszközök</div><ol class="os-szam"><li><span class="os-kulcs">Strukturális alapok (2007-)</span>: ERFA + <span class="os-kulcs">ESZA</span> (Európai Szociális Alap) — foglalkoztatási projektek</li><li><span class="os-kulcs">Kohéziós Alap</span> — környezetvédelmi, közlekedési, szállítási infrastruktúra</li><li><span class="os-kulcs">Szakpolitikai alapok</span>: <span class="os-kulcs">EMVA</span> (Mezőgazdasági és Vidékfejlesztési Alap), <span class="os-kulcs">EHA</span> (Halászati Alap)</li></ol></div><div class="os-szek"><div class="os-szek-cim">A regionális politika költségvetése</div><ul class="os-lista"><li><span class="os-kulcs">Uniós költségvetési kiadások harmada</span> — a legnagyobb el- és újraelosztó politika</li><li><span class="os-kulcs">Magyarország csatlakozása óta nettó haszonélvező</span></li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">V. modul első része! Az EU intézmények és jogforrások a fejedben. Tipikus tévedés: <span class="os-kulcs">Európai Tanács vs. Tanács vs. Európa Tanács</span> — három különböző szerv!</div></div>';
OSSZEF.h15='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 15. Hét</div><div class="os-bevez-cim">V. Modul — befejezés</div><div class="os-bevez-alcim">KKBP és magyar—uniós viszony · V/9—V/10.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/9.</div><div class="os-tetel-cim">Az EU közös kül- és biztonságpolitikája (KKBP)</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A főképviselő</div><ul class="os-lista"><li><span class="os-kulcs">„Kettős kalap"</span>: <span class="os-tul">Bizottság alelnöke</span> + <span class="os-tul">Külügyek Tanácsának vezetője</span></li><li>Feladata: hagyományos diplomáciai tevékenységek + különböző <span class="os-kulcs">külpolitikai eszközök koordinálása</span> (segélyezés, kereskedelem, humanitárius segítségnyújtás, válságreagálás)</li><li><span class="os-kulcs">Európai Védelmi Ügynökség</span> és <span class="os-kulcs">EU Biztonságpolitikai Kutatóintézet</span> irányítása</li></ul></div><div class="os-szek"><div class="os-szek-cim">Európai Külügyi Szolgálat (EEAS)</div><ul class="os-lista"><li>Feladata az <span class="os-kulcs">EU külügyi politikájának végrehajtása</span> és a főképviselő támogatása</li><li>Három fő terület: <span class="os-tul">KKBP irányítása</span>, <span class="os-tul">Külügyek Tanácsa elnöki tisztségének ellátása</span>, <span class="os-tul">Bizottság alelnöki tiszte ellátása</span></li><li>Hozzájárul a Tanács Főtitkársága, Bizottság, tagállami diplomáciai szolgálatok munkájához</li></ul></div><div class="os-szek"><div class="os-szek-cim">A Lisszaboni Szerződés újításai (KBVP)</div><ul class="os-lista"><li><span class="os-kulcs">Állandó strukturált együttműködés</span></li><li><span class="os-kulcs">Kölcsönös segítségnyújtási klauzula</span></li><li><span class="os-kulcs">Szolidaritási klauzula</span></li><li><span class="os-kulcs">Start up pénzügyi alap</span></li><li>Az ún. közös biztonság- és védelempolitika (KBVP) elnevezésben a <span class="os-kulcs">közös jelző</span> jelzi a közös uniós védelempolitika kialakítását mint távlati célt</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/10.</div><div class="os-tetel-cim">Az uniós és a magyar közigazgatás kapcsolata</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A közvetett és közvetlen végrehajtás</div><div class="os-grid"><div><div class="alcim">Közvetett végrehajtás</div>A közösségi jogi normák <span class="os-kulcs">tagállami jogalkalmazók által történő végrehajtása</span>; érvényesül a <span class="os-tul">szervezetalakítási szabadság</span> és a <span class="os-tul">tagállami autonómia elve</span></div><div><div class="alcim">Közvetlen végrehajtás</div><span class="os-kulcs">Az unió közvetlenül hajtja végre</span> az uniós jogot; erősödik az uniós szervek szerepe</div></div></div><div class="os-szek"><div class="os-szek-cim">„Együttes igazgatás"</div><ul class="os-lista"><li>Az uniós és tagállami szervek <span class="os-kulcs">egyre több területen együttműködve</span> látják el az uniós normák végrehajtását</li><li><span class="os-kulcs">Európai Közigazgatási Térség (EKT)</span> — az unió intézményei és a tagállamok közigazgatása összekapcsolódva</li></ul></div><div class="os-szek"><div class="os-szek-cim">Magyarországgal szemben támasztott általános követelmények</div><ul class="os-lista"><li><span class="os-kulcs">Demokratikus jogállamiság</span></li><li><span class="os-kulcs">Szolidaritás eszméjét érvényre juttató szociális piacgazdaság</span></li><li><span class="os-kulcs">Tagállami képviseleti szervek súlyának csökkentése</span></li><li><span class="os-kulcs">Megbízható, átlátható, demokratikus közigazgatás</span> — professzionális, pártatlan, szakképzett köztisztviselők</li></ul></div><div class="os-szek"><div class="os-szek-cim">Helyi önkormányzatokkal kapcsolatos uniós elvárások</div><ul class="os-lista"><li><span class="os-kulcs">Helyi Önkormányzatok Európai Chartája</span> (<span class="os-tul">Európa Tanács 1985, magyar kihirdetés 1997</span>)</li><li>Szabadon alakíthatják belső szervezetüket, jól képzett személyzet, állami felügyelet, pénzügyi források, társulási jog</li></ul></div><div class="os-szek"><div class="os-szek-cim">A tagállami közig. minőségére vonatkozó uniós követelmények</div><ul class="os-lista"><li><span class="os-kulcs">Hatékony és egyenértékű jogvédelem elve</span> — az Európai Bíróság gyakorlatában</li><li><span class="os-kulcs">Közigazgatási döntések bíróság előtti megtámadása</span> — Emberi Jogok Európai Egyezménye, Alapjogi Charta</li><li><span class="os-kulcs">„Megfelelő ügyintézéshez való jog"</span>: részrehajlás nélkül, tisztességesen, ésszerű időn belül; meghallgatás, iratbetekintés, nyelvhasználat, indokolási kötelezettség, jóvátételi kötelezettség</li></ul></div><div class="os-szek"><div class="os-szek-cim">EU a hazai intézményekben (időrendben)</div><ul class="os-lista"><li><span class="os-kulcs">2004—2006</span>: Miniszterelnöki Hivatal — tárca nélküli miniszter</li><li><span class="os-kulcs">2006—2014</span>: Külügyminisztérium / Külgazdasági és Külügyminisztérium — önálló államtitkárság</li><li><span class="os-kulcs">2014—</span>: először Miniszterelnökséget vezető miniszter, majd igazságügyi miniszter; brüsszeli állandó képviselet is áthelyezve</li><li><span class="os-kulcs">2023—</span>: Európai Uniós Ügyek Minisztériuma, majd Közigazgatási és Területfejlesztési Minisztérium létrehozása</li><li><span class="os-kulcs">2024 második félév</span>: második magyar EU-elnökség</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">V. modul kész! Mind a 66 tétel a fejedben (16+12+9+19+10). A hátralévő hetekben már csak ismétlés van — nem új anyag.</div></div>';
OSSZEF.h16='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 16. Hét</div><div class="os-bevez-cim">V. Modul + Összes</div><div class="os-bevez-alcim">A 10 tétel + minden modul áttekintése</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">V. modul — kompakt áttekintés</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 10 tétel kulcsfogalmai</div><ul class="os-lista"><li><span class="os-kulcs">V/1</span> Lisszabon (2007/2009): EP társ-jogalkotó · Eu.Tanács állandó elnöke · főképviselő · hárompilléres rendszer megszűnt · jogi személyiség · Eu. Ügyészség</li><li><span class="os-kulcs">V/2</span> Elsődleges források: EUSZ, EUMSZ + jegyzőkönyvek + ált. jogelvek + csatlakozási szerződések + Alapjogi Charta (Lisszabon óta)</li><li><span class="os-kulcs">V/3</span> Alapjogvédelem: 1960-as évek vége — Bíróság ált. jogelvként · Maastricht EUSZ-be · Lisszabon Alapjogi Charta + EJEE-csatlakozás (még nem) · Alapjogi Ügynökség (bécsi) · EUSZ 2. és 7. cikk</li><li><span class="os-kulcs">V/4</span> 4 intézmény (és jellegük): Eu.Tanács (kormányközi, politikai irány) · Tanács (kormányközi, társ-jogalkotó) · EB (szupranacionális, javaslat) · EP (szupranacionális, társ-jogalkotó, 5 év, min.6/max.96)</li><li><span class="os-kulcs">V/5</span> Jogalkotás: Bizottság javaslat · EP+Tanács társ-jogalkotó · tagállami parlamentek szubszidiaritás-vizsgálat</li><li><span class="os-kulcs">V/6</span> MFF: hosszú távú keret, éves költségvetéseken keresztül</li><li><span class="os-kulcs">V/7</span> Hatáskör-átruházás: kifejezetten ráruházott · beleértett doktrína · szubszidiaritás (nem kizárólagos területen) · arányosság (nem terjedhet túl)</li><li><span class="os-kulcs">V/8</span> Regionális politika: cél elmaradott régiók felzárkóztatása · NUTS · konvergencia régiók (75% alatt) · ERFA (1975-) · ESZA · Kohéziós Alap · EMVA · EHA · Mo. nettó haszonélvező</li><li><span class="os-kulcs">V/9</span> KKBP: főképviselő „kettős kalap" · EEAS 3 területen · Lisszabon újítások: állandó strukt. együttműködés, kölcsönös segítségnyújtás, szolidaritás, start up alap</li><li><span class="os-kulcs">V/10</span> Mo-EU: közvetett vs. közvetlen végrehajtás · EKT · Helyi Önkorm. Eu. Chartája (1985/1997) · 2024 II. magyar elnökség</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">Mind az 5 modul</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A teljes anyag számokban</div><ul class="os-lista"><li><span class="os-kulcs">I. modul</span> (16 tétel) — Központi állami szervek</li><li><span class="os-kulcs">II. modul</span> (12 tétel) — Jogalkotási és jogalkalmazási ismeretek</li><li><span class="os-kulcs">III. modul</span> (9 tétel) — Általános államháztartási ismeretek</li><li><span class="os-kulcs">IV. modul</span> (19 tétel) — Közigazgatás-szervezési és vezetési ismeretek</li><li><span class="os-kulcs">V. modul</span> (10 tétel) — Európai Unió szervezete, működése és jogrendszere</li><li>Összesen: <span class="os-kulcs">66 tétel</span> + a 10p és 5p kérdések</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Még 3 hét a vizsgáig (okt. 13.). Ismétlés és gyenge pontok pótlása — már nem új anyag jön!</div></div>';
OSSZEF.h17='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 17. Hét</div><div class="os-bevez-cim">I—II. modul stratégia</div><div class="os-bevez-alcim">A leggyengébb tételek célzott ismétlése</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">Ismétlési stratégia ezen a héten</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Ezen a héten — alapelv</div><ul class="os-lista"><li>NE olvasson új anyagot — <span class="os-kulcs">csak ismételjen</span></li><li>Vegye elő a <span class="os-kulcs">saját vázlatait</span> (gondolattérkép, kulcsszavak)</li><li>Próbálja meg <span class="os-kulcs">fejből</span> elmondani — csak akkor lapozzon, ha elakad</li><li>A gyenge pontokat <span class="os-kulcs">jelölje meg</span>, azokra figyeljen extra</li></ul></div><div class="os-szek"><div class="os-szek-cim">I—II. modul: amire most érdemes fókuszálni</div><ul class="os-lista"><li><span class="os-kulcs">I/1</span> Az alkotmányfejlődés időrendje — fejből: 1848 → 1944.12.21. → 1946:I → 1949:XX → 1989:XXXI → 2000:I</li><li><span class="os-kulcs">I/2</span> A 6 tárgyi alapjog-csoport és pontos Alaptörvény-cikkek</li><li><span class="os-kulcs">I/7-I/8</span> Köztárs.eln. ellenjegyzéshez kötött vs. NEM kötött hatáskörök</li><li><span class="os-kulcs">I/10</span> AB hatáskörei (II/3—II/11) — alkotmányjogi panasz (rendes + valódi)</li><li><span class="os-kulcs">II/2</span> A jogszabályi hierarchia 6 lépcsője pontosan</li><li><span class="os-kulcs">II/4</span> A jogalkotás 3 fő szakasza részletei (KÁT, FKB, törvényalkotási bizottság stb.)</li><li><span class="os-kulcs">II/6</span> Az Ákr. előzményei — 4 jogszabály időrendben (1957 → 1981 → 2004 → 2016)</li><li><span class="os-kulcs">II/10-II/12</span> Az Ákr. három eljárástípusa és határidői</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Ne félj attól, hogy elfelejtesz — a stressz a hibák legnagyobb forrása. Maradj nyugodt és bízz magadban!</div></div>';
OSSZEF.h18='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 18. Hét</div><div class="os-bevez-cim">III—IV. modul stratégia</div><div class="os-bevez-alcim">A leggyengébb tételek célzott ismétlése</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">III—IV. modul: amire most érdemes fókuszálni</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">III. modul kulcselemei</div><ul class="os-lista"><li><span class="os-kulcs">III/1</span> KT 3 tagja és vétójoga; az eljárás mozzanatai (átadás → döntési szak → végrehajtás-ellenőrzés)</li><li><span class="os-kulcs">III/2</span> Nemzeti vagyon 3 kategória (forgalomképtelen / korlátozottan / forgalomképes)</li><li><span class="os-kulcs">III/5</span> ÁSZ 12 év, 2/3, Ogynek felelős; főbb feladatok</li><li><span class="os-kulcs">III/7</span> Irányítási jogok 9 elem; irányítás vs. felügyelet (alapítói jog, jóváhagyás, egyedi utasítás kimarad a felügyeletből)</li><li><span class="os-kulcs">III/8-9</span> Önkorm. bevételek 3 csoport; kiadások 4 funkció</li></ul></div><div class="os-szek"><div class="os-szek-cim">IV. modul kulcselemei</div><ul class="os-lista"><li><span class="os-kulcs">IV/1</span> Weber 7 ideáltipikus jellemzője; weberi vs. neoweberiánus</li><li><span class="os-kulcs">IV/2</span> 4 emberközpontú szerző (Mayo, Maslow 1943, McGregor 1960, Lewin)</li><li><span class="os-kulcs">IV/3-IV/5</span> 3 vezetési stílus (Lewin), döntés- vs. személyiségközpontú</li><li><span class="os-kulcs">IV/7-IV/8</span> 4 vezetési funkció + ellenőrzés 3 dimenziója</li><li><span class="os-kulcs">IV/11</span> Projektciklus 4 fázisa a létrehozáson belül</li><li><span class="os-kulcs">IV/18</span> HR-áramlás 4 modellje (élethosszig, fel vagy ki, be vagy ki, vegyes)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Két modul a hét — érdemes két napra osztva ismételni. Vasárnap pihenj.</div></div>';
OSSZEF.h19='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 19. Hét</div><div class="os-bevez-cim">Utolsó szombat a vizsga előtt</div><div class="os-bevez-alcim">V. modul + záró stratégia</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">V. modul: amire most érdemes fókuszálni</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">V. modul kulcselemei</div><ul class="os-lista"><li><span class="os-kulcs">V/1</span> Lisszabon (2009): EP társ-jogalkotó, főképviselő, jogi személyiség, hárompilléres rendszer megszűnt</li><li><span class="os-kulcs">V/2</span> Elsődleges források (EUSZ + EUMSZ + jegyzőkönyvek + ált. jogelvek + csatlakozási szerz. + Alapjogi Charta)</li><li><span class="os-kulcs">V/4</span> 4 intézmény és jellegük (kormányközi vs. szupranacionális)</li><li><span class="os-kulcs">V/7</span> Hatáskör-átruházás + szubszidiaritás + arányosság</li><li><span class="os-kulcs">V/8</span> Regionális politika alapjai (ERFA, ESZA, Kohéziós Alap, EMVA, EHA)</li><li><span class="os-kulcs">V/10</span> Helyi Önkorm. Eu. Chartája (1985/1997); 2024 II. magyar elnökség</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az utolsó hét — vizsgastratégia</div><ul class="os-lista"><li><span class="os-kulcs">Vasárnap</span> — pihenés, könnyű ismétlés</li><li><span class="os-kulcs">Hétfő (okt. 12.)</span> — kulcsfogalmak és tételvázlatok utolsó átolvasása, korai lefekvés</li><li><span class="os-kulcs">Kedd (okt. 13.) — ÍRÁSBELI VIZSGA!</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Vizsga előtti tippek</div><ul class="os-lista"><li>Aludj <span class="os-kulcs">legalább 7-8 órát</span> a vizsga előtti éjszakán</li><li>Egyél <span class="os-kulcs">könnyű reggelit</span> — ne éhgyomorra menj</li><li>Vigyél <span class="os-kulcs">vizet és kisebb harapnivalót</span></li><li>A vizsgaterembe <span class="os-kulcs">15-20 perccel</span> előbb érkezz</li><li>A vizsgán: olvasd át először az <span class="os-kulcs">összes kérdést</span>, kezdj a könnyebbekkel</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Utolsó szombat! Aludj jól, egyél rendesen, mozogj. <br>A felkészülés <em>20 hete</em> mögötted — most már a tudás benned van.<br><strong>Sok sikert a vizsgára!</strong></div></div>';

var TN={
  tan:"Új anyag", ism:"Ismétlés", on:"Önellenőrzés",
  vaz:"Vázlat", pot:"Pótlás", pih:"Pihenő",
  un:"Ünnep", viz:"Vizsga"
};

var MNEV={0:"Ismétlés",1:"I. modul",2:"II. modul",3:"III. modul",4:"IV. modul",5:"V. modul"};

// Csoportosítás hetek szerint
var hetek={};
NAPOK.forEach(function(n){
  if(!hetek[n.h]) hetek[n.h]=[];
  hetek[n.h].push(n);
});
var hl=Object.keys(hetek).map(Number).sort(function(a,b){return a-b;});

// Navigációs gombok
var nav=document.getElementById("navBar");
var fo=document.getElementById("fo");

hl.forEach(function(h){
  var btn=document.createElement("button");
  btn.className="nav-gomb";
  btn.id="b"+h;
  btn.textContent=h+". hét";
  btn.onclick=function(){show(h);};
  nav.appendChild(btn);
});

function show(h){
  document.querySelectorAll(".nav-gomb").forEach(function(b){b.classList.remove("on");});
  document.getElementById("b"+h).classList.add("on");
  fo.innerHTML="";
  var ns=hetek[h];

  // Napi al-navigáció építése
  var napNav=document.getElementById("napNav");
  napNav.innerHTML='<div class="nap-nav-cim">'+h+'. hét napjai</div>';
  ns.forEach(function(nap,idx){
    var ng=document.createElement("button");
    ng.className="nap-gomb nap-gomb-mod"+nap.m;
    var isSzo=nap.d.indexOf("Szo")>-1;
    var isUn=nap.tip==="un"||nap.tip==="pih";
    var isViz=nap.tip==="viz";
    if(isSzo) ng.classList.add("szombat");
    if(isUn) ng.classList.add("unnep");
    if(isViz) ng.classList.add("vizsga");
    var dParts=nap.d.match(/^([a-záéíóöőúüű]+)\.\s*(\d+)\.\s*\(([A-Za-zóöőúüű]+)\)/i);
    var rovidMap={"H":"Hétfő","K":"Kedd","Sze":"Szerda","Cs":"Csütörtök","P":"Péntek","Szo":"Szombat"};
    var hnap=dParts?(rovidMap[dParts[3]]||dParts[3]):"";
    var teljes=dParts?(hnap+" · "+dParts[1]+". "+dParts[2]+"."):nap.d;
    ng.innerHTML='<span class="nap-gomb-pont"></span><span>'+teljes+'</span>';
    ng.onclick=function(){ugrasNapra(h,idx);};
    napNav.appendChild(ng);
  });


  // Heti fejléc
  var d1=ns[0].d.split("(")[0].trim();
  var dl=ns[ns.length-1].d.split("(")[0].trim();
  var mset={};
  ns.forEach(function(n){ if(n.m>0) mset[n.m]=1; });
  var mlbl=Object.keys(mset).map(function(m){return MNEV[m];}).join(" + ")||"Összefoglaló ismétlés";

  var hf=document.createElement("div");
  hf.className="het-fejlec";
  hf.innerHTML='<div class="het-szam-nagy">'+h+'.</div>'+
    '<div class="het-info">'+
      '<div class="het-cim">'+mlbl+'</div>'+
      '<div class="het-datum">'+d1+' — '+dl+' · '+ns.length+' nap</div>'+
    '</div>';
  fo.appendChild(hf);

  // Napok
  ns.forEach(function(nap){
    var nk=0;
    nap.t.forEach(function(k){
      var te=T[k]; if(te) nk+=te.k15.length+te.k10.length+te.k5.length;
    });

    var isSzo=nap.d.indexOf("Szo")>-1;
    var isUn=nap.tip==="un";
    var isViz=nap.tip==="viz";
    var isPih=nap.tip==="pih";

    var napDiv=document.createElement("article");
    napDiv.className="nap m"+nap.m;
    if(isSzo) napDiv.classList.add("szombat");
    if(isUn||isPih) napDiv.classList.add("unnep");
    if(isViz) napDiv.classList.add("vizsga");

    // Téma — rövid címet kreálunk a tételekhez
    var tema=nap.tema;
    if(!tema && nap.t.length>0){
      if(nap.t.length===1){
        var te=T[nap.t[0]];
        tema=te?te.c:nap.t[0];
      } else {
        tema=nap.t.length+" tétel — "+MNEV[nap.m];
      }
    }
    if(!tema) tema=TN[nap.tip];

    // Datum parts
    var dParts=nap.d.match(/^([a-záéíóöőúüű]+)\.\s*(\d+)\.\s*\(([A-Za-zóöőúüű]+)\)/i);
    var honap=dParts?dParts[1]:"";
    var dnap=dParts?dParts[2]:"";
    var hnap=dParts?dParts[3]:"";

    var statTxt;
    if(nap.t.length>0){
      statTxt=nap.t.length+" tétel · "+nk+" kérdés";
    } else {
      statTxt=TN[nap.tip];
    }

    // Teljes napnév kiszámítása
    var teljesNapMap={"H":"Hétfő","K":"Kedd","Sze":"Szerda","Cs":"Csütörtök","P":"Péntek","Szo":"Szombat","V":"Vasárnap"};
    var teljesNap=teljesNapMap[hnap]||hnap;

    var fej=document.createElement("div");
    var van_tartalom=nap.t.length>0||nap.osszef;
    fej.className="nap-fej"+(van_tartalom?" kattintható":"");
    fej.innerHTML=
      '<div class="nap-datum-blokk">'+
        '<div class="nap-honap">'+honap+'</div>'+
        '<div class="nap-szam">'+dnap+'</div>'+
        '<div class="nap-honap-nev">'+hnap+'</div>'+
      '</div>'+
      '<div class="nap-info">'+
        '<div class="nap-tipus-row">'+
          '<span class="nap-hetnev">'+teljesNap+'</span>'+
          '<span class="tipus-pill">'+TN[nap.tip]+'</span>'+
          '<span class="nap-stat">'+statTxt+'</span>'+
        '</div>'+
        '<div class="nap-tema">'+tema+'</div>'+
      '</div>'+
      (van_tartalom?'<div class="nap-nyil">▼</div>':'');

    var body=document.createElement("div");
    body.className="nap-body";

    if(van_tartalom){
      fej.onclick=function(){
        var open=body.style.display==="block";
        body.style.display=open?"none":"block";
        if(open) napDiv.classList.remove("nyitva");
        else napDiv.classList.add("nyitva");
      };

      // Ha van összefoglaló, azt renderelni
      if(nap.osszef && OSSZEF[nap.osszef]){
        var osDiv=document.createElement("div");
        osDiv.style.padding="14px 16px";
        osDiv.innerHTML=OSSZEF[nap.osszef];
        body.appendChild(osDiv);
      }

      nap.t.forEach(function(k){
        var te=T[k]; if(!te) return;
        var tDiv=document.createElement("div");
        tDiv.className="tetel";
        var html='<div class="tetel-fej">'+
          '<span class="tetel-kod">'+k+'</span>'+
          '<span class="tetel-cim">'+te.c+'</span>'+
        '</div>';

        // 15p
        if(te.k15.length>0){
          html+='<div class="kerdes-csoport k15-csop"><div class="csoport-cim">15 pontos · Fő tétel</div>';
          te.k15.forEach(function(q){
            html+='<div class="kerdes k15"><span class="kerdes-jelolo">15p</span><span class="kerdes-szoveg">'+q+'</span></div>';
          });
          html+='</div>';
        }
        // 10p
        if(te.k10.length>0){
          html+='<div class="kerdes-csoport k10-csop"><div class="csoport-cim">10 pontos kérdések</div>';
          for(var i=0;i<te.k10.length;i+=2){
            html+='<div class="kerdes"><span class="kerdes-jelolo">10·'+te.k10[i]+'</span><span class="kerdes-szoveg">'+te.k10[i+1]+'</span></div>';
          }
          html+='</div>';
        }
        // 5p
        if(te.k5.length>0){
          html+='<div class="kerdes-csoport k5-csop"><div class="csoport-cim">5 pontos kérdések</div>';
          for(var i=0;i<te.k5.length;i+=2){
            html+='<div class="kerdes"><span class="kerdes-jelolo">5·'+te.k5[i]+'</span><span class="kerdes-szoveg">'+te.k5[i+1]+'</span></div>';
          }
          html+='</div>';
        }

        tDiv.innerHTML=html;
        body.appendChild(tDiv);
      });
    }

    napDiv.appendChild(fej);
    napDiv.appendChild(body);
    fo.appendChild(napDiv);
  });

  fo.scrollIntoView({behavior:"smooth",block:"start"});
}

function ugrasNapra(h,idx){
  show(h);
  setTimeout(function(){
    var napok=document.querySelectorAll("#fo .nap");
    if(napok[idx]){
      napok[idx].scrollIntoView({behavior:"smooth",block:"center"});
      napok[idx].classList.add("highlighted");
      // Automatikus kibontás
      var body=napok[idx].querySelector(".nap-body");
      var fej=napok[idx].querySelector(".nap-fej.kattintható");
      if(body&&fej&&body.style.display!=="block"){
        body.style.display="block";
        napok[idx].classList.add("nyitva");
      }
      setTimeout(function(){napok[idx].classList.remove("highlighted");},1400);
    }
  },100);
}

show(1);
</script>
</body>
</html>
