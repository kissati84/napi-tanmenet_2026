pítési tevékenységgel érintett telek külön vizsgálat nélkül ügyfél</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/9.</div><div class="os-tetel-cim">A kérelem hatósághoz történő benyújtásának szabályai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Kérelem</div><ul class="os-lista"><li>Az ügyfél a hatóság előtti eljárás megindítását <span class="os-kulcs">kérelemmel</span> kezdeményezheti</li><li>Az ügyfél a kérelmével a vonatkozó jogszabályok szerint fordulhat a hatósághoz</li></ul></div><div class="os-szek"><div class="os-szek-cim">A kérelem tartalmi elemei</div><ul class="os-lista"><li><span class="os-kulcs">Ügyfél azonosítása</span> — név, lakcím (székhely), képviselője</li><li><span class="os-kulcs">Az ügyfél által kért döntés tárgya</span> és a benyújtás indokai</li><li><span class="os-kulcs">Tényállás-megalapozó nyilatkozatok és bizonyítékok</span></li><li>Egyéb, a kérelem elbírálásához szükséges adatok</li></ul></div><div class="os-szek"><div class="os-szek-cim">A kérelem visszavonása</div><ul class="os-lista"><li>Az ügyfél a kérelmét a döntés véglegessé válásáig <span class="os-kulcs">visszavonhatja</span></li><li>A kérelem visszavonása az ügyfél képviselőjére is irányadó</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">II. modul első része (jogalkotás + Ákr. első fele) a fejében! Próbálja meg fejből végigjárni a jogszabályi hierarchiát és a jogalkotás 3 fő szakaszát.</div></div>';
OSSZEF.h5='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 5. Hét</div><div class="os-bevez-cim">II. Modul — befejezés</div><div class="os-bevez-alcim">Eljárástípusok, határidők, jogorvoslat · II/10—II/12.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/10.</div><div class="os-tetel-cim">Automatikus döntéshozatali eljárás és sommás eljárás</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Háromféle eljárástípus az Ákr. szerint</div><div class="os-grid"><div><div class="alcim">Automatikus döntéshozatal</div><span class="os-kulcs">24 óra</span> — <span class="os-tul">emberi közreműködés nélkül</span></div><div><div class="alcim">Sommás eljárás</div><span class="os-kulcs">8 nap</span> — <span class="os-tul">egyszerű, tényfeltáró ügyek</span></div><div><div class="alcim">Teljes eljárás</div><span class="os-kulcs">60 nap</span> — összetett, bizonyítást igénylő ügyek</div></div></div><div class="os-szek"><div class="os-szek-cim">Automatikus döntéshozatali eljárás</div><ul class="os-lista"><li>Csak akkor, ha azt törvény vagy kormányrendelet <span class="os-kulcs">megengedi</span></li><li>Az ügyfél nyilatkozata és/vagy hatósági nyilvántartási adatok <span class="os-kulcs">automatikusan értékelődnek</span> — <span class="os-tul">emberi közreműködés nélkül</span></li><li>Pl. okmányok kiadása, igazolások</li></ul></div><div class="os-szek"><div class="os-szek-cim">Sommás eljárás feltételei</div><ul class="os-lista"><li><span class="os-kulcs">A tényállás tisztázott</span></li><li>Nincs ellenérdekű ügyfél</li><li><span class="os-kulcs">A kérelem és mellékletei elegendőek</span> a döntéshez</li><li>A hatóság 8 napon belül dönt</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/11.</div><div class="os-tetel-cim">Általános és speciális ügyintézési határidők</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Általános ügyintézési határidők</div><ol class="os-szam"><li><span class="os-kulcs">Automatikus döntéshozatal</span>: <span class="os-tul">24 óra</span></li><li><span class="os-kulcs">Sommás eljárás</span>: <span class="os-tul">8 nap</span></li><li><span class="os-kulcs">Teljes eljárás</span>: <span class="os-tul">60 nap</span></li><li>A 60 napos teljes eljárás határidőnél <span class="os-kulcs">hosszabb határidőt csak törvény</span> írhat elő</li><li>A határidők a <span class="os-kulcs">döntés közlését</span> is magukban foglalják</li><li>Az ügyintézési határidő — ha tv. eltérően nem rendelkezik — <span class="os-kulcs">az eljárás megindulásának napján kezdődik</span></li></ol></div><div class="os-szek"><div class="os-szek-cim">Speciális határidők</div><ul class="os-lista"><li><span class="os-kulcs">Testületi szerv</span> esetén: ügyintézési határidőn belül, vagy ha nem lehetséges, <span class="os-tul">a határidő letelte utáni első testületi ülésen</span> határoz</li><li><span class="os-kulcs">Soron kívüli ügyintézés</span> esetei:</li><li>• Kiskorú ügyfél érdekeinek veszélyeztetettsége</li><li>• Életveszéllyel vagy súlyos kárral fenyegető helyzet</li><li>• Ideiglenes biztosítási intézkedés</li><li>• Közbiztonság, közrend, nemzetbiztonság érdekében</li></ul></div><div class="os-szek"><div class="os-szek-cim">Belső határidő</div><ul class="os-lista"><li>Ha ágazati tv. vagy korm.rend. nem rendelkezik: a cselekményt <span class="os-kulcs">azonnal, de legkésőbb 8 napon belül</span> kell teljesíteni</li><li>Ha a határidőből <span class="os-kulcs">kevesebb mint 15 nap van hátra</span>: további cselekményeket <span class="os-tul">soron kívül</span> kell elvégezni</li></ul></div><div class="os-szek"><div class="os-szek-cim">A határidőbe NEM számít be</div><ul class="os-lista"><li>Az eljárás <span class="os-kulcs">felfüggesztésének, szünetelésének</span> időtartama</li><li>Az <span class="os-kulcs">ügyfél mulasztásának, késedelmének</span> időtartama</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/12.</div><div class="os-tetel-cim">Eljárási költség viselésének szabályai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Eljárási költség fogalma</div><ul class="os-lista"><li><span class="os-kulcs">Mindaz a költség, ami az eljárás során felmerül</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Az eljárási költség viselése — általános szabályok</div><ul class="os-lista"><li><span class="os-kulcs">Aki előtt felmerült</span>, az viseli</li><li><span class="os-kulcs">Jogellenes magatartás</span> miatti költséget az okozó viseli</li><li>Olyan költséget, melynek viselésére senki sem kötelezhető → <span class="os-kulcs">eljáró hatóság viseli</span></li><li><span class="os-kulcs">Több azonos érdekű ügyfél</span> → egyetemlegesen felelősek</li><li><span class="os-kulcs">Jogvitás eljárás</span>: elutasítás → kérelmező; helyt adó döntés → ellenérdekű ügyfél; részleges → arányosan</li></ul></div><div class="os-szek"><div class="os-szek-cim">Költségelőlegezés</div><ul class="os-lista"><li><span class="os-kulcs">Kérelemre indult eljárás</span>: a kérelmező ügyfél előlegez</li><li><span class="os-kulcs">Bizonyítási eljárás</span>: a bizonyítást indítványozó</li><li><span class="os-kulcs">Rendőrség igénybevétele</span>: az igénybevételt kérő hatóság</li><li><span class="os-kulcs">Hivatalból indult eljárás</span>: a hatóság</li></ul></div><div class="os-szek"><div class="os-szek-cim">Költségmentesség</div><ul class="os-lista"><li><span class="os-kulcs">Fogalom</span>: az eljárási költség előlegezése és viselése alóli teljes vagy részleges mentesség</li><li>Esete: <span class="os-kulcs">ágazati tv., Korm.rend., önkorm.rend.</span> alapján meghatározott ügyfajtában</li><li>Vagy: a hatóság engedélyezi → <span class="os-kulcs">természetes személy ügyfélnek kereseti, jövedelmi viszonyai miatt</span></li><li>A mentesség a kérelem előterjesztésétől az eljárás egész tartamára és a végrehajtásra kiterjed</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">II. modul teljes! Próbálja meg fejből emlékezetből végigjárni: a jogforrási rendszertől a jogalkotás szakaszain át az Ákr. három eljárástípusáig.</div></div>';
OSSZEF.h6='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 6. Hét</div><div class="os-bevez-cim">II. Modul — Teljes áttekintés</div><div class="os-bevez-alcim">A 12 tétel egy oldalon</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">A 12 tétel kulcsfogalmai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Jogalkotási alapok (II/1—II/5)</div><ul class="os-lista"><li><span class="os-kulcs">II/1</span> Társadalmi norma 4 sajátosság (magatartásminta, tartós, általános, szankció) + jogi norma 5 csak rá jellemző</li><li><span class="os-kulcs">II/2</span> Jogforrási rendszer: belső/külső · 3 jogrend (hazai/nemzetk./EU) · jogforrási vs. jogszabályi hierarchia · 6 lépcsős jogszabályi hierarchia (Alaptörvény → tv. → Korm.r./MNB → mineln./miniszteri r. → önálló sz.sz.v. → önkorm.r.)</li><li><span class="os-kulcs">II/3</span> Rendeletalkotás: autonóm vs. végrehajtási · központi (Korm., MNB, mineln., miniszteri, önálló sz.sz.) · helyi · szubdelegálás tilalma</li><li><span class="os-kulcs">II/4</span> Jogalkotás 3 fő szakasz: előkészítés (tervezés, társ. egyeztetés ált.+közvetlen, KÁT, FKB) → elfogadás (ált. vita → részletes vita → törvényalkotási biz. → zárószavazás) → kihirdetés (promulgáció + publikáció Magyar Közlönyben)</li><li><span class="os-kulcs">II/5</span> Szövegezés: pontosság, közérthetőség, konzisztencia · cím (típus + szám/év) · §, (1), a) hivatkozás</li></ul></div><div class="os-szek"><div class="os-szek-cim">Ákr. és közigazgatási eljárás (II/6—II/9)</div><ul class="os-lista"><li><span class="os-kulcs">II/6</span> Ákr. előzményei: <span class="os-tul">1957:IV (Et.) → 1981:I (Áe.) → 2004:CXL (Ket.) → 2016:CL (Ákr., hatály 2018)</span> · közig. eljárás 3 szakasza</li><li><span class="os-kulcs">II/7</span> Uniós és nk. tendenciák: OECD (egyszerűsítés), ET 2007 „Jó közig. kódexe", EUMSZ 298.cikk (2), Alapjogi Charta 41.cikk, Helyes hivatali magatartás eu. kódexe, Modell Szabályok</li><li><span class="os-kulcs">II/8</span> Alanyi hatály: főszemélyek (hatóság, ügyfél) + egyéb résztvevők (tanú, szakértő stb.) · hatóság: tv./Korm.r./önkorm.r. felhatalmazás · ügyfél: jog/jogos érdek, nyilvántartás, ellenőrzés · ex lege ügyfél</li><li><span class="os-kulcs">II/9</span> Kérelem: tartalom (ügyfél, kért döntés, indokok, bizonyítékok) · visszavonás a döntés véglegessé válásáig</li></ul></div><div class="os-szek"><div class="os-szek-cim">Eljárástípusok, határidők, költségek (II/10—II/12)</div><ul class="os-lista"><li><span class="os-kulcs">II/10</span> 3 eljárástípus: automatikus döntés (24 óra, emberi közreműködés nélkül) · sommás (8 nap, tisztázott tényállás) · teljes (60 nap)</li><li><span class="os-kulcs">II/11</span> Határidők: 24 óra / 8 nap / 60 nap · 60-on túl csak tv. · belső határidő 8 nap · 15 napon belül soron kívül · testületi szerv: első ülésen · soron kívüli (kiskorú, életveszély, közbiztonság)</li><li><span class="os-kulcs">II/12</span> Eljárási költség: aki előtt felmerült · jogvitás (vesztes) · előlegezés (kérelmező/hatóság) · költségmentesség (jogszabály alapján vagy jövedelem alapján)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">II. modul a fejében — a jogalkotás logikája és az Ákr. három pillére (eljárás, határidő, költség) a vizsga gerincét adják.</div></div>';
OSSZEF.h7='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 7. Hét</div><div class="os-bevez-cim">III. Modul</div><div class="os-bevez-alcim">Általános államháztartási ismeretek · III/1—III/9.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/1.</div><div class="os-tetel-cim">A Költségvetési Tanács jogállása és feladatkörei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A Költségvetési Tanács</div><ul class="os-lista"><li>Az <span class="os-kulcs">Országgyűlés törvényhozó tevékenységét támogató szerv</span></li><li>Kizárólag az <span class="os-kulcs">Alaptörvénynek és a törvényeknek alárendelve</span> végzi tevékenységét</li><li>Tagjai önállóan alakítják ki véleményüket</li></ul></div><div class="os-szek"><div class="os-szek-cim">Tagjai</div><ul class="os-lista"><li><span class="os-kulcs">A Költségvetési Tanács elnöke</span> — köztárs. elnök nevezi ki <span class="os-tul">6 évre</span></li><li><span class="os-kulcs">A Magyar Nemzeti Bank elnöke</span></li><li><span class="os-kulcs">Az Állami Számvevőszék elnöke</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Feladatai a stabilitási törvény alapján</div><ol class="os-szam"><li><span class="os-kulcs">Vélemény</span> a központi költségvetésről szóló törvény tervezetéről</li><li><span class="os-kulcs">Előzetes hozzájárulás</span> a központi költségvetési törvény elfogadásához (az Alaptörvényben meghatározott)</li><li><span class="os-kulcs">Vélemény</span> bármely költségvetést, közpénzeket, államháztartást érintő kérdésben</li><li><span class="os-kulcs">Félévente vélemény</span> a költségvetés tervezésével, végrehajtásával, közpénzek felhasználásával kapcsolatban</li><li>A KT <span class="os-kulcs">ügyrendjének</span> megállapítása</li></ol></div><div class="os-szek"><div class="os-szek-cim">A költségvetési törvénnyel kapcsolatos eljárás</div><ul class="os-lista"><li><span class="os-kulcs">Vétójog</span> a költségvetési törvény tervezetével kapcsolatban</li><li>A KT <span class="os-kulcs">kétszer foglal állást</span> a tervezetről: <span class="os-tul">benyújtáskor</span> és <span class="os-tul">zárószavazás előtt</span></li><li>Egyet nem értés esetén: a Kormány a tervezetet <span class="os-kulcs">ismételten köteles megtárgyalni</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Az eljárás mozzanatai</div><ul class="os-lista"><li><span class="os-kulcs">Kormány átadja</span> a tervezetet a KT-nak, majd a KT és ÁSZ véleményével együtt benyújtja az Ogynek</li><li><span class="os-kulcs">Döntési szakasz</span> — Ogy megtárgyalja, megalkotja a központi költségvetésről szóló törvényt</li><li><span class="os-kulcs">Végrehajtás-ellenőrzés szakasza</span> — éves költségvetési beszámoló és <span class="os-kulcs">zárszámadás</span></li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/2.</div><div class="os-tetel-cim">A nemzeti vagyon kategóriái</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A nemzeti vagyon körébe tartozó vagyonelemek</div><ul class="os-lista"><li>Az állam vagy önkormányzat <span class="os-kulcs">kizárólagos tulajdonában álló</span> dolgok</li><li>Az állam vagy önkormányzat <span class="os-tul">tulajdonában lévő egyéb dolgok</span></li><li><span class="os-kulcs">Pénzügyi eszközök</span>, társasági részesedések</li><li><span class="os-kulcs">Vagyoni értékű jogosultságok</span></li><li>A magyar államterület feletti <span class="os-kulcs">légtér</span></li><li><span class="os-kulcs">Üvegházhatású gázok kibocsátási egységei</span> és kiotói egységek</li><li><span class="os-kulcs">Kulturális javak</span> (közgyűjtemények), <span class="os-kulcs">régészeti leletek</span></li><li><span class="os-kulcs">Nemzeti adatvagyon</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Vagyonkategóriák</div><div class="os-grid"><div><div class="alcim">Forgalomképtelen nemzeti vagyon</div><span class="os-kulcs">Nem idegeníthető el</span>, nem terhelhető meg (kivételekkel). 2 alkategória: <span class="os-tul">kizárólagos állami/önkorm. tulajdon</span> (taxatív, főszabályként koncesszióval hasznosítható) + <span class="os-tul">nemzetgazdasági szempontból kiemelt jelentőségű vagyon</span> (Alaptörvény vezette be, vagyonkezelés, bérlet stb.)</div><div><div class="alcim">Korlátozottan forgalomképes</div><span class="os-kulcs">Eladható, megterhelhető</span>, de csak tv-ben vagy önkorm.r-ben meghatározott <span class="os-tul">előzetes jóváhagyás</span> szerint</div><div><div class="alcim">Forgalomképes</div><span class="os-kulcs">Elidegeníthető, hasznosítható</span> — a piaci forgalom része lehet</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/3.</div><div class="os-tetel-cim">Az állampénzügyi, államháztartási rendszer jogszabályai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A főbb jogszabályok</div><ul class="os-lista"><li><span class="os-kulcs">Alaptörvény</span> — alapok</li><li><span class="os-kulcs">2011. évi CXCV. törvény</span> (államháztartási törvény, <span class="os-tul">Áht.</span>) — hatályba 2012. január 1.</li><li><span class="os-kulcs">Stabilitási törvény</span> — Költségvetési Tanács, közteherviselés, nyugdíjrendszer</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az Áht. tartalma</div><ul class="os-lista"><li>Meghatározza az <span class="os-kulcs">államháztartás alrendszereit</span></li><li>A <span class="os-kulcs">költségvetési szervek jogállását</span> és működését</li><li>A <span class="os-kulcs">tervezés, gazdálkodás, beszámolás</span> rendjét</li><li>A korábbi 4 helyett <span class="os-kulcs">2 alrendszer</span>: <span class="os-tul">központi</span> és <span class="os-tul">önkormányzati</span></li><li><span class="os-kulcs">Pénzforgalmi szemlélet</span> — bevételeket/kiadásokat azok pénzforgalmi teljesülésekor kell számba venni</li><li>Megerősítette a <span class="os-kulcs">középtávú tervezést</span>, kötelezettségvállalási, fedezetvizsgálati előírásokat</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az Országgyűlés költségvetési joga</div><ul class="os-lista"><li><span class="os-kulcs">Évente költségvetési tervet</span> hagy jóvá — a Kormány előterjesztésére</li><li>A költségvetési év végén <span class="os-kulcs">zárszámadási törvényjavaslat</span> készül</li><li><span class="os-kulcs">Állami Számvevőszék ellenőrzi</span></li><li>Ogy <span class="os-kulcs">elfogadja a zárszámadásról szóló törvényt</span></li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/4.</div><div class="os-tetel-cim">Az elkülönített állami pénzalapok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Általános jellemzők</div><ul class="os-lista"><li>Az elkülönített pénzalapok a <span class="os-kulcs">központi alrendszer részévé</span> váltak</li><li><span class="os-kulcs">Az állam egyes közfeladatainak</span> részben államháztartáson kívüli forrásból történő ellátására szolgálnak</li><li><span class="os-kulcs">Csak törvénnyel</span> lehet létrehozni</li><li>Olyan közfeladat ellátását szolgálják, amely vagy <span class="os-kulcs">annyira specializált</span> (pl. nukleáris hulladék), vagy <span class="os-kulcs">különleges finanszírozási szerkezet</span> (pl. munkavállalói járulékok) miatt indokolt</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/5.</div><div class="os-tetel-cim">Az Állami Számvevőszék jogállása és feladatai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az ÁSZ jogállása</div><ul class="os-lista"><li>Az Ogy <span class="os-kulcs">legfőbb pénzügyi és gazdasági ellenőrző szerve</span></li><li>Az Ogynek alárendelt, <span class="os-tul">minden mástól független</span></li><li><span class="os-kulcs">Elnökét</span>: köztárs. elnök javaslatára Ogy választja <span class="os-tul">12 évre</span>, <span class="os-tul">2/3-os szavazattal</span></li><li>Az ÁSZ csak az Ogynek és a törvénynek tartozik felelősséggel</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az ÁSZ főbb feladatai</div><ol class="os-szam"><li><span class="os-kulcs">Költségvetés végrehajtásának ellenőrzése</span></li><li><span class="os-kulcs">Államháztartás gazdálkodásának ellenőrzése</span></li><li><span class="os-kulcs">Helyi önkormányzatok</span> gazdálkodása</li><li><span class="os-kulcs">Pártok, alapítványok</span> gazdálkodása</li><li><span class="os-kulcs">Nemzeti vagyon kezelése</span></li><li>Vélemény a központi költségvetési törvény tervezetéhez</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/6 — III/7.</div><div class="os-tetel-cim">Az államháztartási alapelvek és a költségvetési szervek irányítása-felügyelete</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A költségvetési szervnek mindig van legalább egy irányító vagy felügyeleti szerve</div><ul class="os-lista"><li><span class="os-kulcs">Államháztartási törvény szerinti irányítási jogok</span></li><li><span class="os-kulcs">Alapítói jogok</span> (alapítás, megszüntetés, alapító okirat, SZMSZ)</li><li><span class="os-kulcs">Vezetési jogok</span> (kinevezés, felmentés, megbízás)</li><li><span class="os-kulcs">Gazdasági vezető</span> kinevezése-felmentése</li><li><span class="os-kulcs">Tevékenység ellenőrzése</span> (törvényesség, szakszerűség, hatékonyság)</li><li><span class="os-kulcs">Döntés megsemmisítése</span>, új eljárás, előzetes/utólagos jóváhagyás</li><li><span class="os-kulcs">Egyedi utasítás</span> kiadása</li><li><span class="os-kulcs">Jelentéstétel, beszámoló kötelezése</span></li><li><span class="os-kulcs">Adatkezelés</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Irányítás vs. felügyelet</div><div class="os-grid"><div><div class="alcim">Irányítás (általános)</div><span class="os-kulcs">Irányítási jogok teljessége</span> érvényesül — viszonylagos szakmai-gazdasági önállóság</div><div><div class="alcim">Felügyelet (szűkebb)</div>NEM tartozik bele: <span class="os-kulcs">alapítói jogok</span>, <span class="os-kulcs">döntések előzetes/utólagos jóváhagyása</span>, <span class="os-kulcs">egyedi utasítás kiadása</span>. Ott alkalmazzák, ahol nagyobb a közfeladat-ellátás önállósága</div></div></div><div class="os-szek"><div class="os-szek-cim">Korlátok és különös szabályok</div><ul class="os-lista"><li><span class="os-kulcs">Az Alaptörvény és más törvények</span> korlátozhatják a felettes szerv irányítási jogait</li><li>Központi államigazgatási szervekre a <span class="os-kulcs">2010. évi XLIII. tv.</span> (Központi államigazgatási szervek tv.) az irányadó</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/8.</div><div class="os-tetel-cim">A helyi önkormányzatok bevételei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 3 fő bevételi csoport</div><ol class="os-szam"><li><span class="os-kulcs">Saját bevételek</span></li><li><span class="os-kulcs">Központi támogatások</span></li><li><span class="os-kulcs">Átengedett, megosztott bevételek</span></li></ol></div><div class="os-szek"><div class="os-szek-cim">Saját bevételek</div><ul class="os-lista"><li><span class="os-kulcs">Helyi adók</span> (és települési adóból befolyt bevétel)</li><li>Saját tevékenységből, vállalkozásból, <span class="os-kulcs">vagyon hasznosításából</span> származó bevétel, nyereség, osztalék, kamat, bérleti díj</li><li><span class="os-kulcs">Átvett pénzeszközök</span></li><li>Az önkormányzatot megillető <span class="os-kulcs">illeték, bírság, díj</span></li><li>Egyéb sajátos bevételek</li></ul></div><div class="os-szek"><div class="os-szek-cim">Központi támogatások</div><ul class="os-lista"><li>A finanszírozás a <span class="os-kulcs">központi költségvetési törvényben meghatározott szempontok</span> alapján, az ellátandó feladatok figyelembevételével</li><li>Történhet: közszolgáltatási szint, helyi szükségleti mutatószámok, lakosságszám, felhasználási kötöttséggel/anélkül</li><li><span class="os-kulcs">Az ellátandó feladatok kiadásaira fordítható</span></li><li>Eltérő felhasználás esetén <span class="os-tul">vissza kell fizetni</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Átengedett, megosztott bevételek (példák)</div><ul class="os-lista"><li><span class="os-kulcs">Termőföld bérbeadásából származó SZJA 100%-a</span></li><li><span class="os-kulcs">Jegyző által kiszabott környezetvédelmi bírság 100%-a</span></li><li><span class="os-kulcs">Korm.hivatal által kiszabott környezetvédelmi bírság 30%-a</span></li><li><span class="os-kulcs">Közlekedési szabályszegés bírság 40-100%-a</span></li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">III/9.</div><div class="os-tetel-cim">Az államháztartási kiadások funkciók szerinti csoportosítása</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 alapvető funkció (funkciócsoport)</div><ol class="os-szam"><li><span class="os-kulcs">Általános közszolgáltatások és védelem</span> — államigazgatás, jogalkotás, igazságszolgáltatás, honvédelem, közbiztonság</li><li><span class="os-kulcs">Jóléti funkciók</span> — egészségügy, oktatás, kultúra, szociális ellátás</li><li><span class="os-kulcs">Gazdasági funkciók</span> — gazdaságfejlesztés, beruházások, támogatások</li><li><span class="os-kulcs">Államadósság-kezelés</span> — kamatfizetés, törlesztés</li></ol></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">III. modul a fejében! A 4 fő szám: <span class="os-kulcs">KT elnök 6 év · ÁSZ elnök 12 év · 2 alrendszer · 4 kiadási funkció</span>. Ezek vissza-visszatérnek.</div></div>';
OSSZEF.h8='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 8. Hét</div><div class="os-bevez-cim">III. Modul + I—III. kapcsolatok</div><div class="os-bevez-alcim">Államháztartás összefoglaló és modulokon átívelő kapcsolatok</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">III. modul — kompakt áttekintés</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 9 tétel kulcsfogalmai</div><ul class="os-lista"><li><span class="os-kulcs">III/1</span> Költségvetési Tanács: 3 tag (KT elnök, MNB-elnök, ÁSZ-elnök) · KT elnök 6 évre · vétójog · 2× foglal állást</li><li><span class="os-kulcs">III/2</span> Nemzeti vagyon: forgalomképtelen (kizárólagos + nemzetgazdasági szempontból kiemelt) · korlátozottan forgalomképes · forgalomképes</li><li><span class="os-kulcs">III/3</span> Jogszabályok: Alaptörvény + Áht. (2011:CXCV) + Stabilitási tv. · 2 alrendszer · pénzforgalmi szemlélet · Áht. 2012. január 1-től</li><li><span class="os-kulcs">III/4</span> Elkülönített pénzalapok: tv. hozza létre · központi alrendszer része · specializált/különleges finanszírozású közfeladat</li><li><span class="os-kulcs">III/5</span> ÁSZ: 12 év, 2/3 · Ogynek alárendelt · ktgvetés, államháztartás, önkorm., pártok, alapítványok, nemzeti vagyon ellenőrzése</li><li><span class="os-kulcs">III/6-7</span> Irányítási jogok 9 elem · irányítás vs. felügyelet (alapítói jogok, jóváhagyás, egyedi utasítás kimarad)</li><li><span class="os-kulcs">III/8</span> Önkorm. bevételek 3 cs.: saját (helyi adó stb.) · központi támogatás (feladat-finanszírozás) · átengedett (SZJA, bírság)</li><li><span class="os-kulcs">III/9</span> Kiadások 4 funkció: ált. közszolg./védelem · jóléti · gazdasági · adósságkezelés</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">I—III. modul keresztkapcsolatok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Hogyan kapcsolódnak a modulok?</div><ul class="os-lista"><li><span class="os-kulcs">I/6 Ogy + III/3 ktgvetés</span>: az Ogy fogadja el évente a központi költségvetési törvényt és a zárszámadást</li><li><span class="os-kulcs">I/10 AB + II. jogalkotás</span>: normakontroll alaptörvény-ellenes jogszabályokon (II/1—II/5 jogalkotási folyamat)</li><li><span class="os-kulcs">I/11 Kúria + II/3 önkorm.r.</span>: a Kúria vizsgálja az önkorm. rendelet más jogszabályba ütközését</li><li><span class="os-kulcs">I/13 önkorm. korlátok + III/8 bevételek</span>: stabilitási tv. szerint adósságkeletkeztetéshez korm. hozzájárulás kell</li><li><span class="os-kulcs">II/8 Ákr. hatóság + III/7 ktgvetési szerv</span>: a hatóság az Ákr. szerint, de költségvetési szervként az Áht. szerint működik</li><li><span class="os-kulcs">III/1 KT + I/7 K.eln.</span>: a KT elnökét a köztárs. elnök nevezi ki</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Most már 37 tétel a fejében (16+12+9). Készülj fel a IV. modulra — vezetés- és szervezéstudomány, sok szerző és modell.</div></div>';
OSSZEF.h9='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 9. Hét</div><div class="os-bevez-cim">Gyenge pontok célzott ismétlése</div><div class="os-bevez-alcim">I—III. modul típushibái</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">Tipikus „elcsúsztatható" részek</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Évszámok és mérföldkövek (I+II+III modul)</div><ul class="os-lista"><li><span class="os-kulcs">1848</span> áprilisi tv. · <span class="os-kulcs">1944.12.21.</span> Ideiglenes Nemzetgyűlés · <span class="os-kulcs">1946:I.tv.</span> köztársaság · <span class="os-kulcs">1949:XX.tv.</span> Magy. Népköztársaság Alkotmánya</li><li><span class="os-kulcs">1989:XXXI.tv.</span> rendszerváltó alk.mód. · <span class="os-kulcs">1990.06.19.</span> új Ogy újraírja · <span class="os-kulcs">2000:I.tv.</span> Szent Korona emlékezete</li><li><span class="os-kulcs">1957:IV.tv.</span> Et. · <span class="os-kulcs">1981:I.tv.</span> Áe. · <span class="os-kulcs">2004:CXL.tv.</span> Ket. · <span class="os-kulcs">2016:CL.tv.</span> Ákr. (hatály 2018)</li><li><span class="os-kulcs">2011:CXCV.tv.</span> Áht. (hatály 2012.01.01.)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Mandátumok hossza</div><ul class="os-lista"><li><span class="os-kulcs">K.eln.</span> 5 év · <span class="os-kulcs">Ogy képviselő</span> 4 év · <span class="os-kulcs">AB-tag</span> 15 év · <span class="os-kulcs">ÁSZ-elnök</span> 12 év · <span class="os-kulcs">OBH-elnök</span> 9 év · <span class="os-kulcs">Legfőbb ügyész</span> 9 év · <span class="os-kulcs">Kúria-elnök</span> 9 év · <span class="os-kulcs">KT-elnök</span> 6 év · <span class="os-kulcs">OBT-elnök</span> 3 év · <span class="os-kulcs">OBT tag</span> 6 év · <span class="os-kulcs">bíró első kinevezés</span> 3 év</li></ul></div><div class="os-szek"><div class="os-szek-cim">Szótöbbségek</div><ul class="os-lista"><li><span class="os-kulcs">Egyszerű többség</span>: miniszterelnök megválasztása (képviselők több, mint fele)</li><li><span class="os-kulcs">2/3</span>: Alaptörvény módosítása, sarkalatos törvények, AB-tag, ÁSZ-elnök, Kúria-elnök</li></ul></div><div class="os-szek"><div class="os-szek-cim">Számok</div><ul class="os-lista"><li><span class="os-kulcs">AB-tagok</span> 15 fő · <span class="os-kulcs">OBT</span> 15 fő (Kúria-elnök + 14 bíró) · <span class="os-kulcs">Bíróságok 4 szint</span> (járás, 19+1 törvényszék, 5 ítélőtábla, Kúria)</li><li><span class="os-kulcs">Kormányhivatalok</span> 1 főváros + 19 vármegye = 20 területi · <span class="os-kulcs">Ákr. határidők</span> 24 óra/8 nap/60 nap</li></ul></div><div class="os-szek"><div class="os-szek-cim">Tipikusan összekeverhető fogalmak</div><ul class="os-lista"><li><span class="os-kulcs">Belső vs. külső jogforrás</span> (anyagi = szerv vs. alaki = megjelenési forma)</li><li><span class="os-kulcs">Autonóm vs. végrehajtási rendelet</span> · <span class="os-kulcs">Jogforrási vs. jogszabályi hierarchia</span></li><li><span class="os-kulcs">Irányítás vs. felügyelet</span> (alapítói jogok, egyedi utasítás kimarad a felügyeletből)</li><li><span class="os-kulcs">Jogi norma szerkezeti elemei</span> (II/1: csak rá jellemző 5 sajátosság)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">A felkészülés első harmadán túl! A IV. modul (vezetéstudomány) sok szerzőt tartalmaz — készíts egy név-évszám-elmélet listát: Weber, Mayo, Maslow (1943), McGregor (1960), Lewin.</div></div>';
OSSZEF.h10='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 10. Hét</div><div class="os-bevez-cim">IV. Modul — kezdés</div><div class="os-bevez-alcim">Közigazgatás-szervezési és vezetési ismeretek · IV/1—IV/8.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/1.</div><div class="os-tetel-cim">Max Weber munkássága és jelentősége</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Max Weber (1864-1920)</div><ul class="os-lista"><li>Formális szervezet-felfogásával hatott a tudomány fejlődésére</li><li>Felismerte és kidolgozta a <span class="os-kulcs">bürokratikus igazgatási forma</span> modelljét</li><li>A bürokrácia a <span class="os-kulcs">racionálisnak nevezett hatalom</span> eszköze és előfeltétele</li><li>A racionális hatalom forrása az <span class="os-kulcs">érvényben lévő jogrend, az elfogadott törvények</span></li><li>A bürokrácia fő előnye: <span class="os-kulcs">szakszerűség, kiszámíthatóság, személytelenség</span></li><li><span class="os-kulcs">Bürokrácia ideáltípusa</span> — gyakorlatban nincs tiszta formában</li></ul></div><div class="os-szek"><div class="os-szek-cim">„Gazdaság és társadalom" — az ideáltipikus bürokrácia jellemzői</div><ol class="os-szam"><li><span class="os-kulcs">Egyértelmű munkamegosztás</span></li><li><span class="os-kulcs">Szabályalapú működés</span></li><li><span class="os-kulcs">Hierarchia</span> (szolgálati út) követése</li><li><span class="os-kulcs">Szakmai hozzáértés</span></li><li><span class="os-kulcs">Hivatali állás kisajátíthatatlansága</span></li><li><span class="os-kulcs">Alkalmazottak hivatali és magánvagyonának elkülönítése</span></li><li><span class="os-kulcs">Aktaszerűség</span> (írásbeli ügyintézés)</li></ol></div><div class="os-szek"><div class="os-szek-cim">A bürokratikus szervezet problémái</div><ul class="os-lista"><li><span class="os-kulcs">Lassúság, rugalmatlanság</span></li><li>Feladatok és előírások öncélú növelése</li><li>Részcélokkal való azonosulás, hatalmi harcok</li><li><span class="os-kulcs">Előmeneteli rendszer diszfunkciója</span> — szolgálati idő fontosabb a teljesítménynél</li><li>Dehumanizálódás veszélye (Weber maga is látta)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Weberi és neoweberiánus közigazgatás</div><div class="os-grid"><div><div class="alcim">Weberi közigazgatás</div><span class="os-kulcs">A klasszikus, hierarchikusan szervezett, erősen szabályozott</span> közigazgatás</div><div><div class="alcim">Neoweberiánus (Új Weberizmus)</div>A klasszikus közigazgatás gyenge pontjait <span class="os-kulcs">más irányzatok részleges integrálásával</span> orvosolja</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/2.</div><div class="os-tetel-cim">Emberközpontú irányzatok képviselői</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 fő képviselő</div><ol class="os-szam"><li><span class="os-kulcs">Elton Mayo (1880-1949)</span> — <span class="os-tul">Human Relations iskola megjelenése</span>; informális csoport és szociológiai tényezők hatása a munkateljesítményre; Hawthorne-vizsgálatok</li><li><span class="os-kulcs">Abraham Maslow</span> — <span class="os-ev">1943</span> <span class="os-tul">szükséglethierarchia modellje</span>; 5 hierarchikus szint</li><li><span class="os-kulcs">Douglas McGregor (1960)</span> — <span class="os-tul">„X" és „Y" elmélet</span>; az emberek hajlamosak megfelelni annak a képnek, amit vezetőik tartanak róluk</li><li><span class="os-kulcs">Kurt Lewin</span> — csoportdinamika, vezetői stílusok (autokratikus, demokratikus, laissez-faire), <span class="os-tul">változásvezetési modell</span> (kifagyasztás → átalakítás → visszafagyasztás)</li></ol></div><div class="os-szek"><div class="os-szek-cim">Mayo eredményei — termelékenységnövelő tényezők</div><ul class="os-lista"><li>A munkacsoport <span class="os-kulcs">jó légköre</span></li><li>A kutatást végzők <span class="os-kulcs">kiemelt odafigyelése</span></li><li>A <span class="os-kulcs">dolgozókkal való foglalkozás</span></li><li>A munkacsoport <span class="os-kulcs">informális vezetője</span> és a formális munkahelyi vezetők közötti kapcsolatok javulása</li><li>A munkacsoport tagjai által <span class="os-kulcs">„elfogadott" csoportnormához</span> való igazodás</li></ul></div><div class="os-szek"><div class="os-szek-cim">McGregor X és Y</div><div class="os-grid"><div><div class="alcim">X emberkép</div><span class="os-kulcs">Nem szereti a munkát</span>, kerüli; kényszeríteni, dirigálni, ellenőrizni kell; kerüli a felelősséget; állásbiztonság fontosabb mindennél</div><div><div class="alcim">Y emberkép</div><span class="os-kulcs">A munka olyan természetes mint a játék</span>; előnyben részesíti az önirányítást és önkontrollt; bátorítva elfogadja-keresi a felelősséget; szívesen részt vesz a problémamegoldásban</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/3.</div><div class="os-tetel-cim">Autokratikus, laissez-faire és demokratikus vezetési stílusok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Autokratikus vezető</div><ul class="os-lista"><li>Hatalmát maximálisan kihasználja, <span class="os-kulcs">szinte mindenben egyedül dönt</span></li><li><span class="os-kulcs">Határozott utasítások</span>, feltétlen engedelmesség elvárása</li><li><span class="os-kulcs">Előny</span>: gyors, határozott döntés; vitathatatlan felelősség</li><li><span class="os-kulcs">Hátrány</span>: éles határvonal, csökkent alkotókészség, romló munkahelyi légkör, vezetői személyiségtorzulások</li><li><span class="os-kulcs">Hol megfelelő</span>: rendkívüli körülmények, fegyveres testület</li></ul></div><div class="os-szek"><div class="os-szek-cim">Laissez-faire (tenni hagyni)</div><ul class="os-lista"><li><span class="os-kulcs">Önkorlátozáson alapuló, visszafogott</span> vezetői magatartás</li><li>Csak <span class="os-kulcs">fogyatékosság észlelése vagy változtatás szükségessége</span> esetén avatkozik be</li><li><span class="os-kulcs">Előny</span>: beosztottak önállósága, kreativitás kibontakozása</li><li><span class="os-kulcs">Hol sikeres</span>: jól szabályozott szervezet, átlagon felüli képzettségű, elkötelezett beosztottak</li><li><span class="os-kulcs">Hátrány</span>: szervezetlenség, óvatosság, informális vezetői szerepek kialakulása</li></ul></div><div class="os-szek"><div class="os-szek-cim">Demokratikus vezetési stílus</div><ul class="os-lista"><li>A vezető <span class="os-kulcs">épít a kollektívára</span></li><li>Bár a döntéseket ő hozza, <span class="os-kulcs">bevonja a munkatársakat</span> a célok kitűzésébe és problémamegoldásba</li><li><span class="os-kulcs">Erősebb azonosulás</span> a szervezeti célokkal, együttműködési készség, közösségi tudat</li><li>Alapja a vezető <span class="os-kulcs">személyes tekintélye, együttműködési készsége</span></li><li><span class="os-kulcs">Legnehezebb</span> kialakítani — sok energia, sokoldalú felkészültség kell</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/4.</div><div class="os-tetel-cim">A vezetési stílus fogalma és Lewin/Likert modellje</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A vezetési stílus fogalma</div><ul class="os-lista"><li><span class="os-kulcs">Annak a módja, ahogy a vezető beosztottjai irányítását végzi</span>, különös tekintettel a problémák megoldására, döntések meghozatalára, feladatok kiadására</li></ul></div><div class="os-szek"><div class="os-szek-cim">A vezetési stílusok 2 nagy csoportja</div><div class="os-grid"><div><div class="alcim">Döntésközpontú stílusok</div>A vezetők <span class="os-kulcs">milyen beleszólást engednek meg a munkatársaiknak</span></div><div><div class="alcim">Személyiségközpontú stílusok</div>A vezető <span class="os-kulcs">mire fordítja az elsődleges figyelmét</span> (feladatra vagy kapcsolatra)</div></div></div><div class="os-szek"><div class="os-szek-cim">Lewin modellje — 3 vezetői stílus</div><ul class="os-lista"><li><span class="os-kulcs">Autokratikus</span>, <span class="os-kulcs">Laissez-faire</span>, <span class="os-kulcs">Demokratikus</span></li><li>(Lásd IV/3 tételt a részletekért)</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/5.</div><div class="os-tetel-cim">Személyiségközpontú vezetési stílusok</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A személyiségközpontú megközelítés</div><ul class="os-lista"><li>Aszerint tipizál, hogy a vezető <span class="os-kulcs">mire fordítja az elsődleges figyelmét</span></li><li>Elvégzendő <span class="os-kulcs">feladatra</span> vagy a beosztottakkal való <span class="os-kulcs">kapcsolat alakítására</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A vezetési stílus megválasztása szituációhoz igazítva</div><ul class="os-lista"><li>A vezetőnek <span class="os-kulcs">rugalmasnak</span> kell lennie</li><li>Az egyik stílus nem jobb, mint a másik — <span class="os-tul">a helyzettől függ</span></li><li>Pl. válsághelyzetben autokratikus, kreatív munkában demokratikus</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/6.</div><div class="os-tetel-cim">A vezetés mint döntés; döntéstípusok és delegálás</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A vezetés mint döntés</div><ul class="os-lista"><li>A vezetői munka lényegi része: <span class="os-kulcs">döntések meghozatala</span></li><li>A döntés a <span class="os-kulcs">cselekvési alternatívák közötti választás</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Döntéstípusok</div><ul class="os-lista"><li><span class="os-kulcs">Programozott</span> — rutindöntés, szabályok, eljárások szerint</li><li><span class="os-kulcs">Programozatlan</span> — egyedi, kreatív megoldást igényel</li><li><span class="os-kulcs">Stratégiai</span> — hosszú távú, magas szintű</li><li><span class="os-kulcs">Taktikai</span> — középtávú</li><li><span class="os-kulcs">Operatív</span> — napi, alacsony szintű</li></ul></div><div class="os-szek"><div class="os-szek-cim">A delegálás</div><ul class="os-lista"><li><span class="os-kulcs">Felhatalmazás</span> beosztottra: feladat + jogkör + felelősség</li><li><span class="os-kulcs">Előnyök</span>: fejlődik a beosztott, mentesít a vezető, gyorsabb döntés</li><li><span class="os-kulcs">Buktatók</span>: túl- vagy aluldelegálás, ellenőrzés hiánya, felelősség elmosódása</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/7.</div><div class="os-tetel-cim">A négy vezetési funkció</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 fő vezetési funkció</div><ol class="os-szam"><li><span class="os-kulcs">Tervezés</span> — célok, eszközök, határidők meghatározása</li><li><span class="os-kulcs">Szervezés</span> — struktúrák, hatáskörök kialakítása</li><li><span class="os-kulcs">Vezetés/irányítás</span> — emberek motiválása, koordináció</li><li><span class="os-kulcs">Ellenőrzés</span> — visszacsatolás, korrekció</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/8.</div><div class="os-tetel-cim">Az ellenőrzési tevékenység</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az ellenőrzés tárgya</div><ul class="os-lista"><li><span class="os-kulcs">Eredmények</span> — mi született?</li><li><span class="os-kulcs">Folyamatok</span> — hogyan?</li><li><span class="os-kulcs">Erőforrások</span> — mire fordították?</li><li><span class="os-kulcs">Szabályok betartása</span> — törvényesség</li></ul></div><div class="os-szek"><div class="os-szek-cim">Ellenőrzési típusok</div><ul class="os-lista"><li><span class="os-kulcs">Időbeli szempont</span>: előzetes, folyamatos, utólagos</li><li><span class="os-kulcs">Kötelezettség szerint</span>: belső, külső</li><li><span class="os-kulcs">Tartalom szerint</span>: pénzügyi, teljesítmény, szabályossági</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">IV. modul első része! Aki tudja a <span class="os-kulcs">Weber 7 ideáltipikus jellemzőt</span> + <span class="os-kulcs">4 emberközpontú szerzőt</span> + <span class="os-kulcs">Lewin 3 stílusát</span> + <span class="os-kulcs">Fayol 4 funkcióját</span>, sikerre lesz.</div></div>';
OSSZEF.h11='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 11. Hét</div><div class="os-bevez-cim">IV. Modul — befejezés</div><div class="os-bevez-alcim">Koordináció, projekt, HR · IV/9—IV/19.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/9.</div><div class="os-tetel-cim">A vezetés mint koordináció; koordinációs eszközök</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Háromféle koordinációs eszköz</div><ol class="os-szam"><li><span class="os-kulcs">Strukturális koordinációs eszközök</span> — törzskari egységek, termék-/folyamatfelelősök, értekezletek, bizottságok, projektek, team-munka</li><li><span class="os-kulcs">Formális (dokumentált) előírások</span> — alapító okirat, SZMSZ, szabályzatok, eljárásrendek, stratégiák, költségvetések, vezetői utasítások, belső tájékoztatók</li><li><span class="os-kulcs">Személyorientált koordinációs eszközök</span> — szervezeti kultúra fejlesztése, személyes ráhangolás, konfliktusfeloldás, lojális munkatársak preferálása, identitáserősítés képzéssel</li></ol></div><div class="os-szek"><div class="os-szek-cim">A három eszközcsoport jellemzői</div><div class="os-grid"><div><div class="alcim">Strukturális</div>A meglévő szervezeti struktúra <span class="os-kulcs">koordinációs hiányosságait pótolja</span></div><div><div class="alcim">Formális előírások</div>A <span class="os-kulcs">belső előírások a külső előírásoknak (jogszabályoknak) nem mondhatnak ellen</span></div><div><div class="alcim">Személyorientált</div><span class="os-kulcs">A vezető személyéhez kötődnek</span> — leadership szerepfelfogás</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/10.</div><div class="os-tetel-cim">Az e-közigazgatási szolgáltatások szintjei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az 5 szint</div><ol class="os-szam"><li><span class="os-kulcs">1. Jelenlét</span> — statikus információk online (honlap)</li><li><span class="os-kulcs">2. Interakció</span> — nyomtatványok, űrlapok letöltése, kinyomtatása</li><li><span class="os-kulcs">3. Tranzakció</span> — önkiszolgáló alkalmazások; űrlapok online kitöltése, hitelesítéssel</li><li><span class="os-kulcs">4. Transzformáció</span> — komplex szolgáltatás, <span class="os-tul">teljes ügymenet elektronizálása</span> (döntés, kézbesítés, illetékek)</li><li><span class="os-kulcs">5. Targetizáció (2007-)</span> — automatizált, célzott ügyfélkényelmi szolgáltatások</li></ol></div><div class="os-szek"><div class="os-szek-cim">Hazai példák</div><ul class="os-lista"><li><span class="os-kulcs">magyarorszag.hu</span> — számos szolgáltatás regisztrációval</li><li><span class="os-kulcs">Időpontfoglalás okmányirodákba</span>, <span class="os-kulcs">ideiglenes ügyfélkapu regisztráció</span>, kormányzati portál</li><li><span class="os-kulcs">Automatikus értesítések</span> (pl. okmányok érvényességi idejének lejárta) — 5. szint, targetizáció</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/11.</div><div class="os-tetel-cim">A projekt fogalma, szakaszai, projektciklus</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A projekt fogalma</div><ul class="os-lista"><li><span class="os-kulcs">A tervezés legkisebb eleme</span></li><li><span class="os-kulcs">Egyedi szervezeti környezetben</span> megtervezett és végrehajtott lépéssorozat</li><li><span class="os-kulcs">Konkrét célokat meghatározott idő alatt</span> kíván elérni</li><li><span class="os-kulcs">Meghatározott humán és anyagi erőforrásokat rendel</span> a célok eléréséhez</li></ul></div><div class="os-szek"><div class="os-szek-cim">A projekt 3 szakasza (projektháromszög)</div><ol class="os-szam"><li><span class="os-kulcs">Létrehozás</span> — tervezés és programozás szakasza</li><li><span class="os-kulcs">Megvalósítás</span> — végrehajtás, nyomon követés, monitoring</li><li><span class="os-kulcs">Lezárás</span> — utólagos értékelés, tapasztalatok leszűrése</li></ol></div><div class="os-szek"><div class="os-szek-cim">A projekt létrehozásának 4 fázisa (projektciklus)</div><ol class="os-szam"><li><span class="os-kulcs">A projekt meghatározása</span> — helyzetelemzés, problémák/lehetőségek feltárása, döntés mely ötleteket vinni tovább</li><li><span class="os-kulcs">Kidolgozás, tervezés</span> — az alapgondolat részletes kifejtése</li><li><span class="os-kulcs">Előzetes értékelés</span> — szigorú értékelés, megvalósíthatóság és fenntarthatóság vizsgálata</li><li><span class="os-kulcs">Tárgyalások és döntések</span> — finanszírozó intézmények döntenek, szerződéskötések</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/12.</div><div class="os-tetel-cim">A szervezeti változás</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A szervezeti változás fogalma</div><ul class="os-lista"><li>Amikor a szervezet <span class="os-kulcs">egy vagy több alapvető jellemzője</span> (stratégia, alaptechnológia, struktúra stb.) <span class="os-tul">jelentős mértékben megváltozik</span></li><li><span class="os-kulcs">A változások kezelése a vezetők feladata</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">2 alapvető fajtája</div><div class="os-grid"><div><div class="alcim">Elsőfokú változás</div><span class="os-kulcs">Rendszer keretén belül</span> megoldható (pl. egy vezető nyugdíjba megy)</div><div><div class="alcim">Másodfokú változás</div><span class="os-kulcs">Kilép a rendszer kereteiből</span> — átszervezés, új egység (pl. szervezetek összevonása, hatáskör megszűnése)</div></div></div><div class="os-szek"><div class="os-szek-cim">Kurt Lewin változási lépései</div><ol class="os-szam"><li><span class="os-kulcs">Kifagyasztás</span> — régi állapottól való elszakadás motivációs feltételeinek megteremtése (ellenállás megelőzésére)</li><li><span class="os-kulcs">Átalakítás</span> — szükséges változtatások végrehajtása</li><li><span class="os-kulcs">Visszafagyasztás</span> — a változás tartósságának motivációja, begyakorlás (visszarendeződés megakadályozására)</li></ol></div><div class="os-szek"><div class="os-szek-cim">A változtatás fogadtatása</div><ul class="os-lista"><li><span class="os-kulcs">Erőtérelemzés</span> — hajtóerők és fékezőerők számbavétele</li><li>Ellenállás okai: önmegerősítés, ismeretlentől való szorongás, tradíciók-normák tisztelete, status quo őrzése, félreértés, intolerancia</li><li><span class="os-kulcs">Közigazgatásban a változások</span>: létszámleépítés, szervezetek összevonása, hivatalok bezárása, munkavégzés rendjének változása</li><li><span class="os-kulcs">Egyéni és szervezeti szintű ellenállás</span> egyaránt létezik</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/13.</div><div class="os-tetel-cim">A munkanap-fényképezés menete</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A munkanap-fényképezés</div><ul class="os-lista"><li>Egy személy, csoport vagy szervezet <span class="os-kulcs">hasznos munkaidőalapját vizsgáló résztechnika</span></li><li>A dolgozó <span class="os-kulcs">napi tevékenységét folyamatosan feljegyzi</span> a munkafelvételi lapra</li><li>A közigazgatási gyakorlatban elterjedt a <span class="os-kulcs">csoportos önfényképezés</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A 3 szakasz</div><ol class="os-szam"><li><span class="os-kulcs">Előkészítő szakasz</span> — munkafelvételi lapok sokszorosítása, dolgozók tájékoztatása; kb. 2 hetes, átlagos terhelésű időszak</li><li><span class="os-kulcs">Adatfelvételi szakasz</span> — napi tevékenység részletes felvezetése, vezető naponként láttamozza, hetente átadás a feldolgozóknak</li><li><span class="os-kulcs">Feldolgozás és értékelés</span> — kódszámok, feldolgozó táblázatok osztályonként, vezetőnként, ügyintézőnként</li></ol></div><div class="os-szek"><div class="os-szek-cim">Felhasználási területek</div><ul class="os-lista"><li><span class="os-kulcs">Munkamegosztás aránytalanságainak</span> kiküszöbölése</li><li><span class="os-kulcs">Tevékenységfajták arányának</span> javítása</li><li><span class="os-kulcs">Információgyűjtés és -feldolgozás</span> racionalizálása</li><li><span class="os-kulcs">Munkakörök/feladatcsoportok</span> összevonása vagy szétválasztása</li><li><span class="os-kulcs">Jogszabály-módosítás kezdeményezése</span> (szükségtelen eljárási cselekmény kiiktatása)</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/14.</div><div class="os-tetel-cim">Csoportokkal kapcsolatos kérdések</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A csoport fogalma</div><ul class="os-lista"><li>A csoport <span class="os-kulcs">minden mástól jól megkülönböztethető egység</span></li><li><span class="os-kulcs">Két vagy több személyből áll</span></li><li><span class="os-kulcs">Közös célok és érdekek</span>, normarendszer és szabályok alapján működik</li></ul></div><div class="os-szek"><div class="os-szek-cim">Mit érdemes csoportos munkavégzéssel megoldani?</div><ul class="os-lista"><li>Problémamegoldás, kreatív feladatok</li><li>Tervezés, stratégiaalkotás</li><li>Komplex döntés előkészítése</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/15.</div><div class="os-tetel-cim">Brainstorming módszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A brainstorming menete</div><ol class="os-szam"><li><span class="os-kulcs">Problémamegfogalmazás</span> — egyértelmű kérdés</li><li><span class="os-kulcs">Ötletek gyűjtése</span> — minden megengedett</li><li><span class="os-kulcs">Kritika nélkül</span> — nincs ítélkezés</li><li><span class="os-kulcs">Mennyiség > minőség</span> — később szelektálunk</li><li><span class="os-kulcs">Értékelés</span> — utólag</li></ol></div><div class="os-szek"><div class="os-szek-cim">Előnyök és hátrányok</div><div class="os-grid"><div><div class="alcim">Előnyök</div><span class="os-kulcs">Kreatív, részvételi, gyors</span></div><div><div class="alcim">Hátrányok</div>Csoportgondolkodás, domináns személyek, társas lustaság</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/16.</div><div class="os-tetel-cim">Nominál csoportok módszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A módszer lényege</div><ul class="os-lista"><li><span class="os-kulcs">Egyéni gondolkodás</span> először, majd csoportos megosztás</li><li><span class="os-kulcs">Strukturált</span> menetű — szabályozott</li><li>Kombinálja az <span class="os-kulcs">egyéni és csoportos</span> előnyöket</li></ul></div><div class="os-szek"><div class="os-szek-cim">A módszer lépései</div><ol class="os-szam"><li><span class="os-kulcs">Egyéni listázás</span> — csendben</li><li><span class="os-kulcs">Sorrendi bemutatás</span> — egy ötlet/fő</li><li><span class="os-kulcs">Csoportos megbeszélés</span> — pontosítás, vita</li><li><span class="os-kulcs">Egyéni rangsorolás</span> — titkos szavazás</li><li><span class="os-kulcs">Eredmény összesítése</span></li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/17.</div><div class="os-tetel-cim">Közigazgatási létszámgazdálkodás és kiválasztás</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Munkaerő-utánpótlás eszközei</div><ul class="os-lista"><li><span class="os-kulcs">Munkáltatón belüli mobilitás</span></li><li><span class="os-kulcs">Közigazgatási/közszolgálati szervek közötti mobilitás</span> (pl. kirendelés)</li><li><span class="os-kulcs">Új kinevezés</span> kívülről toborozva</li></ul></div><div class="os-szek"><div class="os-szek-cim">Kirendelés (Kit. alapján)</div><ul class="os-lista"><li><span class="os-kulcs">Garanciális szabályok</span>: iskolai végzettségnek megfelelő, aránytalan sérelem tilalma, 10 munkanappal korábbi tájékoztatás</li><li><span class="os-kulcs">Védettek</span>: várandós, 3 év alatti gyermek, egyedülálló szülő, ápolásra szoruló hozzátartozó gondozója, 50%-os egészségkárosodás</li><li><span class="os-kulcs">Időtartam</span>: max. 1 év, 1× meghosszabbítható</li><li><span class="os-kulcs">Korm.hivatalok között</span>: max. 6 hónap, ha helyváltozással jár max. 50 munkanap/év</li></ul></div><div class="os-szek"><div class="os-szek-cim">Álláshely-alapú létszámgazdálkodás (Kit.)</div><div class="os-grid"><div><div class="alcim">Alaplétszám</div><span class="os-kulcs">Kormányhatározat</span> állapítja meg, <span class="os-tul">tartós feladatokhoz</span>. A szerv köteles betölteni.</div><div><div class="alcim">Központosított álláshely-állomány</div><span class="os-kulcs">Kormány engedélyével</span> tölthető be — alapfeladatokon felüli, jelentkező feladatokra</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/18.</div><div class="os-tetel-cim">Az emberierőforrás-áramlás 4 alapmodellje</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A 4 modell</div><ol class="os-szam"><li><span class="os-kulcs">„Élethosszig tartó"</span> — <span class="os-tul">wilsoni-weberi bürokratikus megoldás</span>; az alkalmazott foglalkoztatása, jövedelme, karrierje nyugdíjaztatásig biztosított; legalsó szinten való felvétel, szenioritás alapú előrejutás</li><li><span class="os-kulcs">„Fel vagy ki"</span> — piramisszerű szervezetek; a felfelé szűkülő karrierlétra; oldalirányú karrier nincs; aki nem lép feljebb, az kilép; nemzetközi tanácsadó cégek, jogi irodák, egyetemi intézmények</li><li><span class="os-kulcs">„Be vagy ki"</span> — <span class="os-tul">rugalmas</span>; a hierarchia bármelyik szintjén felvehető; az alkalmazási követelmények és teljesítmény számít; teljesítményingadozó/külső környezet változékony területeken</li><li><span class="os-kulcs">„Vegyes" modell</span> — <span class="os-tul">legnépszerűbb</span>; a többi modellből építkezik a saját igények szerint</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">IV/19.</div><div class="os-tetel-cim">Közszolgálati életpálya-menedzsment eszközei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A munkaerőhiány kezelése</div><ul class="os-lista"><li><span class="os-kulcs">Új munkatársak felvétele kinevezéssel</span> (toborzás-szelekció)</li><li><span class="os-kulcs">Korábban távozott munkatársak visszahívása</span></li><li><span class="os-kulcs">Átképzés</span></li><li><span class="os-kulcs">Munkaerő kölcsönzés</span> (ritka)</li><li><span class="os-kulcs">Munkatevékenységek kiszervezése</span> (ritka)</li><li><span class="os-kulcs">Munkaszerződéssel foglalkoztatott</span> munkavállalók alkalmazása</li><li><span class="os-kulcs">Közmunkaprogram</span></li><li><span class="os-kulcs">Nyugdíjhatár kitolása</span></li><li><span class="os-kulcs">Termelékenység, teljesítmény növelése</span> (technológia, munkakör-gazdagítás, túlóra)</li><li><span class="os-kulcs">Betegállomány csökkentése</span></li><li><span class="os-kulcs">Fluktuáció megállítása</span></li><li><span class="os-kulcs">Rész- és osztott munkaidő, távmunka, rugalmas munkaidő</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A munkaerőtöbblet kezelése</div><ul class="os-lista"><li><span class="os-kulcs">Új felvételek befagyasztása</span> (létszámstop)</li><li><span class="os-kulcs">Létszámleépítés, elbocsátás</span> — <span class="os-tul">outplacement</span> (újraelhelyezési tanácsadás)</li><li><span class="os-kulcs">Tartalékállomány</span> — feleslegessé vált munkaerő más területre irányítása, átképzés</li><li><span class="os-kulcs">Előnyugdíj, munkaidő-csökkentés, fizetés nélküli szabadság</span> (versenyszférában inkább)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">IV. modul a fejében! 19 tétel — a legnagyobb modul. Próbálja meg fejből végigjárni: Weber → 4 emberközpontú → 3 vezetési stílus → 4 vezetési funkció → e-közig. 5 szint → projekt 3 szakasz → HR 4 modell.</div></div>';
OSSZEF.h12='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 12. Hét</div><div class="os-bevez-cim">IV. Modul — Teljes áttekintés</div><div class="os-bevez-alcim">A 19 tétel egy oldalon</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">A 19 tétel kulcsfogalmai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Klasszikus és emberközpontú iskolák (IV/1—IV/2)</div><ul class="os-lista"><li><span class="os-kulcs">IV/1</span> Weber (1864-1920) bürokratikus ideáltípus 7 jellemzője · klasszikus weberi vs. neoweberiánus</li><li><span class="os-kulcs">IV/2</span> Emberközpontú 4 szerző: Mayo (Hawthorne, HR iskola) · Maslow (1943, 5 szint) · McGregor (1960, X/Y) · Lewin (csoportdinamika, 3 vezetési stílus, változási modell 3 fázis)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Vezetési stílusok (IV/3—IV/5)</div><ul class="os-lista"><li><span class="os-kulcs">IV/3</span> Lewin 3 stílusa: autokratikus · laissez-faire · demokratikus · közig. szituációknak megfelelően választva</li><li><span class="os-kulcs">IV/4</span> Vezetési stílus = a vezető irányítási módja; 2 nagy csoport: döntés- és személyiségközpontú; Lewin modellje</li><li><span class="os-kulcs">IV/5</span> Személyiségközpontú: feladat- vagy kapcsolatfókusz; szituációnak megfelelően</li></ul></div><div class="os-szek"><div class="os-szek-cim">Vezetési funkciók (IV/6—IV/8)</div><ul class="os-lista"><li><span class="os-kulcs">IV/6</span> Vezetés mint döntés; programozott/programozatlan, stratégiai/taktikai/operatív; delegálás (feladat+jogkör+felelősség)</li><li><span class="os-kulcs">IV/7</span> 4 vezetési funkció: tervezés, szervezés, vezetés/irányítás, ellenőrzés</li><li><span class="os-kulcs">IV/8</span> Ellenőrzés tárgya (eredmény, folyamat, erőforrás, törvény) és típusai (időbeli/kötelezettség/tartalom)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Koordináció és modern eszközök (IV/9—IV/13)</div><ul class="os-lista"><li><span class="os-kulcs">IV/9</span> 3 koordinációs eszköz: strukturális · formális előírások · személyorientált</li><li><span class="os-kulcs">IV/10</span> E-közigazgatás 5 szint: jelenlét → interakció → tranzakció → transzformáció → targetizáció (2007-)</li><li><span class="os-kulcs">IV/11</span> Projekt: 3 szakasz (létrehozás, megvalósítás, lezárás) + 4 fázisú projektciklus a létrehozáson belül</li><li><span class="os-kulcs">IV/12</span> Szervezeti változás: elsőfokú/másodfokú · Lewin 3 fázis (kifagyasztás → átalakítás → visszafagyasztás) · erőtérelemzés</li><li><span class="os-kulcs">IV/13</span> Munkanap-fényképezés: 3 szakasz (előkészítés → adatfelvétel → feldolgozás) · közigazgatásban csoportos önfényképezés</li></ul></div><div class="os-szek"><div class="os-szek-cim">Csoportos és HR (IV/14—IV/19)</div><ul class="os-lista"><li><span class="os-kulcs">IV/14</span> Csoport fogalma: 2+ személy, közös cél, normarendszer; mit érdemes csoportosan megoldani</li><li><span class="os-kulcs">IV/15-16</span> Brainstorming (kritika nélküli, mennyiség > minőség) vs. nominál csoport (egyéni listázás + csoportos megbeszélés + rangsorolás)</li><li><span class="os-kulcs">IV/17</span> Álláshely-alapú létszámgazdálkodás (Kit.): alaplétszám + központosított állomány · kirendelés szabályai</li><li><span class="os-kulcs">IV/18</span> HR-áramlás 4 modell: élethosszig tartó · fel vagy ki · be vagy ki · vegyes (legnépszerűbb)</li><li><span class="os-kulcs">IV/19</span> Életpálya-menedzsment: hiány kezelése (toborzás, visszahívás, átképzés stb.) · többlet kezelése (létszámstop, outplacement, tartalékállomány)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">IV. modul — 19 tétel — kész! Most már 56 tételt tudsz (16+12+9+19). Még az V. modul a 10 tételével.</div></div>';
OSSZEF.h13='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 13. Hét</div><div class="os-bevez-cim">I—IV. modul keresztismétlés</div><div class="os-bevez-alcim">A 4 modulban előforduló kulcsfogalmak</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">A 4 modulban előforduló nehéz részek</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Évszámok</div><ul class="os-lista"><li><span class="os-kulcs">Alkotmányfejlődés</span>: 1848 áprilisi → 1944.12.21. INGy → 1946:I (köztárs.) → 1949:XX (M.Népk. Alk.) → 1989:XXXI → 1990.06.19. → 2000:I (Szent Korona)</li><li><span class="os-kulcs">Eljárásjog</span>: 1957:IV (Et.) → 1981:I (Áe.) → 2004:CXL (Ket.) → 2016:CL (Ákr., hatály 2018)</li><li><span class="os-kulcs">Államháztartás</span>: 2011:CXCV (Áht., hatály 2012.01.01.)</li><li><span class="os-kulcs">Vezetéstudomány</span>: Weber (1864-1920) · Maslow (1943) · McGregor (1960) · Mayo (1880-1949) · Lewin</li></ul></div><div class="os-szek"><div class="os-szek-cim">Mandátumok hossza</div><ul class="os-lista"><li><span class="os-kulcs">5 év</span>: K.eln.</li><li><span class="os-kulcs">4 év</span>: Ogy képviselő</li><li><span class="os-kulcs">15 év</span>: AB-tag (nem újra)</li><li><span class="os-kulcs">12 év</span>: ÁSZ-elnök</li><li><span class="os-kulcs">9 év</span>: OBH-elnök, Legfőbb ügyész, Kúria-elnök</li><li><span class="os-kulcs">6 év</span>: KT-elnök, OBT-tag</li><li><span class="os-kulcs">3 év</span>: OBT-elnök, bíró első kinevezés</li></ul></div><div class="os-szek"><div class="os-szek-cim">Szervek létszáma</div><ul class="os-lista"><li><span class="os-kulcs">AB</span> 15 tag · <span class="os-kulcs">OBT</span> 15 fő (Kúria elnöke + 14) · <span class="os-kulcs">KT</span> 3 tag</li><li><span class="os-kulcs">Bíróságok 4 szint</span>: járás, 19+1 törvényszék, 5 ítélőtábla, Kúria</li><li><span class="os-kulcs">Korm.hivatalok</span> 1+19=20 területi · <span class="os-kulcs">Ákr. határidők</span> 24 óra/8 nap/60 nap · <span class="os-kulcs">E-szolg.</span> 5 szint · <span class="os-kulcs">HR-áramlás</span> 4 modell</li></ul></div><div class="os-szek"><div class="os-szek-cim">Szótöbbségek (Ogy)</div><ul class="os-lista"><li><span class="os-kulcs">Egyszerű többség</span>: miniszterelnök megválasztása, általános tv-ek</li><li><span class="os-kulcs">2/3</span>: Alaptörvény, sarkalatos tv., AB-tag, ÁSZ-elnök, Kúria-elnök, K.eln. tisztségtől megfosztás</li></ul></div><div class="os-szek"><div class="os-szek-cim">Tipikusan összekeverhető fogalmak</div><ul class="os-lista"><li><span class="os-kulcs">Belső vs. külső jogforrás</span> (anyagi-szerv vs. alaki-forma)</li><li><span class="os-kulcs">Jogforrási vs. jogszabályi hierarchia</span> (összes jogforrás vs. csak jogszabályok)</li><li><span class="os-kulcs">Irányítás vs. felügyelet</span> (a felügyeletből kimaradó: alapítói jog, jóváhagyás, egyedi utasítás)</li><li><span class="os-kulcs">Ellenjegyzéshez kötött vs. NEM kötött K.eln. hatáskör</span></li><li><span class="os-kulcs">X vs. Y emberkép</span> (McGregor)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Még 2 hét, és az V. modul is a fejedben lesz. Most már a gyenge pontokra fókuszálj — pontosítsd a számokat és évszámokat.</div></div>';
OSSZEF.h14='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 14. Hét</div><div class="os-bevez-cim">V. Modul — kezdés</div><div class="os-bevez-alcim">Európai Unió szervezete és működése · V/1—V/8.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/1.</div><div class="os-tetel-cim">A Lisszaboni Szerződés elfogadásának okai és változásai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az előzmények</div><ul class="os-lista"><li><span class="os-kulcs">1999 Amszterdami Szerződés</span> és <span class="os-kulcs">2001 Nizzai Szerződés</span> nem tudták az intézményi reformot teljesíteni</li><li><span class="os-kulcs">Leakeni konvent</span> (2002.02 — 2003.07): szubszidiaritás, EU jogi személyisége, Alapjogi Charta, nemzeti parlamentek szerepe, kompetenciák, gazdasági kormányzás</li><li><span class="os-kulcs">Alkotmányos Szerződés</span> (2004.10.29.) — racionalizálás, gyorsítás, <span class="os-tul">föderációs jelleg</span> (jelképek, európai törvény, Alapjogi Charta integrálva)</li><li>Ratifikációs kudarc: <span class="os-kulcs">francia és holland választópolgárok</span> népszavazáson elutasították</li></ul></div><div class="os-szek"><div class="os-szek-cim">A válság feloldása, Lisszabon</div><ul class="os-lista"><li><span class="os-kulcs">Német elnökség</span> a 2009-es EP-választásokat jelölte meg a feloldás határidejének</li><li>Az Alkotmányos Szerződés <span class="os-kulcs">átdolgozása</span> — föderációs szimbólumok kivétele, intézményi újítások megmaradnak</li></ul></div><div class="os-szek"><div class="os-szek-cim">A Lisszaboni Szerződés vívmányai</div><ul class="os-lista"><li><span class="os-kulcs">Parlament teljes körű társ-jogalkotó</span> lett; <span class="os-tul">44-ről 90 szabályozási területre</span> bővül a hatásköre</li><li><span class="os-kulcs">Európai Tanácsnak állandó elnöke</span> lesz</li><li><span class="os-kulcs">Külügyi és biztonságpolitikai főképviselő</span> új tisztsége; egyben EB-alelnök; Külügyek Tanácsának vezetője</li><li><span class="os-kulcs">EK megszűnt</span>, az Unió a jogutód; EK szerződés → EU Működési Szerződése; <span class="os-tul">hárompilléres rendszer felszámolva</span></li><li><span class="os-kulcs">Intézményeket ismer el</span> (Eu.Tanács, EB, Eu.Számvevőszék)</li><li><span class="os-kulcs">Jogi személyiség</span> az EU-nak — nemzetközi szervezetek tagjává válhat</li><li><span class="os-kulcs">Demokratikusabb</span> intézményi rendszer; <span class="os-kulcs">uniós polgári kezdeményezés</span></li><li><span class="os-kulcs">Jogi aktusok hierarchiája</span> (jogalkotási és nem jogalkotási aktusok)</li><li><span class="os-kulcs">Európai Ügyészség</span> jogi alapja (22 tagállam, magyar kormány nem vesz részt)</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/2.</div><div class="os-tetel-cim">Az uniós jog elsődleges forrásai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az elsődleges jogforrások központi eleme</div><ul class="os-lista"><li><span class="os-kulcs">Európai Unióról szóló szerződés (EUSZ)</span></li><li><span class="os-kulcs">Európai Unió működéséről szóló szerződés (EUMSZ)</span></li><li>Együtt: <span class="os-tul">Szerződések</span> — jelenlegi formájukat a Lisszaboni Szerződés módosításai hozták létre</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az alapító szerződések és módosításaik</div><ul class="os-lista"><li><span class="os-kulcs">Párizsi Szerződés</span> (1951/1952) — ESZAK/Montánunió</li><li><span class="os-kulcs">Római Szerződés</span> (1957/1958) — EGK és Euratom</li><li><span class="os-kulcs">Egyesülési Szerződés</span> (1965/1967) — intézmények összevonása</li><li><span class="os-kulcs">Egységes Európai Okmány</span> (1986/1987)</li><li><span class="os-kulcs">Maastrichti Szerződés</span> (1992/1993) — Európai Uniót hozza létre</li><li><span class="os-kulcs">Amszterdami Szerződés</span> (1997/1999)</li><li><span class="os-kulcs">Nizzai Szerződés</span> (2001/2003)</li><li><span class="os-kulcs">Lisszaboni Szerződés</span> (2007/2009)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az elsődleges jogba sorolandók még</div><ul class="os-lista"><li><span class="os-kulcs">Szerződésekhez csatolt jegyzőkönyvek</span></li><li><span class="os-kulcs">Általános jogelvek</span> (a Bíróság fejlesztette ki)</li><li><span class="os-kulcs">Csatlakozási szerződések</span></li><li><span class="os-kulcs">Alapjogi Charta</span> — Lisszabon óta a Szerződésekkel azonos jogi kötőerő</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/3.</div><div class="os-tetel-cim">Az uniós alapjogvédelem rendszerének kialakulása</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A kezdeti időszak</div><ul class="os-lista"><li>A közösségek <span class="os-kulcs">kezdeti évtizedeiben nem volt prioritás</span> alapjogvédelmi rendszer kialakítása</li><li>A tagállamok részt vettek az <span class="os-kulcs">Európa Tanács párhuzamos integrációs folyamatában</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A bírósági alapjogvédelem kialakulása</div><ul class="os-lista"><li><span class="os-kulcs">1960-as évek vége</span>: a Bíróság a közösségi jog elsőbbségét érvényesítette, és felmerült az alapjogvédelmi probléma</li><li>A Bíróság kialakította: az <span class="os-kulcs">alapjogok védelme az általános jogelvek</span> részét képezi (<span class="os-tul">írott elsődleges jogforrások hiányában is</span>)</li><li>A védendő alapjogokat a <span class="os-kulcs">tagállamok közös alkotmányos hagyományaira</span> és <span class="os-kulcs">nemzetközi emberi jogi egyezményekre</span> (EJEE) tekintettel kell meghatározni</li><li>Hatókör: <span class="os-kulcs">közösségi jogi aktusok</span> + <span class="os-kulcs">tagállami szervek tevékenysége, ha a közösségi jogot hajtják végre</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A főbb állomások</div><ul class="os-lista"><li><span class="os-kulcs">Maastrichti Szerződés</span> — az alapjogok védelme a közösségi jog alapelveként az EUSZ főszövegébe került</li><li><span class="os-kulcs">EUSZ 6. cikk (3) bekezdés</span> — az unió a közösségi jog általános elveiként tartja tiszteletben az alapvető jogokat</li><li><span class="os-kulcs">Lisszaboni Szerződés</span> két utat választhat: <span class="os-tul">Alapjogi Charta</span> a Szerződésekkel azonos jogi kötőerővel + <span class="os-tul">EJEE-hez csatlakozás</span> (még nem történt meg)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Alapjogokkal foglalkozó uniós intézmények</div><ul class="os-lista"><li><span class="os-kulcs">Alapjogi Ügynökség</span> (bécsi székhelyű) — szabványosítás, adatgyűjtés, adatfeldolgozás, közzététel</li></ul></div><div class="os-szek"><div class="os-szek-cim">EUSZ 2. és 7. cikk</div><ul class="os-lista"><li><span class="os-kulcs">EUSZ 2. cikk</span> — az unió értékei (emberi méltóság, szabadság, demokrácia, egyenlőség, jogállamiság, emberi jogok)</li><li><span class="os-kulcs">EUSZ 7. cikk</span> — a Tanács megállapíthatja az értékek súlyos megsértésének veszélyét vagy fennállását; szankcióként a tagállam egyes jogait felfüggesztheti</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">V/4.</div><div class="os-tetel-cim">Az EU intézményei és funkcióik</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Európai Tanács</div><ul class="os-lista"><li>Az EU <span class="os-kulcs">legfőbb politikai döntéshozó szerve</span></li><li>Tagjai: tagállamok <span class="os-kulcs">állam- és kormányfői</span> + <span class="os-kulcs">Eu.Tanács állandó elnöke</span> + <span class="os-kulcs">Bizottság elnöke</span>; főképviselő részt vesz</li><li><span class="os-kulcs">Kormányközi együttműködés</span> jellemzi</li><li>Meghatározza: <span class="os-kulcs">általános politikai irányokat és prioritásokat</span>, új tagállamok felvétele, kilépés iránymutatás, alapértékek megsértésének vizsgálata, KKBP stratégia</li><li><span class="os-kulcs">NEM lát el közvetlenül jogalkotási feladatot</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Európai Bizottság</div><ul class="os-lista"><li>Az <span class="os-kulcs">uniós jogalkotás legfőbb javaslattevő szerve</span></li><li>Tagjai: a biztosok — egy ország-egy biztos, az EP-választáson győztes politikai családból</li><li><span class="os-kulcs">Tagállamok feletti működés</span> jellemzi (uniós érdekek)</li><li>„Szerződések őre" — ellenőrzi a tagállami végrehajtást, <span class="os-kulcs">kötelezettségszegési pert</span> indíthat</li><li>Felel az <span class="os-kulcs">uniós költségvetés előkészítéséért</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Tanács (Miniszterek Tanácsa)</div><ul class="os-lista"><li>A <span class="os-kulcs">Parlament mellett a legfontosabb jogalkotási intézmény</span></li><li>Tagjai: <span class="os-kulcs">miniszteri szintű képviselők</span></li><li><span class="os-kulcs">Kormányközi együttműködés</span> jellemzi</li><li>Társ-jogalkotó az EP-vel, együtt fogadják el a költségvetést</li><li>Felel a KKBP végrehajtásáért, dönt nemzetközi szerződésekről</li><li><span class="os-kulcs">COREPER I-II</span> (Állandó Képviselők Bizottsága) készíti elő az üléseket</li></ul></div><div class="os-szek"><div class="os-szek-cim">Európai Parlament</div><ul class="os-lista"><li>Az unió <span class="os-kulcs">demokratikus legitimációjának szerve</span></li><li>Székhely: <span class="os-kulcs">Strasbourg</span></li><li>Tagjait <span class="os-kulcs">közvetlen és általános választójog</span> alapján, <span class="os-tul">5 évre</span> választják; <span class="os-tul">min. 6, max. 96 fő</span> tagállamonként</li><li><span class="os-kulcs">Tagállamok feletti működés</span
