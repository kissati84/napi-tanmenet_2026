<html lang="hu">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi tanmenet — Közigazgatási szakvizsga 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --kremes: #faf6ed;
  --kremes-melyebb: #f3ebd9;
  --pergamen: #ede2c8;
  --tinta: #1a1f2e;
  --tinta-vilagos: #4a4f5e;
  --tinta-halvany: #7a7f8e;
  --arany: #b8923a;
  --arany-vilagos: #d4b366;
  --arany-melyebb: #8a6a1a;
  --vonal: #c9b88a;
}

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--kremes);
  color: var(--tinta);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(184, 146, 58, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(58, 90, 122, 0.04) 0%, transparent 50%);
}

/* === FEJLÉC === */
.fejlec {
  background: linear-gradient(180deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
  padding: 48px 32px 56px;
  position: relative;
  overflow: hidden;
}
.fejlec::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--arany-melyebb), var(--arany), var(--arany-melyebb));
}
.fejlec::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--arany);
  opacity: 0.4;
}
.fejlec-belso { max-width: 920px; margin: 0 auto; }
.fejlec-kategoria {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--arany-vilagos);
  margin-bottom: 14px;
  font-weight: 500;
}
.fejlec h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 500;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.fejlec h1 em {
  font-style: italic;
  color: var(--arany-vilagos);
  font-weight: 400;
}
.fejlec-alcim {
  font-family: 'EB Garamond', serif;
  font-size: 16px;
  color: #c5beac;
  font-style: italic;
  margin-bottom: 28px;
}
.fejlec-stat {
  display: flex; gap: 32px; flex-wrap: wrap;
  padding-top: 20px;
  border-top: 1px solid rgba(184, 146, 58, 0.25);
}
.stat-elem { font-family: 'Inter', sans-serif; }
.stat-szam {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--arany-vilagos);
  line-height: 1;
}
.stat-felirat {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #9b9484;
  margin-top: 4px;
}

/* === NAVIGÁCIÓ === */
.nav-wrapper {
  background: var(--kremes-melyebb);
  border-bottom: 1px solid var(--vonal);
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 4px 20px rgba(26, 31, 46, 0.06);
}
.nav-belso {
  max-width: 920px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: flex-start;
}

.nav-gomb {
  border: 1px solid var(--vonal);
  background: var(--kremes);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--tinta-vilagos);
  padding: 8px 14px;
  border-radius: 22px;
  white-space: nowrap;
  transition: all 0.25s ease;
  letter-spacing: 0.3px;
}
.nav-gomb:hover {
  background: var(--pergamen);
  border-color: var(--arany);
  color: var(--tinta);
}
.nav-gomb.on {
  background: var(--tinta);
  border-color: var(--tinta);
  color: var(--kremes);
  box-shadow: 0 2px 8px rgba(26, 31, 46, 0.2);
}
.nav-gomb.on::before {
  content: '◆';
  margin-right: 5px;
  color: var(--arany-vilagos);
}

/* === FŐ TARTALOM === */
.fo {
  max-width: 920px; margin: 0 auto;
  padding: 32px 24px 60px;
}

/* === HETI FEJLÉC === */
.het-fejlec {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin: 36px 0 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--vonal);
  position: relative;
}
.het-fejlec::before {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 60px;
  height: 2px;
  background: var(--arany);
}
.het-szam-nagy {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 500;
  color: var(--arany);
  line-height: 0.9;
  font-style: italic;
}
.het-info { flex: 1; padding-top: 10px; }
.het-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--tinta);
  font-weight: 500;
  margin-bottom: 4px;
}
.het-datum {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
}

/* === NAP KÁRTYA === */
.nap {
  background: #ffffff;
  border: 1px solid var(--vonal);
  border-radius: 4px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.3s ease;
  position: relative;
}
.nap:hover {
  box-shadow: 0 6px 20px rgba(26, 31, 46, 0.08);
  transform: translateY(-1px);
}
.nap.nyitva { box-shadow: 0 8px 28px rgba(26, 31, 46, 0.1); }
.nap::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--szin, var(--arany));
}

.nap-fej {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px 20px 16px 22px;
  cursor: default;
}
.nap-fej.kattintható { cursor: pointer; }
.nap-fej.kattintható:hover .nap-tema { color: var(--szin, var(--tinta)); }

.nap-datum-blokk {
  flex-shrink: 0;
  text-align: center;
  width: 64px;
  padding: 6px 0;
  border-right: 1px solid var(--pergamen);
  padding-right: 14px;
}
.nap-honap {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  margin-bottom: 2px;
}
.nap-szam {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--szin, var(--tinta));
  line-height: 1;
}
.nap-honap-nev {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  margin-top: 3px;
}

.nap-info {
  flex: 1;
  min-width: 0;
}
.nap-tipus-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.tipus-pill {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--szin-vil, var(--pergamen));
  color: var(--szin, var(--arany-melyebb));
  border: 1px solid var(--szin-bor, var(--vonal));
}
.nap-stat {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--tinta-halvany);
  letter-spacing: 0.5px;
}
.nap-tema {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--tinta);
  line-height: 1.35;
  transition: color 0.2s;
}

.nap-nyil {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--vonal);
  border-radius: 50%;
  color: var(--tinta-vilagos);
  font-size: 11px;
  transition: all 0.3s;
}
.nap.nyitva .nap-nyil {
  background: var(--tinta);
  border-color: var(--tinta);
  color: var(--kremes);
  transform: rotate(180deg);
}

/* === KIBONTOTT TARTALOM === */
.nap-body {
  display: none;
  border-top: 1px solid var(--pergamen);
  background: linear-gradient(180deg, #fdfaf3 0%, #ffffff 100%);
}

.tetel {
  padding: 18px 22px;
  border-bottom: 1px solid var(--pergamen);
}
.tetel:last-child { border-bottom: none; }

.tetel-fej {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--vonal);
}
.tetel-kod {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  background: var(--szin, var(--tinta));
  color: #fff;
  border-radius: 3px;
}
.tetel-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--szin, var(--tinta));
  flex: 1;
  line-height: 1.3;
}

/* === KÉRDÉSEK === */
.kerdes-csoport {
  margin-bottom: 14px;
}
.kerdes-csoport:last-child { margin-bottom: 0; }

.csoport-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--csop-szin);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.csoport-cim::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--csop-szin);
}
.csoport-cim::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--csop-szin);
  opacity: 0.2;
}

.kerdes {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.55;
}
.kerdes-jelolo {
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  padding-top: 1px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--csop-szin);
}
.kerdes-szoveg {
  color: var(--tinta);
  font-family: 'EB Garamond', serif;
}
.kerdes.k15 .kerdes-szoveg {
  font-weight: 600;
  font-size: 15px;
}

/* Csoport színváltozók */
.k15-csop { --csop-szin: var(--szin); }
.k10-csop { --csop-szin: var(--szin); opacity: 0.95; }
.k5-csop { --csop-szin: var(--szin-vilagos, var(--szin)); }

/* === SPECIÁLIS NAPOK === */
.nap.szombat::before { background: var(--arany); }
.nap.szombat .nap-szam { color: var(--arany-melyebb); }
.nap.unnep::before { background: #b85a3a; }
.nap.vizsga {
  background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
}
.nap.vizsga::before { background: var(--arany); }
.nap.vizsga .nap-honap,
.nap.vizsga .nap-honap-nev,
.nap.vizsga .nap-stat { color: #9b9484; }
.nap.vizsga .nap-szam { color: var(--arany-vilagos); }
.nap.vizsga .nap-tema { color: var(--kremes); font-style: italic; font-size: 20px; }
.nap.vizsga .tipus-pill {
  background: var(--arany);
  color: var(--tinta);
  border-color: var(--arany);
}

/* === MODUL SZÍNEK === */
.m1 { --szin: #2c4a6b; --szin-vilagos: #5a7a9b; --szin-vil: #e8eef5; --szin-bor: #b8c6d6; }
.m2 { --szin: #3a6a4a; --szin-vilagos: #6a9a7a; --szin-vil: #e8f1ea; --szin-bor: #b8ceb8; }
.m3 { --szin: #8a5a2a; --szin-vilagos: #b8923a; --szin-vil: #f5edd8; --szin-bor: #d6c490; }
.m4 { --szin: #5a3a6b; --szin-vilagos: #8a6a9b; --szin-vil: #eee5f0; --szin-bor: #c8b5d0; }
.m5 { --szin: #2a3a6b; --szin-vilagos: #5a6a9b; --szin-vil: #e6eaf5; --szin-bor: #b5bbd6; }
.m0 { --szin: #5a5a4a; --szin-vilagos: #8a8a7a; --szin-vil: #ededdf; --szin-bor: #c8c5b5; }

@media (max-width: 640px) {
  .fejlec { padding: 32px 20px 40px; }
  .fejlec h1 { font-size: 28px; }
  .fejlec-stat { gap: 18px; }
  .stat-szam { font-size: 22px; }
  .fo { padding: 20px 16px 40px; }
  .het-szam-nagy { font-size: 44px; }
  .het-cim { font-size: 18px; }
  .nap-fej { padding: 14px 14px 14px 18px; gap: 12px; }
  .nap-datum-blokk { width: 50px; padding-right: 10px; }
  .nap-szam { font-size: 22px; }
  .nap-tema { font-size: 15px; }
  .tetel { padding: 14px 16px; }
  .tetel-cim { font-size: 15px; }
}
</style>
</head>

 {h:17,d:"szept. 23. (Sze)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — II. modul T1–T6 visszakérdezés"},
 {h:17,d:"szept. 24. (Cs)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — II. modul T7–T12 visszakérdezés"},
 {h:17,d:"szept. 25. (P)",m:0,t:[],tip:"pot",tema:"Gyenge pontok azonosítása I–II. modulban; pótlás"},
 {h:17,d:"szept. 26. (Szo)",m:0,t:[],tip:"ism",tema:"Ismétlés — leggyengébb tételek célzott ismétlése"},
 {h:18,d:"szept. 28. (H)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — III. modul T1–T9 visszakérdezés"},
 {h:18,d:"szept. 29. (K)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — IV. modul T1–T10 visszakérdezés"},
 {h:18,d:"szept. 30. (Sze)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — IV. modul T11–T19 visszakérdezés"},
 {h:18,d:"okt. 1. (Cs)",m:0,t:[],tip:"pot",tema:"Gyenge pontok pótlása III–IV. modulban"},
 {h:18,d:"okt. 2. (P)",m:0,t:[],tip:"vaz",tema:"Tételvázlatok ellenőrzése — III–IV. modul"},
 {h:18,d:"okt. 3. (Szo)",m:0,t:[],tip:"ism",tema:"Ismétlés — leggyengébb tételek célzott ismétlése"},
 {h:19,d:"okt. 5. (H)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — V. modul T1–T5 visszakérdezés"},
 {h:19,d:"okt. 6. (K)",m:0,t:[],tip:"ism",tema:"ISMÉTLÉS — V. modul T6–T10 visszakérdezés"},
 {h:19,d:"okt. 7. (Sze)",m:0,t:[],tip:"pot",tema:"Gyenge pontok pótlása V. modulban"},
 {h:19,d:"okt. 8. (Cs)",m:0,t:[],tip:"pot",tema:"Minden modulból 1-1 legnehezebb tétel felelevenítése"},
 {h:19,d:"okt. 9. (P)",m:0,t:[],tip:"vaz",tema:"Vizsgastratégia áttekintése — szerkezet, kulcsfogalmak"},
 {h:19,d:"okt. 10. (Szo)",m:0,t:[],tip:"ism",tema:"Ismétlés — teljes anyag kulcsfogalmainak gyors átfutása"},
 {h:20,d:"okt. 12. (H)",m:0,t:[],tip:"pot",tema:"ZÁRÓ — Összes modul kulcsfogalmainak rövid áttekintése"},
 {h:20,d:"okt. 13. (K)",m:0,t:[],tip:"vaz",tema:"ZÁRÓ — Tételvázlatok utolsó gyors átolvasása"},
 {h:20,d:"okt. 14. (Sze)",m:0,t:[],tip:"pih",tema:"ZÁRÓ — Könnyű ismétlés, korai lefekvés"},
 {h:20,d:"okt. 15. (Cs)",m:0,t:[],tip:"viz",tema:"ÍRÁSBELI VIZSGA — Sok sikert!"}
];

var TN={
  tan:"Új anyag", ism:"Ismétlés", on:"Önellenőrzés",
  vaz:"Vázlat", pot:"Pótlás", pih:"Pihenő",
  un:"Ünnep", viz:"Vizsga"
};

var MNEV={0:"Ismétlés",1:"I. modul",2:"II. modul",3:"III. modul",4:"IV. modul",5:"V. modul"};

// Csoportosítás hetek szerint
var hetek={};
NAPOK.forEach(function(n){
  if(!hetek[n.h]) hetek[n.h]=[];
  hetek[n.h].push(n);
});
var hl=Object.keys(hetek).map(Number).sort(function(a,b){return a-b;});

// Navigációs gombok
var nav=document.getElementById("navBar");
var fo=document.getElementById("fo");

hl.forEach(function(h){
  var btn=document.createElement("button");
  btn.className="nav-gomb";
  btn.id="b"+h;
  btn.textContent=h+". hét";
  btn.onclick=function(){show(h);};
  nav.appendChild(btn);
});

function show(h){
  document.querySelectorAll(".nav-gomb").forEach(function(b){b.classList.remove("on");});
  document.getElementById("b"+h).classList.add("on");
  fo.innerHTML="";
  var ns=hetek[h];

  // Heti fejléc
  var d1=ns[0].d.split("(")[0].trim();
  var dl=ns[ns.length-1].d.split("(")[0].trim();
  var mset={};
  ns.forEach(function(n){ if(n.m>0) mset[n.m]=1; });
  var mlbl=Object.keys(mset).map(function(m){return MNEV[m];}).join(" + ")||"Összefoglaló ismétlés";

  var hf=document.createElement("div");
  hf.className="het-fejlec";
  hf.innerHTML='<div class="het-szam-nagy">'+h+'.</div>'+
    '<div class="het-info">'+
      '<div class="het-cim">'+mlbl+'</div>'+
      '<div class="het-datum">'+d1+' — '+dl+' · '+ns.length+' nap</div>'+
    '</div>';
  fo.appendChild(hf);

  // Napok
  ns.forEach(function(nap){
    var nk=0;
    nap.t.forEach(function(k){
      var te=T[k]; if(te) nk+=te.k15.length+te.k10.length+te.k5.length;
    });

    var isSzo=nap.d.indexOf("Szo")>-1;
    var isUn=nap.tip==="un";
    var isViz=nap.tip==="viz";
    var isPih=nap.tip==="pih";

    var napDiv=document.createElement("article");
    napDiv.className="nap m"+nap.m;
    if(isSzo) napDiv.classList.add("szombat");
    if(isUn||isPih) napDiv.classList.add("unnep");
    if(isViz) napDiv.classList.add("vizsga");

    // Téma
    var tema=nap.tema;
    if(!tema && nap.t.length>0){
      tema=nap.t.map(function(k){
        var te=T[k]; return te?(k+" — "+te.c):k;
      }).join(" · ");
    }
    if(!tema) tema=TN[nap.tip];

    // Datum parts
    var dParts=nap.d.match(/^([a-zé]+)\.\s*(\d+)\.\s*\(([A-Za-zóöőúüű]+)\)/i);
    var honap=dParts?dParts[1]:"";
    var dnap=dParts?dParts[2]:"";
    var hnap=dParts?dParts[3]:"";

    var statTxt;
    if(nap.t.length>0){
      statTxt=nap.t.length+" tétel · "+nk+" kérdés";
    } else {
      statTxt=TN[nap.tip];
    }

    var fej=document.createElement("div");
    fej.className="nap-fej"+(nap.t.length>0?" kattintható":"");
    fej.innerHTML=
      '<div class="nap-datum-blokk">'+
        '<div class="nap-honap">'+honap+'</div>'+
        '<div class="nap-szam">'+dnap+'</div>'+
        '<div class="nap-honap-nev">'+hnap+'</div>'+
      '</div>'+
      '<div class="nap-info">'+
        '<div class="nap-tipus-row">'+
          '<span class="tipus-pill">'+TN[nap.tip]+'</span>'+
          '<span class="nap-stat">'+statTxt+'</span>'+
        '</div>'+
        '<div class="nap-tema">'+tema+'</div>'+
      '</div>'+
      (nap.t.length>0?'<div class="nap-nyil">▼</div>':'');

    var body=document.createElement("div");
    body.className="nap-body";

    if(nap.t.length>0){
      fej.onclick=function(){
        var open=body.style.display==="block";
        body.style.display=open?"none":"block";
        if(open) napDiv.classList.remove("nyitva");
        else napDiv.classList.add("nyitva");
      };

      nap.t.forEach(function(k){
        var te=T[k]; if(!te) return;
        var tDiv=document.createElement("div");
        tDiv.className="tetel";
        var html='<div class="tetel-fej">'+
          '<span class="tetel-kod">'+k+'</span>'+
          '<span class="tetel-cim">'+te.c+'</span>'+
        '</div>';

        // 15p
        if(te.k15.length>0){
          html+='<div class="kerdes-csoport k15-csop"><div class="csoport-cim">15 pontos · Fő tétel</div>';
          te.k15.forEach(function(q){
            html+='<div class="kerdes k15"><span class="kerdes-jelolo">15p</span><span class="kerdes-szoveg">'+q+'</span></div>';
          });
          html+='</div>';
        }
        // 10p
        if(te.k10.length>0){
          html+='<div class="kerdes-csoport k10-csop"><div class="csoport-cim">10 pontos kérdések</div>';
          for(var i=0;i<te.k10.length;i+=2){
            html+='<div class="kerdes"><span class="kerdes-jelolo">10·'+te.k10[i]+'</span><span class="kerdes-szoveg">'+te.k10[i+1]+'</span></div>';
          }
          html+='</div>';
        }
        // 5p
        if(te.k5.length>0){
          html+='<div class="kerdes-csoport k5-csop"><div class="csoport-cim">5 pontos kérdések</div>';
          for(var i=0;i<te.k5.length;i+=2){
            html+='<div class="kerdes"><span class="kerdes-jelolo">5·'+te.k5[i]+'</span><span class="kerdes-szoveg">'+te.k5[i+1]+'</span></div>';
          }
          html+='</div>';
        }

        tDiv.innerHTML=html;
        body.appendChild(tDiv);
      });
    }

    napDiv.appendChild(fej);
    napDiv.appendChild(body);
    fo.appendChild(napDiv);
  });

  fo.scrollIntoView({behavior:"smooth",block:"start"});
}

show(1);
</script>
</body>
</html>
