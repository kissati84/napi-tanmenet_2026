<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi tanmenet — Közigazgatási szakvizsga 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --kremes: #faf6ed;
  --kremes-melyebb: #f3ebd9;
  --pergamen: #ede2c8;
  --tinta: #1a1f2e;
  --tinta-vilagos: #4a4f5e;
  --tinta-halvany: #7a7f8e;
  --arany: #b8923a;
  --arany-vilagos: #d4b366;
  --arany-melyebb: #8a6a1a;
  --vonal: #c9b88a;
}

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--kremes);
  color: var(--tinta);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(184, 146, 58, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(58, 90, 122, 0.04) 0%, transparent 50%);
}

/* === FEJLÉC === */
.fejlec {
  background: linear-gradient(180deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
  padding: 48px 32px 56px;
  position: relative;
  overflow: hidden;
}
.fejlec::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--arany-melyebb), var(--arany), var(--arany-melyebb));
}
.fejlec::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--arany);
  opacity: 0.4;
}
.fejlec-belso { max-width: 920px; margin: 0 auto; }
.fejlec-kategoria {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--arany-vilagos);
  margin-bottom: 14px;
  font-weight: 500;
}
.fejlec h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 500;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.fejlec h1 em {
  font-style: italic;
  color: var(--arany-vilagos);
  font-weight: 400;
}
.fejlec-alcim {
  font-family: 'EB Garamond', serif;
  font-size: 16px;
  color: #c5beac;
  font-style: italic;
  margin-bottom: 28px;
}
.fejlec-stat {
  display: flex; gap: 32px; flex-wrap: wrap;
  padding-top: 20px;
  border-top: 1px solid rgba(184, 146, 58, 0.25);
}
.stat-elem { font-family: 'Inter', sans-serif; }
.stat-szam {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--arany-vilagos);
  line-height: 1;
}
.stat-felirat {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #9b9484;
  margin-top: 4px;
}

/* === NAVIGÁCIÓ === */
.nav-wrapper {
  background: var(--kremes-melyebb);
  border-bottom: 1px solid var(--vonal);
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 4px 20px rgba(26, 31, 46, 0.06);
}
.nav-belso {
  max-width: 920px; margin: 0 auto;
  padding: 14px 24px 10px;
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: flex-start;
}
.nap-nav {
  background: var(--kremes);
  border-top: 1px dashed var(--vonal);
  padding: 10px 24px 12px;
  max-width: 920px;
  margin: 0 auto;
  display: flex; flex-wrap: wrap; gap: 5px;
}
.nap-nav-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  width: 100%;
  margin-bottom: 4px;
}
.nap-gomb {
  border: 1px solid var(--vonal);
  background: #fff;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--tinta-vilagos);
  padding: 5px 9px;
  border-radius: 14px;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.nap-gomb:hover {
  border-color: var(--gomb-szin, var(--arany));
  background: var(--gomb-bg, var(--pergamen));
  color: var(--tinta);
  transform: translateY(-1px);
}
.nap-gomb-pont {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gomb-szin, var(--arany));
  flex-shrink: 0;
}
.nap-gomb.szombat { --gomb-szin: #b8923a; --gomb-bg: #f9f1d8; }
.nap-gomb.unnep { --gomb-szin: #b85a3a; --gomb-bg: #f5e0d8; }
.nap-gomb.vizsga {
  --gomb-szin: var(--arany);
  background: var(--tinta);
  color: var(--kremes);
  font-weight: 600;
  border-color: var(--tinta);
}
.nap-gomb.vizsga:hover { background: var(--tinta); color: var(--arany-vilagos); }
.nap-gomb-mod1 { --gomb-szin: #2c4a6b; --gomb-bg: #e8eef5; }
.nap-gomb-mod2 { --gomb-szin: #3a6a4a; --gomb-bg: #e8f1ea; }
.nap-gomb-mod3 { --gomb-szin: #8a5a2a; --gomb-bg: #f5edd8; }
.nap-gomb-mod4 { --gomb-szin: #5a3a6b; --gomb-bg: #eee5f0; }
.nap-gomb-mod5 { --gomb-szin: #2a3a6b; --gomb-bg: #e6eaf5; }
.nap-gomb-mod0 { --gomb-szin: #5a5a4a; --gomb-bg: #ededdf; }

/* Highlight ha megnyitva */
.nap.highlighted {
  animation: villan 1.4s ease;
}
@keyframes villan {
  0% { box-shadow: 0 0 0 3px var(--arany); }
  100% { box-shadow: 0 6px 20px rgba(26, 31, 46, 0.08); }
}

.nav-gomb {
  border: 1px solid var(--vonal);
  background: var(--kremes);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--tinta-vilagos);
  padding: 8px 14px;
  border-radius: 22px;
  white-space: nowrap;
  transition: all 0.25s ease;
  letter-spacing: 0.3px;
}
.nav-gomb:hover {
  background: var(--pergamen);
  border-color: var(--arany);
  color: var(--tinta);
}
.nav-gomb.on {
  background: var(--tinta);
  border-color: var(--tinta);
  color: var(--kremes);
  box-shadow: 0 2px 8px rgba(26, 31, 46, 0.2);
}
.nav-gomb.on::before {
  content: '◆';
  margin-right: 5px;
  color: var(--arany-vilagos);
}

/* === FŐ TARTALOM === */
.fo {
  max-width: 920px; margin: 0 auto;
  padding: 32px 24px 60px;
}

/* === HETI FEJLÉC === */
.het-fejlec {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin: 36px 0 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--vonal);
  position: relative;
}
.het-fejlec::before {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 60px;
  height: 2px;
  background: var(--arany);
}
.het-szam-nagy {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 500;
  color: var(--arany);
  line-height: 0.9;
  font-style: italic;
}
.het-info { flex: 1; padding-top: 10px; }
.het-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--tinta);
  font-weight: 500;
  margin-bottom: 4px;
}
.het-datum {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
}

/* === NAP KÁRTYA === */
.nap {
  background: #ffffff;
  border: 1px solid var(--vonal);
  border-radius: 4px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.3s ease;
  position: relative;
}
.nap:hover {
  box-shadow: 0 6px 20px rgba(26, 31, 46, 0.08);
  transform: translateY(-1px);
}
.nap.nyitva { box-shadow: 0 8px 28px rgba(26, 31, 46, 0.1); }
.nap::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--szin, var(--arany));
}

.nap-fej {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px 20px 16px 22px;
  cursor: default;
}
.nap-fej.kattintható { cursor: pointer; }
.nap-fej.kattintható:hover .nap-tema { color: var(--szin, var(--tinta)); }

.nap-datum-blokk {
  flex-shrink: 0;
  text-align: center;
  width: 64px;
  padding: 6px 0;
  border-right: 1px solid var(--pergamen);
  padding-right: 14px;
}
.nap-honap {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  margin-bottom: 2px;
}
.nap-szam {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--szin, var(--tinta));
  line-height: 1;
}
.nap-honap-nev {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--tinta-halvany);
  margin-top: 3px;
}

.nap-info {
  flex: 1;
  min-width: 0;
}
.nap-tipus-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.nap-hetnev {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--szin, var(--arany-melyebb));
}
.tipus-pill {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--szin-vil, var(--pergamen));
  color: var(--szin, var(--arany-melyebb));
  border: 1px solid var(--szin-bor, var(--vonal));
}
.nap-stat {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--tinta-halvany);
  letter-spacing: 0.5px;
}
.nap-tema {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--tinta);
  line-height: 1.35;
  transition: color 0.2s;
  margin-bottom: 8px;
}


.nap-nyil {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--vonal);
  border-radius: 50%;
  color: var(--tinta-vilagos);
  font-size: 11px;
  transition: all 0.3s;
}
.nap.nyitva .nap-nyil {
  background: var(--tinta);
  border-color: var(--tinta);
  color: var(--kremes);
  transform: rotate(180deg);
}

/* === KIBONTOTT TARTALOM === */
.nap-body {
  display: none;
  border-top: 1px solid var(--pergamen);
  background: linear-gradient(180deg, #fdfaf3 0%, #ffffff 100%);
}

.tetel {
  padding: 18px 22px;
  border-bottom: 1px solid var(--pergamen);
}
.tetel:last-child { border-bottom: none; }

.tetel-fej {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--vonal);
}
.tetel-kod {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  background: var(--szin, var(--tinta));
  color: #fff;
  border-radius: 3px;
}
.tetel-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--szin, var(--tinta));
  flex: 1;
  line-height: 1.3;
}

/* === KÉRDÉSEK === */
.kerdes-csoport {
  margin-bottom: 14px;
}
.kerdes-csoport:last-child { margin-bottom: 0; }

.csoport-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--csop-szin);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.csoport-cim::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--csop-szin);
}
.csoport-cim::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--csop-szin);
  opacity: 0.2;
}

.kerdes {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.55;
}
.kerdes-jelolo {
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  padding-top: 1px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--csop-szin);
}
.kerdes-szoveg {
  color: var(--tinta);
  font-family: 'EB Garamond', serif;
}
.kerdes.k15 .kerdes-szoveg {
  font-weight: 600;
  font-size: 15px;
}

/* Csoport színváltozók */
.k15-csop { --csop-szin: var(--szin); }
.k10-csop { --csop-szin: var(--szin); opacity: 0.95; }
.k5-csop { --csop-szin: var(--szin-vilagos, var(--szin)); }

/* === SPECIÁLIS NAPOK === */
.nap.szombat::before { background: var(--arany); }
.nap.szombat .nap-szam { color: var(--arany-melyebb); }
.nap.unnep::before { background: #b85a3a; }
.nap.vizsga {
  background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
}
.nap.vizsga::before { background: var(--arany); }
.nap.vizsga .nap-honap,
.nap.vizsga .nap-honap-nev,
.nap.vizsga .nap-stat { color: #9b9484; }
.nap.vizsga .nap-szam { color: var(--arany-vilagos); }
.nap.vizsga .nap-tema { color: var(--kremes); font-style: italic; font-size: 20px; }
.nap.vizsga .tipus-pill {
  background: var(--arany);
  color: var(--tinta);
  border-color: var(--arany);
}

/* === MODUL SZÍNEK === */
.m1 { --szin: #2c4a6b; --szin-vilagos: #5a7a9b; --szin-vil: #e8eef5; --szin-bor: #b8c6d6; }
.m2 { --szin: #3a6a4a; --szin-vilagos: #6a9a7a; --szin-vil: #e8f1ea; --szin-bor: #b8ceb8; }
.m3 { --szin: #8a5a2a; --szin-vilagos: #b8923a; --szin-vil: #f5edd8; --szin-bor: #d6c490; }
.m4 { --szin: #5a3a6b; --szin-vilagos: #8a6a9b; --szin-vil: #eee5f0; --szin-bor: #c8b5d0; }
.m5 { --szin: #2a3a6b; --szin-vilagos: #5a6a9b; --szin-vil: #e6eaf5; --szin-bor: #b5bbd6; }
.m0 { --szin: #5a5a4a; --szin-vilagos: #8a8a7a; --szin-vil: #ededdf; --szin-bor: #c8c5b5; }

/* ═══════════════ ÖSSZEFOGLALÓ ═══════════════ */
.os-bevez {
  background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
  color: var(--kremes);
  padding: 18px 22px;
  margin: 4px 0 18px;
  border-radius: 3px;
  text-align: center;
  border-left: 4px solid var(--arany);
}
.os-bevez-katlb {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--arany-vil);
  margin-bottom: 6px;
}
.os-bevez-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  font-style: italic;
}
.os-bevez-alcim {
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  color: #c5beac;
  margin-top: 4px;
  font-style: italic;
}

.os-tetel {
  background: #ffffff;
  border: 1px solid var(--vonal);
  border-radius: 3px;
  margin-bottom: 14px;
  overflow: hidden;
  position: relative;
}
.os-tetel::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: #2c4a6b;
}
.os-tetel-fej {
  padding: 13px 18px 10px;
  border-bottom: 1px solid var(--pergamen);
  background: linear-gradient(180deg, #fdfaf3 0%, #ffffff 100%);
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.os-tetel-kod {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--arany);
  font-style: italic;
  line-height: 1;
}
.os-tetel-cim {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--tinta);
  line-height: 1.25;
  flex: 1;
}
.os-tetel-body { padding: 14px 18px 16px; }

.os-szek { margin-bottom: 14px; }
.os-szek:last-child { margin-bottom: 0; }
.os-szek-cim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--arany-mel, #8a6a1a);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.os-szek-cim::before {
  content: '';
  width: 12px; height: 1px;
  background: var(--arany);
}

.os-lista { list-style: none; padding-left: 0; }
.os-lista li {
  padding: 3px 0 3px 16px;
  position: relative;
  line-height: 1.5;
  font-size: 13.5px;
  font-family: 'EB Garamond', serif;
}
.os-lista li::before {
  content: '◆';
  position: absolute;
  left: 0;
  color: var(--arany);
  font-size: 8px;
  top: 7px;
}
.os-szam { padding-left: 22px; counter-reset: os-cnt; }
.os-szam li {
  padding: 3px 0 3px 4px;
  line-height: 1.5;
  font-size: 13.5px;
  font-family: 'EB Garamond', serif;
  counter-increment: os-cnt;
  position: relative;
  list-style: none;
}
.os-szam li::before {
  content: counter(os-cnt) ".";
  position: absolute;
  left: -20px;
  width: 16px;
  text-align: right;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  color: var(--arany-mel, #8a6a1a);
  font-size: 11px;
  top: 5px;
}
.os-kulcs { font-weight: 600; color: #2c4a6b; }
.os-tul {
  background: linear-gradient(180deg, transparent 60%, rgba(212, 179, 102, 0.4) 60%);
  font-weight: 500;
  padding: 0 2px;
}
.os-ev {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  background: var(--pergamen);
  padding: 1px 6px;
  border-radius: 2px;
  font-weight: 600;
  color: var(--arany-mel, #8a6a1a);
  white-space: nowrap;
}
.os-megj {
  font-style: italic;
  font-size: 12.5px;
  color: var(--tinta-vilagos);
  padding: 7px 10px;
  background: #fdfaf3;
  border-left: 3px solid var(--arany-vil);
  margin-top: 6px;
  border-radius: 0 2px 2px 0;
}
.os-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.os-grid > div {
  background: #fdfaf3;
  padding: 9px 12px;
  border: 1px solid var(--pergamen);
  border-radius: 2px;
}
.os-grid .alcim {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--arany-mel, #8a6a1a);
  font-weight: 700;
  margin-bottom: 4px;
}
.os-tanacs {
  margin-top: 18px;

var OSSZEF={};
OSSZEF.h1='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 1. Hét</div><div class="os-bevez-cim">I. Modul — Összefoglaló</div><div class="os-bevez-alcim">A központi állami szervek rendszere · I/1—I/11. tételek</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/1.</div><div class="os-tetel-cim">Magyar alkotmányfejlődés (2010-ig)</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Kiindulópont</div><ul class="os-lista"><li>Magyarországnak <span class="os-ev">1949-ig</span> <span class="os-kulcs">történeti alkotmánya</span> volt</li></ul></div><div class="os-szek"><div class="os-szek-cim">A polgári átalakulástól a II. világháborúig</div><ol class="os-szam"><li><span class="os-ev">1848</span> márciusa-áprilisa: a rendi országgyűlés <span class="os-kulcs">parlamentáris monarchiává</span> alakította Magyarországot</li><li><span class="os-kulcs">Kiegyezés idején</span> valódi alkotmányozás folyt</li><li><span class="os-kulcs">Első világháború után</span> elengedhetetlenné vált az <span class="os-tul">alkotmányrevízió</span> — a történeti alkotmány keretein belül, jogfolytonosságra építve</li><li><span class="os-kulcs">Második világháború</span> idején a szabadságjogok védelme nem volt biztosítható; <span class="os-ev">1944. március 19.</span> német megszállás → az ország önrendelkezése évtizedekre megszűnt</li></ol></div><div class="os-szek"><div class="os-szek-cim">1944—1949: az ideiglenes alkotmánytól az 1949. évi XX. törvényig</div><ol class="os-szam"><li><span class="os-ev">1944. december 21.</span> <span class="os-kulcs">Ideiglenes Nemzetgyűlés</span> (aktív szovjet katonai közreműködéssel)</li><li><span class="os-ev">1945. november 4.</span> nemzetgyűlési választások — utána feloszlott</li><li><span class="os-ev">1946. évi I. törvény</span> — <span class="os-kulcs">köztársaság kikiáltása</span>, <span class="os-tul">ideiglenes alkotmány</span></li><li><span class="os-ev">1949. évi XX. törvény</span> — <span class="os-kulcs">Magyar Népköztársaság Alkotmánya</span>: népköztársasági államforma („a munkások és dolgozó parasztok állama"), <span class="os-kulcs">Elnöki Tanács</span> (kollektív államfői testület), <span class="os-kulcs">tanácsrendszer</span>; megszűnt a <span class="os-tul">Legfelsőbb Közigazgatási Bíróság</span> és a <span class="os-tul">Legfőbb Állami Számvevőszék</span></li></ol></div><div class="os-szek"><div class="os-szek-cim">A rendszerváltozás és az 1989-es alkotmánymódosítás</div><ul class="os-lista"><li><span class="os-ev">1989</span> <span class="os-kulcs">nemzeti kerekasztal-tárgyalások</span> — megállapodás a régi és új politikai elit között</li><li><span class="os-ev">1989. évi XXXI. törvény</span> — alkotmánymódosítás: <span class="os-tul">hatalommegosztás</span></li><li>Új szervek: <span class="os-kulcs">Alkotmánybíróság</span>, <span class="os-kulcs">Állami Számvevőszék</span></li><li>Szabad választások, szabad pártalapítás</li><li><span class="os-ev">1990. június 19.</span> — az új Országgyűlés jelentősen átírta az alkotmányt</li></ul></div><div class="os-szek"><div class="os-szek-cim">1990—2010: új alkotmány nem született</div><ul class="os-lista"><li><span class="os-ev">1990-1994</span>: új alkotmány elfogadása érdemben fel sem merült (hiányzott a parlamenti többség)</li><li><span class="os-ev">1994-1998</span>: <span class="os-kulcs">MSZP–SZDSZ alkotmányozó többség</span>, az új alkotmány koncepcióját elfogadták, de javaslat benyújtására nem került sor</li><li><span class="os-ev">1998-2002</span>: első Orbán-kormány — <span class="os-ev">2000. évi I. törvény</span> a <span class="os-kulcs">Szent Korona emlékezetét</span> tette a hatályos jog részévé</li><li><span class="os-ev">2002-2010</span>: alkotmányozási kísérletek voltak, de <span class="os-tul">kellő parlamenti felhatalmazás hiányában</span> új alkotmány nem született</li></ul></div><div class="os-megj">💡 A jegyzet itt zárul — 2010-ig terjed. Az Alaptörvény (2011) a 10p és 5p kérdésekhez tartozik, nem ide.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/2.</div><div class="os-tetel-cim">Alapvető jogok csoportosítása</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Megjelenésük időrendjének alapján — 3 generáció</div><ol class="os-szam"><li><span class="os-kulcs">1. generációs (XVIII. sz. polgári átalakulása)</span>: <span class="os-tul">ember személyéhez kapcsolódó</span> (élet, szabadság, tulajdon, vallás, szólás-gondolat-vélemény); <span class="os-tul">tartózkodás</span> (gyülekezés, egyesülés); <span class="os-tul">politikai részvétel</span> (választójog, népszavazás, közhivatal-viselés); <span class="os-tul">eljárási jogok</span> (ártatlanság vélelme, büntető eljárás)</li><li><span class="os-kulcs">2. generációs (XX. sz. eleje, szakszervezeti, szoc.dem. mozgalmak)</span>: <span class="os-tul">gazdasági</span> (munka, pihenés, szakszervezet); <span class="os-tul">szociális</span> (egészségügy, lakhatás, gyermek-, anya-, idős-védelem); <span class="os-tul">kulturális</span> (tanulás, tanítás, tudomány, művészet)</li><li><span class="os-kulcs">3. generációs (XX. sz. vég, globális kihívások)</span>: <span class="os-tul">információ</span>, önrendelkezés; <span class="os-tul">egészséges környezet</span>; <span class="os-tul">csoportjogok</span> (beteg, fogyatékos, menekült, nemzetiség); <span class="os-tul">nem valódi jogok</span> (pl. béke)</li></ol></div><div class="os-szek"><div class="os-szek-cim">Tárgyuk szerint — 6 csoport (Alaptörvény-cikkekkel)</div><ol class="os-szam"><li><span class="os-kulcs">Jogi státuszt megalapozó jogok</span>: élethez (II. cikk), méltósághoz és tilalmak (II., III. cikk), jogalanyiság (XV. cikk [1])</li><li><span class="os-kulcs">Identitást védő jogok</span>: megkülönböztetés tilalma (XV. cikk [2]), lelkiismereti-vallásszabadság (VII. cikk), állampolgárság (G) cikk), testi épség (IV. cikk)</li><li><span class="os-kulcs">Személyes szabadság biztosítékai</span>: büntetőjogi alapelvek — <span class="os-tul">nullum crimen sine lege, nulla poena sine lege</span> (XXVIII. cikk [4]), <span class="os-tul">ne bis in idem</span> (XXVIII. cikk [6]); ártatlanság vélelme (XXVIII. cikk [2]); védelemhez való jog (XXVIII. cikk [3]); tisztességes eljárás (XXVIII. cikk); mozgásszabadság (XXVII. cikk); magánélet (VI. cikk [1]); információs önrendelkezés (VI. cikk [2]); levéltitok, magánlakás (VI. cikk [1])</li><li><span class="os-kulcs">Politikai szabadságjogok</span>: véleménynyilvánítás (IX. cikk), információszabadság (VI. cikk [2]), sajtó (IX. cikk), gyülekezés (VIII. cikk [1]), egyesülés (VIII. cikk [2]–[4])</li><li><span class="os-kulcs">Politikai részvételi jogok</span>: választójog (XXIII. cikk [1]–[6]), népszavazás (XXIII. cikk [7]), petíciós jog (XXV. cikk), közhivatal-viselés (XXIII. cikk [8])</li><li><span class="os-kulcs">Társadalmi pozíciót meghatározó jogok</span>: tulajdon, öröklés (XIII. cikk), szerződési szabadság, munka-foglalkozás megválasztása (XII. cikk), vállalkozás (XII. cikk), család és házasság (L) cikk), tanulás (XI. cikk [2]), nemzetiségek (XXIX. cikk)</li></ol></div><div class="os-megj">💡 Az alapjogi hierarchia csúcsán az ember jogi státuszát meghatározó jogok (élet, méltóság, jogalanyiság) állnak — minden más alapjog ezeket követi.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/3.</div><div class="os-tetel-cim">Az állam kötelezettségei az alapjogok biztosításával összefüggésben</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Kötelezettek köre</div><ul class="os-lista"><li><span class="os-kulcs">Alapjogok címzettje elsősorban az állam</span> — de mindenkinek tiszteletben kell tartania</li><li>„Állam" alatt: <span class="os-kulcs">valamennyi állami és önkormányzati szerv</span></li><li><span class="os-kulcs">Az ember sérthetetlen és elidegeníthetetlen</span> alapvető jogait tiszteletben kell tartani — védelmük az állam <span class="os-tul">elsőrendű kötelezettsége</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Az állam kettős kötelezettsége</div><div class="os-grid"><div><div class="alcim">Tartózkodási</div><span class="os-kulcs">Ne sértse meg</span> az alapjogokat</div><div><div class="alcim">Cselekvési</div>Állami cselekvést is meghatároz — <span class="os-kulcs">alapjogvédelmi</span> és <span class="os-kulcs">jogalkotási</span> feladat</div></div></div><div class="os-szek"><div class="os-szek-cim">Konkrét feladatok</div><ul class="os-lista"><li>Tartózkodni a jog gyakorlásának akadályozásától, megzavarásától</li><li><span class="os-kulcs">Jogalkotás</span> — szabályozási kötelezettség</li><li><span class="os-kulcs">Konkrét jogalkalmazás</span> — esetenként</li><li><span class="os-kulcs">Alapjogvédelmi szervek</span> védelme: <span class="os-tul">Alkotmánybíróság, bíróságok, ombudsmanok</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Az objektív intézményvédelmi kötelezettség</div><ul class="os-lista"><li><span class="os-kulcs">Szubjektív oldal</span>: alanyi jogi jogosultság (a jog gyakorlásának lehetősége)</li><li><span class="os-kulcs">Objektív oldal</span>: állami kötelezettségek</li><li>Az állam köteles <span class="os-tul">szabályozni, intézményrendszert létrehozni, támogatni</span> azt</li><li>Forrás: <span class="os-kulcs">Alaptörvény I. cikk (1) bekezdés</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Az intézményvédelem összetett követelménye</div><ul class="os-lista"><li><span class="os-kulcs">Szabályozási kötelezettség</span> (szervezeti és eljárási biztosítékok)</li><li><span class="os-kulcs">Anyagi támogatási kötelezettség</span> adott esetben</li><li><span class="os-kulcs">Intézményes formák védelme</span> — alapjog-érvényesülés szempontjából</li><li>Tartózkodás a működés tartalmi befolyásolásától</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/4.</div><div class="os-tetel-cim">A házasság és a család alkotmányjogi fogalma</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A házasság (Alaptörvény L) cikk)</div><ul class="os-lista"><li><span class="os-kulcs">Férfi és nő között</span>, önkéntes elhatározás alapján létrejött <span class="os-tul">életközösség</span></li><li><span class="os-kulcs">Életközösség</span> — természetes személyek kapcsolata</li><li><span class="os-kulcs">Közösség</span> — a társadalom legalapvetőbb és legtermészetesebb közössége</li><li><span class="os-kulcs">Jogkérdés</span> — magánjogi és közjogi hatások fűződnek hozzá</li><li>Létrejön: a felek <span class="os-kulcs">egybehangzó és feltétlen nyilatkozata</span> alapján</li><li><span class="os-kulcs">Két személy kapcsolata</span> — az Alaptörvény kizárja a <span class="os-tul">poligámiát</span></li><li>Csak <span class="os-kulcs">különnemű személyek</span> között (Alaptörvény szövegszerűen)</li></ul></div><div class="os-szek"><div class="os-szek-cim">A család (Alaptörvény L) cikk második fordulata)</div><ul class="os-lista"><li><span class="os-kulcs">„Magyarország védi a családot mint a nemzet fennmaradásának alapját"</span></li><li>Családi kapcsolat alapja: <span class="os-kulcs">házasság</span> vagy <span class="os-kulcs">szülő-gyermek viszony</span></li><li><span class="os-kulcs">Szabad akaraton alapuló életközösség</span>, <span class="os-tul">legalább két tag</span>, tényleges kapcsolat-kötődés-függőség</li><li>A viszonyrendszerben <span class="os-kulcs">minden félnek meghatározott jogai és kötelezettségei vannak</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Tartási kötelezettség (Alaptörvény XVI. cikk [3]-[4])</div><ul class="os-lista"><li><span class="os-kulcs">Szülők</span> kötelesek kiskorú gyermekükről gondoskodni</li><li><span class="os-kulcs">Nagykorú gyermekek</span> kötelesek rászoruló szüleikről gondoskodni</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/5.</div><div class="os-tetel-cim">A diszkriminációtilalom és az esélyegyenlőség konfliktusa</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Kiindulópont</div><ul class="os-lista"><li><span class="os-kulcs">64/1991. (XII. 17.) AB határozat</span>: <span class="os-tul">minden ember jogállását tekintve egyenlő</span> lett</li><li>A jogképesség kizárja a rabszolgaságot és a rendi különbségeket</li><li>Alaptörvény: egyszerre deklarálja a <span class="os-kulcs">törvény előtti egyenlőséget</span> és tiltja a <span class="os-kulcs">hátrányos megkülönböztetést</span></li><li><span class="os-kulcs">Alaptörvény XV. cikk (2) bekezdés</span>: alapvető jogokat <span class="os-tul">bármely megkülönböztetés nélkül</span> kell biztosítani</li></ul></div><div class="os-szek"><div class="os-szek-cim">Védett tulajdonságok (példálózó felsorolás)</div><ul class="os-lista"><li><span class="os-kulcs">faj, szín, nem, fogyatékosság, nyelv, vallás</span></li><li><span class="os-kulcs">politikai vagy más vélemény</span></li><li><span class="os-kulcs">nemzeti vagy társadalmi származás</span></li><li><span class="os-kulcs">vagyoni, születési vagy egyéb helyzet</span></li><li>„egyéb helyzet" — a klauzula <span class="os-tul">nyitott</span>, bármely megkülönböztetést tilalmaz</li></ul></div><div class="os-szek"><div class="os-szek-cim">A diszkrimináció típusai</div><div class="os-grid"><div><div class="alcim">Pozitív diszkrimináció</div><span class="os-kulcs">„senkinek nem jár, de valakinek mégis"</span></div><div><div class="alcim">Negatív diszkrimináció</div><span class="os-kulcs">„mindenkinek jár, de valakinek mégse"</span></div><div><div class="alcim">Közvetlen</div>A személyt valós/vélt <span class="os-kulcs">védett tulajdonsága miatt ér hátrány</span></div><div><div class="alcim">Közvetett</div>Látszólag egyenlő bánásmódot biztosító rendelkezés, amely védett tulajdonságúakat <span class="os-kulcs">lényegesen nagyobb arányban</span> hátrányosabb helyzetbe hoz</div></div></div><div class="os-szek"><div class="os-szek-cim">Alanyi és kötelezetti kör</div><ul class="os-lista"><li><span class="os-kulcs">Alanyi kör teljes</span> — természetes és jogi személyeket is megilleti</li><li><span class="os-kulcs">Kötelezett</span>: elsősorban — de nem kizárólag — az állam</li></ul></div><div class="os-megj">💡 A pozitív diszkrimináció egyik esete a <span class="os-kulcs">kvóta-esélyegyenlőség</span>: a hátrányban lévő csoportot úgy részesítik előnyben, hogy jogszabály kötelezően előírja alulreprezentáltságuk csökkentését.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/6.</div><div class="os-tetel-cim">Az Országgyűlés működése; törvényjavaslatok tárgyalása</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az Országgyűlés ülései</div><ul class="os-lista"><li><span class="os-kulcs">Plenáris ülés</span> — működésének általános formája, a <span class="os-tul">legmagasabb szintű döntéshozó szerv</span></li><li><span class="os-kulcs">Két rendes ülésszak</span>: <span class="os-tul">február 1. — június 15.</span> és <span class="os-tul">szeptember 1. — december 15.</span></li><li><span class="os-kulcs">Rendkívüli ülésszak/ülés</span> — köztárs. elnök, Kormány, vagy a képviselők <span class="os-tul">egyötödének</span> írásbeli kérelmére</li><li>Tárgyalások <span class="os-kulcs">nyilvánosak</span> — de zárt ülés is tartható</li><li><span class="os-kulcs">Köztársasági elnök</span> az ülést egy ülésszak alatt <span class="os-tul">egy alkalommal, legfeljebb 30 napra</span> elnapolhatja</li><li>A <span class="os-kulcs">Házelnök</span> a képviselők egyötödének kérelmére az elnapolt Ogyt <span class="os-tul">8 napon belüli időpontra</span> köteles összehívni</li></ul></div><div class="os-szek"><div class="os-szek-cim">A törvényjavaslatok tárgyalása</div><ol class="os-szam"><li><span class="os-kulcs">Általános vita</span> — a javaslat egészének vagy egyes részeinek szükségessége és szabályozási elveinek megvitatása (<span class="os-tul">plenáris ülés</span> feladata)</li><li><span class="os-kulcs">Részletes vita</span> — az <span class="os-tul">illetékes bizottság</span> folytatja le (módosító javaslatok megvitatása)</li><li><span class="os-kulcs">Törvényalkotási bizottság</span> — értékeli a részletes vitát lezáró bizottsági módosító javaslatokat, állást foglal</li><li><span class="os-kulcs">Összegző jelentés</span> és összegző módosító javaslat előterjesztése</li><li><span class="os-kulcs">Zárószavazás</span> — az összegző módosító javaslat elfogadása esetén, az egységes javaslat egészéről</li></ol></div><div class="os-szek"><div class="os-szek-cim">További szabályok</div><ul class="os-lista"><li>Az ülésein elhangzottakról <span class="os-kulcs">szó szerinti jegyzőkönyv</span> készül</li><li>A jegyzőkönyv <span class="os-tul">bárki számára hozzáférhető</span> (Ogy honlap, Országgyűlési Könyvtár)</li><li>Az Ogy ülésein részt vehet és felszólalhat: <span class="os-kulcs">K.eln., Korm. tagja, AB elnöke, Kúria elnöke, legfőbb ügyész, ombudsman, ÁSZ elnöke</span></li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/7.</div><div class="os-tetel-cim">A köztársasági elnök feladat- és hatáskörei; ellenjegyzés</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az ellenjegyzés intézménye</div><ul class="os-lista"><li>Az államfő aktusainak <span class="os-kulcs">döntő többsége a végrehajtó hatalom ellenjegyzéséhez kötött</span></li><li><span class="os-kulcs">Ellenjegyzők</span>: <span class="os-tul">miniszterelnök</span> és <span class="os-tul">miniszter</span></li><li>Az ellenjegyzés az aktusok <span class="os-kulcs">érvényességi kelléke</span></li><li>A végrehajtó hatalom <span class="os-kulcs">átvállalja a politikai felelősséget</span> és biztosítja a végrehajtó hatalom <span class="os-tul">cselekvési egységét</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Ellenjegyzést NEM igénylő hatáskörök</div><ul class="os-lista"><li>Képviseli a magyar államot</li><li>Kitűzi az <span class="os-kulcs">országgyűlési, helyi önkormányzati, EP-választás</span> és az országos népszavazás időpontját</li><li>Részt vehet és felszólalhat az Ogy és bizottsági üléseken</li><li><span class="os-kulcs">Törvényt</span> és <span class="os-kulcs">országos népszavazást kezdeményezhet</span></li><li><span class="os-kulcs">Különleges jogrendet érintő döntéseket</span> hozhat</li><li>Összehívja az Ogy <span class="os-kulcs">alakuló ülését</span></li><li><span class="os-kulcs">Feloszlathatja az Országgyűlést</span></li><li>Elfogadott törvényt: <span class="os-kulcs">AB-hez küldhet</span> alkotmányossági vizsgálatra vagy <span class="os-kulcs">visszaküldhet az Ogynek</span> megfontolásra</li><li><span class="os-kulcs">Javaslatot tesz</span> a miniszterelnök, Kúria elnöke, OBH elnöke, legfőbb ügyész, ombudsman személyére</li><li><span class="os-kulcs">Kinevezi a hivatásos bírákat</span> és a Költségvetési Tanács elnökét</li><li>Megerősíti tisztségében az MTA és MMA elnökét</li><li>Kialakítja és szabályozza hivatali szervezetét</li></ul></div><div class="os-szek"><div class="os-szek-cim">Ellenjegyzéshez KÖTÖTT hatáskörök</div><ul class="os-lista"><li>Az Ogy felhatalmazása alapján elismeri a <span class="os-kulcs">nemzetközi szerződések kötelező hatályát</span>; szerződéseket köt</li><li><span class="os-kulcs">Megbízza és fogadja a nagyköveteket és követeket</span></li><li><span class="os-kulcs">Kinevezi a minisztereket</span></li><li>Kinevezi az <span class="os-kulcs">MNB elnökét és alelnökeit</span>, egyetemi tanárokat, megbízza az egyetemek rektorait, <span class="os-kulcs">tábornokokat</span> kinevez és előléptet, <span class="os-kulcs">önálló szabályozó szerv vezetőjét</span> kinevezi</li><li><span class="os-kulcs">Címeket, kitüntetéseket</span> adományoz; külföldi kitüntetések viselését engedélyezi</li><li><span class="os-kulcs">Egyéni kegyelmezés joga</span> (büntető vagy mentesítési)</li><li><span class="os-kulcs">Területszervezési ügyek</span> a feladatkörében</li><li><span class="os-kulcs">Állampolgársági ügyek</span> (megszerzés, megszűnés)</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/8.</div><div class="os-tetel-cim">Köztársasági elnöki és miniszterelnöki tisztség megszűnése</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Köztársasági elnök megbízatásának megszűnése</div><ul class="os-lista"><li><span class="os-kulcs">Megbízatás idejének lejárta</span> (5 év)</li><li><span class="os-kulcs">Halál</span></li><li><span class="os-kulcs">Lemondás</span></li><li>90 napot meghaladó <span class="os-kulcs">akadályoztatás</span></li><li>A <span class="os-kulcs">választási feltételek</span> már nem állnak fenn</li><li><span class="os-kulcs">Összeférhetetlenség</span> kimondása — Ogy 2/3-a határoz (más állami, társadalmi, gazdasági és politikai tisztséggel összeegyezhetetlen)</li><li><span class="os-kulcs">Tisztségtől való megfosztás</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Új elnök megválasztásának szabályai</div><ul class="os-lista"><li><span class="os-kulcs">Megbízatás lejárta</span> esetén: <span class="os-tul">30-60 nappal a lejárat előtt</span> meg kell választani az új elnököt</li><li><span class="os-kulcs">Idő előtti megszűnés</span> esetén: <span class="os-tul">30 napon belül</span> kell választást tartani, az új elnök az eredmény kihirdetését követő <span class="os-tul">8. napon</span> lép hivatalba</li><li>Hivatalba lépésig az <span class="os-kulcs">Ogy elnöke</span> gyakorolja a köztársasági elnöki jogkört</li></ul></div><div class="os-szek"><div class="os-szek-cim">Miniszterelnöki tisztség megszűnése</div><ul class="os-lista"><li><span class="os-kulcs">Újonnan megválasztott Ogy megalakulása</span> (egy parlamenti ciklusra szól)</li><li><span class="os-kulcs">Miniszterelnök vagy Kormány lemondása</span> — köztárs. elnök útján, Ogy elnökéhez intézett írásbeli nyilatkozat (elfogadó nyilatkozat nem szükséges)</li><li><span class="os-kulcs">Halál</span></li><li><span class="os-kulcs">Megválasztási feltételek hiánya</span> — Ogy 2/3-a határoz</li><li><span class="os-kulcs">Összeférhetetlenség</span> kimondása — Ogy 2/3-a</li><li><span class="os-kulcs">Konstruktív bizalmatlansági indítvány</span> — képviselők 1/5-e írásban benyújtja, a miniszterelnöki tisztségre jelölt személy megjelölésével</li><li><span class="os-kulcs">Bizalmi szavazás</span> — ha a képviselők több mint fele nem támogatja</li></ul></div><div class="os-szek"><div class="os-szek-cim">Ügyvezető miniszterelnök</div><ul class="os-lista"><li><span class="os-kulcs">Új Ogy megalakulása</span> vagy <span class="os-kulcs">lemondás</span> esetén: a miniszterelnök <span class="os-tul">ügyvezető miniszterelnökként</span> folytat</li><li>Feladata: a <span class="os-kulcs">kormányzati ügyek folyamatos vitelének biztosítása</span></li><li><span class="os-kulcs">Nem köthet nemzetközi szerződést</span></li><li><span class="os-kulcs">Rendeletet csak törvényi felhatalmazás alapján, halaszthatatlan esetben</span> alkothat</li><li>Más megszűnési esetben (halál, összeférhetetlenség stb.) a <span class="os-kulcs">miniszterelnök-helyettes</span> gyakorolja a hatáskört</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/9.</div><div class="os-tetel-cim">„Miniszterelnöki kormányzás"; a Kormány megalakulása és megszűnése</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A miniszterelnöki kormányzás fogalma</div><ul class="os-lista"><li><span class="os-kulcs">Német modell nyomán</span> — <span class="os-tul">kancellári típusú kormánynak</span> is nevezik</li><li>Az Alaptörvény <span class="os-kulcs">kiemeli a miniszterelnököt</span> a Kormány tagjai közül</li><li>A miniszterelnök <span class="os-kulcs">nem első az egyenlők között</span> — minisztereivel nem kollegiális testületet alkot</li><li>A <span class="os-kulcs">Kormány politikai irányvonalát a miniszterelnök határozza meg</span> — ő a tényleges stratégiai vezetője</li><li><span class="os-kulcs">A miniszterelnök tisztségének megszűnésével a Kormány megbízatása is megszűnik</span></li><li><span class="os-kulcs">A miniszter önállóan irányítja</span> az államigazgatás feladatkörébe tartozó ágazatait és az alárendelt szerveket</li></ul></div><div class="os-szek"><div class="os-szek-cim">A Kormány megalakulása</div><ol class="os-szam"><li>A Kormány <span class="os-kulcs">testületi szerv</span>: élén a miniszterelnök, tagjai a miniszterek</li><li><span class="os-kulcs">Miniszterelnököt</span> — köztársasági elnök javaslatára — az Ogy választja meg <span class="os-tul">képviselők több, mint felének</span> szavazatával (szokásjog: győztes párt jelöltje)</li><li>Ha nem választják meg: <span class="os-kulcs">15 napon belül</span> a köztárs. elnök új javaslatot tesz; az új Ogy alakuló ülésén</li><li>A miniszterelnök <span class="os-kulcs">miniszterelnök-helyettes</span>(eke)t jelöl ki a miniszterek közül</li><li><span class="os-kulcs">Minisztereket</span> a miniszterelnök javaslatára a köztárs. elnök <span class="os-tul">nevezi ki/menti fel</span></li><li>A miniszterek kinevezésével <span class="os-kulcs">alakul meg a Kormány</span></li><li>A Kormány tagjai az Ogy előtt <span class="os-kulcs">esküt tesznek</span></li></ol></div><div class="os-megj">💡 A Kormány az <span class="os-kulcs">Országgyűlésnek felelős</span>, és munkájáról <span class="os-kulcs">rendszeresen beszámolni</span> köteles.</div><div class="os-szek"><div class="os-szek-cim">A Kormány megszűnése</div><ul class="os-lista"><li><span class="os-kulcs">Új Ogy megalakulása</span></li><li><span class="os-kulcs">Miniszterelnök vagy Kormány lemondása</span></li><li><span class="os-kulcs">Miniszterelnök halála</span></li><li><span class="os-kulcs">Megválasztási feltételek hiánya</span> — Ogy 2/3-a határoz</li><li><span class="os-kulcs">Konstruktív bizalmatlansági indítvány</span> — képviselők 1/5-e, miniszterelnöki jelölt megjelölésével, <span class="os-tul">3-8 napon belül</span> döntés</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/10.</div><div class="os-tetel-cim">Az Alkotmánybíróság funkciója és hatáskörei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az Alkotmánybíróság szervezete</div><ul class="os-lista"><li>Székhelye: <span class="os-kulcs">Budapest</span></li><li><span class="os-kulcs">15 tagból álló testület</span>, tagjait <span class="os-tul">15 évre</span> választja az Ogy <span class="os-tul">2/3-os szavazattal</span></li><li><span class="os-kulcs">Újra nem választható</span></li><li>Függetlenség: <span class="os-kulcs">összeférhetetlenségi szabályok</span> és <span class="os-kulcs">mentelmi jog</span></li><li>Élén az <span class="os-kulcs">elnök</span> áll; <span class="os-kulcs">főtitkár</span> szavazati jog nélkül</li><li>Alkotmánybírákra az Ogy <span class="os-kulcs">alkotmányügyi állandó bizottsága</span> tesz javaslatot</li></ul></div><div class="os-szek"><div class="os-szek-cim">Főbb hatáskörök (II/1—II/11)</div><ol class="os-szam"><li><span class="os-kulcs">II/3 Bírói kezdeményezés</span> egyedi normakontroll iránt — <span class="os-tul">soron kívül</span> felülvizsgálja</li><li><span class="os-kulcs">II/4 Nemzetközi szerződésbe ütközés</span> vizsgálata — Ogy 1/4-e, Korm., Kúria elnöke, legfőbb ügyész, ombudsman indítványozhatja</li><li><span class="os-kulcs">II/5 Alkotmányjogi panasz</span>: <span class="os-tul">rendes</span> (jogsérelem alaptörvény-ellenes jogszabály alkalmazásával) és <span class="os-tul">valódi alkotmányjogi panasz</span> (bírói döntés ellen)</li><li><span class="os-kulcs">II/6 Népszavazási Ogy-határozat</span> vizsgálata — bárki, aki országos népszavazás kezdeményezésére jogosult; <span class="os-tul">15 napon belül</span></li><li><span class="os-kulcs">II/7 Képviselő-testület feloszlatása</span> — kormányindítvány alapján elvi vélemény</li><li><span class="os-kulcs">II/8 Köztársasági elnöki tisztségtől megfosztás</span> — <span class="os-tul">soron kívüli eljárás</span>, <span class="os-tul">2/3-os</span> döntés</li><li><span class="os-kulcs">II/9 Hatásköri összeütközés feloldása</span> — állami szervek között (bíróságok és közig. hatóságok kivételével)</li><li><span class="os-kulcs">II/10 Alaptörvény értelmezése</span> — Ogy, állandó biz., Korm., K.eln., ombudsman indítványozhatja; Magyar Közlönyben közzéteszik, <span class="os-tul">mindenkire kötelező</span></li><li><span class="os-kulcs">II/11 Egyéb hatáskörök</span> — Alaptörvény és sarkalatos törvény által, <span class="os-tul">hatásköre nyitott</span></li></ol></div><div class="os-szek"><div class="os-szek-cim">Az alkotmánybírósági eljárás</div><ul class="os-lista"><li>Eljárást <span class="os-kulcs">jogosult indítványára</span> vagy <span class="os-kulcs">hivatalból</span> folytat le</li><li>Bizonyítás: rendelkezésre álló iratok alapján; <span class="os-tul">mindenki köteles</span> adatokat szolgáltatni</li><li><span class="os-kulcs">Indokolással ellátott határozat</span> — <span class="os-tul">mindenkire kötelező</span>, zárt ülésen, szótöbbséggel</li><li>Indítvány tartalmi követelményei: alaptörvényi/törvényi rendelkezés megjelölése, indítványozói jogosultság, alkotmányjogi panasz esetén a jog sérelmének lényege</li><li><span class="os-kulcs">Illetékmentes</span> eljárás</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/11.</div><div class="os-tetel-cim">Magyarország bírósági szervezete és a bíróságok fő feladat- és hatáskörei</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A bírósági szervezet</div><ul class="os-lista"><li>Az Alaptörvény szerint a bíróságok <span class="os-kulcs">igazságszolgáltatási tevékenységet</span> látnak el</li><li>Az illetékességi terület — az ítélőtábla kivételével — a <span class="os-kulcs">közigazgatási területi beosztás</span> szerint</li><li>A bírósági szervezet <span class="os-kulcs">többszintű</span></li><li>A bíróság — ha tv. másként nem rendelkezik — <span class="os-kulcs">tanácsban ítélkezik</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A négy szint</div><ol class="os-szam"><li><span class="os-kulcs">Járásbíróságok</span> — alsó szint; elnök vezeti</li><li><span class="os-kulcs">Törvényszékek</span> — 19 vármegyei + a Fővárosi Törvényszék; első fokon és a járásbíróságok határozatai elleni fellebbezésekben másodfokon járnak el; 8 törvényszéken <span class="os-tul">közigazgatási kollégiumok</span>; egyeseken <span class="os-tul">katonai tanácsok</span></li><li><span class="os-kulcs">Ítélőtáblák</span> (5 db): <span class="os-tul">Budapest, Szeged, Pécs, Debrecen, Győr</span>; jogorvoslatot bírálnak el; a <span class="os-tul">Fővárosi Ítélőtáblán</span> elsőfokú szolgálati bíróság (bírák fegyelmi ügyei)</li><li><span class="os-kulcs">Kúria</span> — a bírói szervezet csúcsa</li></ol></div><div class="os-szek"><div class="os-szek-cim">A Kúria</div><ul class="os-lista"><li>Elnökét: bírák közül, <span class="os-kulcs">9 évre</span>, K.eln. javaslatára Ogy <span class="os-tul">2/3-os</span> szavazattal választja</li><li>Elnökhelyetteseket: K.eln. nevezi ki, Kúria elnökének javaslatára</li><li>Feladatai: jogorvoslatok elbírálása, <span class="os-kulcs">felülvizsgálati kérelmek</span></li><li><span class="os-kulcs">Jogegységi határozat</span> hozatala (kötelező a bíróságokra), <span class="os-kulcs">jogegységi panasz</span> elbírálása</li><li><span class="os-kulcs">Joggyakorlat-elemzés</span>, önkormányzati rendeletek más jogszabályba ütközéséről döntés, <span class="os-kulcs">önkormányzati jogalkotási kötelezettség elmulasztásáról</span> döntés</li></ul></div><div class="os-szek"><div class="os-szek-cim">Bírósági igazgatás</div><div class="os-grid"><div><div class="alcim">OBH (Országos Bírósági Hivatal)</div><span class="os-kulcs">Elnöke 9 évre</span> kinevezve; központi igazgatási feladatok</div><div><div class="alcim">OBT (Országos Bírói Tanács)</div><span class="os-tul">15 fő</span>: <span class="os-kulcs">Kúria elnöke + 14 bíró</span>; az <span class="os-kulcs">OBT elnökét</span> és helyettesét a tagok <span class="os-tul">3 évre</span> választják; tagokat küldöttgyűlés <span class="os-tul">6 évre</span>; OBT az OBH elnökének igazgatási tevékenységét és a bíróságok gazdálkodását ellenőrzi</div></div></div><div class="os-szek"><div class="os-szek-cim">A bírák függetlensége</div><ul class="os-lista"><li><span class="os-kulcs">Csak a törvénynek vannak alárendelve</span></li><li><span class="os-kulcs">Ítélkezési tevékenységükben nem utasíthatók</span></li><li>Tisztségükből <span class="os-kulcs">csak törvényi okból és eljárás keretében</span> lehet őket elmozdítani</li><li><span class="os-kulcs">Összeférhetetlenség</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">A bíró kinevezése</div><ul class="os-lista"><li>Pályázat alapján, pályaalkalmassági vizsgával, bírói tanács véleményével, <span class="os-kulcs">OBH elnökének javaslatára</span> a köztárs. elnök nevezi ki</li><li><span class="os-kulcs">Első kinevezés</span>: <span class="os-tul">3 évre</span></li><li><span class="os-kulcs">Ezt követően</span>: <span class="os-tul">határozatlan időre</span></li><li>Szolgálati jogviszony az <span class="os-kulcs">általános öregségi nyugdíj betöltéséig</span> (Kúria, Közig. Felsőbír., OBH elnök kivételével)</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Most már a teljes I/1—I/11 a jegyzet alapján a fejében! Ne magolja, hanem értse meg — minden évszám, minden testület funkciója egy logikai rendszerbe illeszkedik.</div></div>';
OSSZEF.h2='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 2. Hét</div><div class="os-bevez-cim">I. Modul — folytatás</div><div class="os-bevez-alcim">Ügyészség, önkormányzatok, közigazgatás · I/12—I/16.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/12.</div><div class="os-tetel-cim">Az ügyészség feladatkörei a büntető eljárás során</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">A büntető eljárásban</div><ol class="os-szam"><li><span class="os-kulcs">Nyomozási szak</span> — a nyomozási vagy előkészítő eljárás során <span class="os-tul">felügyeleti és irányítási</span> jogokat gyakorol</li><li><span class="os-kulcs">Vádemelési szak</span> — dönt a vádemelésről, vagy <span class="os-tul">elejti</span> / <span class="os-tul">elhalasztja</span> / <span class="os-tul">részben emel vádat</span></li><li><span class="os-kulcs">Tárgyalási (bírósági) szak</span> — közvádlóként képviseli a vádat</li><li><span class="os-kulcs">Másodfokú szakaszban</span> — jogorvoslattal élhet</li><li><span class="os-kulcs">Büntetés-végrehajtás</span> törvényességének felügyelete</li></ol></div><div class="os-szek"><div class="os-szek-cim">További feladatok</div><ul class="os-lista"><li>Közvád érvényesítése a bíróság előtt</li><li>Közreműködés a hatóságok jogszerű működésében</li><li><span class="os-kulcs">Magánjogi</span> és <span class="os-kulcs">közigazgatási bíróság előtti</span> fellépés a közérdek védelmében</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/13.</div><div class="os-tetel-cim">Helyi önkormányzatok autonómiájának korlátai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az önkormányzati autonómia és határai</div><ul class="os-lista"><li>Az Alaptörvény szerint Magyarországon a helyi közügyek intézése és a helyi közhatalom gyakorlása érdekében <span class="os-kulcs">helyi önkormányzatok működnek</span></li><li>A helyi önkormányzat <span class="os-kulcs">a feladat- és hatáskörébe tartozó helyi közügyekben önállóan jár el</span></li><li>Az autonómia <span class="os-tul">nem korlátlan</span> — alkotmányos és törvényi keretek között érvényesül</li></ul></div><div class="os-szek"><div class="os-szek-cim">A korlátok</div><ol class="os-szam"><li><span class="os-kulcs">Törvényi keretek</span> — az Alaptörvény és az <span class="os-tul">Mötv.</span> (Magyarország helyi önkormányzatairól szóló törvény) szabályai</li><li><span class="os-kulcs">Pénzügyi korlátok</span> — a központi költségvetés feladat- és forrásfinanszírozási rendszere</li><li><span class="os-kulcs">Stabilitási törvény</span> — adósságot keletkeztető ügyletekhez <span class="os-tul">a Kormány hozzájárulása</span> szükséges</li><li><span class="os-kulcs">Törvényességi felügyelet</span> — a fővárosi és vármegyei kormányhivatal gyakorolja</li><li><span class="os-kulcs">Alkotmánybírósági kontroll</span> — önkormányzati rendeletek alaptörvény-ellenességének vizsgálata</li><li><span class="os-kulcs">Kúria</span> — önkormányzati rendelet más jogszabályba ütközésének és önkormányzati jogalkotási kötelezettség elmulasztásának vizsgálata</li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/14.</div><div class="os-tetel-cim">A közigazgatás funkciói az igazgatás- és jogtudomány szerint</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az igazgatástudomány megközelítése</div><ul class="os-lista"><li>A közigazgatás az <span class="os-kulcs">állami tevékenység egyik fajtája</span></li><li>A közigazgatás <span class="os-tul">többfajta funkciót</span> lát el (tervezés, szervezés, vezetés, ellenőrzés)</li><li>Sajátos jellege az <span class="os-kulcs">eszközjellegben</span> és a <span class="os-kulcs">szakmaiságban</span> rejlik</li></ul></div><div class="os-szek"><div class="os-szek-cim">A jogtudomány megközelítése</div><ul class="os-lista"><li>A közigazgatás a <span class="os-kulcs">végrehajtó hatalom</span> körébe tartozik</li><li>Jogalkalmazó és — felhatalmazás alapján — <span class="os-kulcs">jogalkotó</span> tevékenységet folytat</li><li>A jog alanya és tárgya egyszerre: <span class="os-tul">közhatalmi</span> és <span class="os-tul">szolgáltató</span> funkciót lát el</li></ul></div><div class="os-szek"><div class="os-szek-cim">Két nagy alrendszer</div><div class="os-grid"><div><div class="alcim">Államigazgatás</div><span class="os-kulcs">Központi</span> (minisztériumok, autonóm szervek) és <span class="os-kulcs">területi</span> (kormányhivatalok) szervek</div><div><div class="alcim">Helyi önkormányzati igazgatás</div><span class="os-kulcs">Önkormányzati</span> szervek és apparátusuk</div></div></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/15.</div><div class="os-tetel-cim">Kormányzati főhivatal vs. fővárosi és vármegyei kormányhivatal</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Megkülönböztetés</div><div class="os-grid"><div><div class="alcim">Kormányzati főhivatal</div><span class="os-kulcs">Központi</span> államigazgatási szerv, <span class="os-tul">a Kormány alá rendelt</span>, <span class="os-kulcs">országos hatáskörrel</span>. Pl. KSH, Szellemi Tulajdon Nemzeti Hivatala, Nemzeti Adatvédelmi és Információszabadság Hatóság</div><div><div class="alcim">Fővárosi és vármegyei kormányhivatal</div><span class="os-kulcs">Területi</span> államigazgatási szerv, <span class="os-tul">1 fővárosi + 19 vármegyei</span>. Az általános államigazgatási feladatokat koncentrálja területi szinten</div></div></div><div class="os-szek"><div class="os-szek-cim">A kormányhivatal vezetése</div><ul class="os-lista"><li><span class="os-kulcs">Kormánymegbízott</span> — politikai vezető</li><li><span class="os-kulcs">Főigazgató</span> — szakmai vezető</li><li>A hivatal részlegei (osztályok, főosztályok) szakigazgatási feladatköröket egyesítenek</li></ul></div><div class="os-szek"><div class="os-szek-cim">A kormányhivatal főbb feladatkörei</div><ul class="os-lista"><li><span class="os-kulcs">Hatósági ügyek</span> — építésügy, gyámügy, népegészségügy stb.</li><li><span class="os-kulcs">Önkormányzatok törvényességi felügyelete</span></li><li><span class="os-kulcs">Koordináció</span> a területi államigazgatási szervekkel</li><li><span class="os-kulcs">Ügyfélszolgálati feladatok</span> (kormányablakok)</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">I/16.</div><div class="os-tetel-cim">A helyi önkormányzatok feladatrendszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Három feladatcsoport</div><ol class="os-szam"><li><span class="os-kulcs">Kötelező önkormányzati feladatok</span> — törvény írja elő (pl. helyi közutak, köztemetők, vízellátás, hulladékgazdálkodás, helyi közvilágítás, óvodai ellátás)</li><li><span class="os-kulcs">Önként vállalt önkormányzati feladatok</span> — a képviselő-testület döntése alapján, <span class="os-tul">nem veszélyeztetve</span> a kötelező feladatok ellátását</li><li><span class="os-kulcs">Államigazgatási feladatok</span> — törvény vagy törvényi felhatalmazás alapján a polgármester, jegyző, képviselő-testület vagy bizottság hatáskörébe utalva (pl. anyakönyvi ügyek, építéshatóság)</li></ol></div><div class="os-szek"><div class="os-szek-cim">Az önkormányzat szervei</div><ul class="os-lista"><li><span class="os-kulcs">Képviselő-testület</span> — legfőbb döntéshozó szerv</li><li><span class="os-kulcs">Polgármester</span> — testület vezetője, közvetlenül választott</li><li><span class="os-kulcs">Alpolgármester</span> — testület tagjai közül választott</li><li><span class="os-kulcs">Bizottságok</span> — szakterületi munka</li><li><span class="os-kulcs">Jegyző</span> — a hivatal vezetője, szakmai apparátus élén</li><li><span class="os-kulcs">Polgármesteri / közös önkormányzati hivatal</span> — végrehajtási apparátus</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Az I. modul mind a 16 tétele a fejében! Próbálja meg fejből végigmondani őket — csak akkor lapozzon a jegyzethez, ha valahol megakad.</div></div>';
OSSZEF.h3='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 3. Hét</div><div class="os-bevez-cim">I. Modul — Teljes áttekintés</div><div class="os-bevez-alcim">Mind a 16 tétel egy oldalon</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">▣</div><div class="os-tetel-cim">A 16 tétel kulcsfogalmai</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Alkotmányos alapok (I/1—I/5)</div><ul class="os-lista"><li><span class="os-kulcs">I/1</span> Alkotmányfejlődés <span class="os-tul">1848-tól 2010-ig</span>: 1848. ápr. → kiegyezés → 1944.12.21. Ideiglenes Nemzetgyűlés → 1946:I.tv. → 1949:XX.tv. → 1989:XXXI.tv. → 1990.06.19.</li><li><span class="os-kulcs">I/2</span> Alapjogok <span class="os-tul">3 generációja</span> (időrend) + <span class="os-tul">6 tárgyi csoport</span> (Alaptörvény-cikkekkel)</li><li><span class="os-kulcs">I/3</span> Állami kötelezettségek: <span class="os-tul">tartózkodási + cselekvési</span> (alapjogvédelmi, jogalkotási, intézményvédelmi)</li><li><span class="os-kulcs">I/4</span> Házasság = férfi és nő közötti, önkéntes (L) cikk); család = házasság vagy szülő-gyermek; nemzet fennmaradásának alapja</li><li><span class="os-kulcs">I/5</span> Diszkriminációtilalom: <span class="os-tul">közvetlen + közvetett</span>; pozitív és negatív; <span class="os-tul">kvóta-esélyegyenlőség</span> (64/1991. AB hat.)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Az államhatalmi szervek (I/6—I/9)</div><ul class="os-lista"><li><span class="os-kulcs">I/6</span> Ogy működése: 2 rendes ülésszak (febr. 1.–jún. 15., szept. 1.–dec. 15.); törvényjavaslat útja: ált. vita → részletes vita → törvényalkotási biz. → összegző jelentés → zárószavazás</li><li><span class="os-kulcs">I/7</span> K.eln. hatáskörei: <span class="os-tul">ellenjegyzéshez NEM kötött</span> (képviselet, kitűzés, kegyelem, kinevezések, K.eln. javaslatok) + <span class="os-tul">ellenjegyzéshez KÖTÖTT</span> (nemzetk. szerz., miniszterek, MNB-elnök, tábornokok)</li><li><span class="os-kulcs">I/8</span> Tisztség megszűnés: K.eln. (lejár, halál, lemond, 90 napon túli akadály, megfoszt) · Mineln. (új Ogy, lemond, halál, bizalmatlanság, bizalmi szavazás) · ügyvezető Mineln.</li><li><span class="os-kulcs">I/9</span> Miniszterelnöki kormányzás (kancellári típus): mineln. határozza meg a politikát · Kormány megalakulása 5 lépésben (K.eln. jav. → Ogy választ → kinevezés → miniszterek kinevezése → eskütétel)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Alkotmányvédelem és igazságszolgáltatás (I/10—I/12)</div><ul class="os-lista"><li><span class="os-kulcs">I/10</span> AB: <span class="os-tul">15 fő, 15 évre, 2/3-os Ogy-szavazás, nem újra</span>; II/3–II/11 hatáskörök: bírói kezdeményezés, nemzetk. szerz., alkotmányjogi panasz (rendes + valódi), népszav., feloszlatás, megfosztás, hatásköri vita, Alaptörvény értelmezése</li><li><span class="os-kulcs">I/11</span> Bíróságok 4 szint: járás → <span class="os-tul">19+1 törvényszék</span> → <span class="os-tul">5 ítélőtábla (Bp., Szeged, Pécs, Debrecen, Győr)</span> → Kúria · OBH elnök 9 évre · OBT 15 fő (Kúria elnöke + 14 bíró) · első bírói kinevezés 3 évre</li><li><span class="os-kulcs">I/12</span> Ügyészség: nyomozásfelügyelet, vádemelés (vagy elejtés), közvádló a tárgyaláson, BV-felügyelet</li></ul></div><div class="os-szek"><div class="os-szek-cim">Helyi önkormányzatok és közigazgatás (I/13—I/16)</div><ul class="os-lista"><li><span class="os-kulcs">I/13</span> Önkorm. autonómia korlátai: Alaptörvény/Mötv., pénzügyi (Stabilitási tv.), törvényességi felügyelet (korm.hiv.), AB- és Kúria-kontroll</li><li><span class="os-kulcs">I/14</span> Közigazgatás funkciói: igazgatástud. (eszköz, többféle funkció) vs. jogtud. (végrehajtó hatalom) · 2 alrendszer: államig. + önkorm.</li><li><span class="os-kulcs">I/15</span> Kormányzati főhivatal (országos) vs. korm.hivatal (1+19 területi, kormánymegbízott)</li><li><span class="os-kulcs">I/16</span> Önkorm. feladatok: kötelező + önként vállalt + államig. átruházott</li></ul></div></div></article><div class="os-tanacs"><div class="os-tanacs-cim">Szombati ismétlési tanács</div><div class="os-tanacs-szov">Ez a sűrített áttekintő egy-két olvasásra <em>5 perces</em> ismétlés. A vizsgán 1-2 mondatban tudni kell, mi minden tartozik egy-egy tételhez.</div></div>';
OSSZEF.h4='<div class="os-bevez"><div class="os-bevez-katlb">Szombati Ismétlés · 4. Hét</div><div class="os-bevez-cim">II. Modul — kezdés</div><div class="os-bevez-alcim">Jogalkotás és jogalkalmazás · II/1—II/9.</div></div><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/1.</div><div class="os-tetel-cim">Társadalmi norma és jogi norma jellemzői</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Társadalmi normák általános sajátosságai</div><ul class="os-lista"><li><span class="os-kulcs">Magatartásminta</span> — befolyásolják az emberek viselkedését</li><li><span class="os-kulcs">Tartós időbeli érvényesség</span> — ismétlődő helyzetben ismétlődő magatartás</li><li><span class="os-kulcs">Általánosság</span> — általánosan megfogalmazott és követendő előírások</li><li><span class="os-kulcs">Szankció</span> — a normasértésre kilátásba helyezett hátrányos következmény</li></ul></div><div class="os-szek"><div class="os-szek-cim">A jogi normák csak rájuk jellemző sajátosságai</div><ul class="os-lista"><li>Az <span class="os-kulcs">állam megjelenésével</span> jöhettek létre</li><li>Csak <span class="os-kulcs">jogalkotási hatáskörrel felruházott állami szervek</span> alkothatják</li><li>Szigorúan meghatározott <span class="os-kulcs">eljárási rendben</span> jönnek létre — ez az érvényesség feltétele</li><li>A <span class="os-kulcs">társadalom minden tagja számára kötelezőek</span></li><li>Érvényesülésüket végső soron <span class="os-kulcs">az állam kényszerítő ereje</span> biztosítja</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/2.</div><div class="os-tetel-cim">Magyarország belső jogforrási rendszere</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Belső és külső jogforrás</div><div class="os-grid"><div><div class="alcim">Belső (anyagi)</div><span class="os-kulcs">A normát létrehozó jogalkotó szerv</span> (pl. Ogy, Korm., MNB-elnök, miniszter, önálló szabályozó szerv vezetője, önkorm. képviselő-testület)</div><div><div class="alcim">Külső (alaki)</div><span class="os-kulcs">Az alkotott norma megjelenési formája</span></div></div></div><div class="os-szek"><div class="os-szek-cim">A magyar jogrendszer 3 jogrend forrásaiból épül fel</div><ul class="os-lista"><li><span class="os-kulcs">Hazai (belső, magyar) jog</span></li><li><span class="os-kulcs">Nemzetközi jog</span> — transzformációval beépül</li><li><span class="os-kulcs">Európai Unió jogrendje</span> — másodlagos jogforrásai a hazai jog fölött állnak</li></ul></div><div class="os-szek"><div class="os-szek-cim">Jogforrási vs. jogszabályi hierarchia</div><div class="os-grid"><div><div class="alcim">Jogforrási hierarchia</div>Adott állam <span class="os-kulcs">összes jogforrásának</span> egymáshoz való viszonya</div><div><div class="alcim">Jogszabályi hierarchia</div>Csak a jogalkotó szervek által alkotott <span class="os-kulcs">jogszabályok közötti</span> viszony</div></div></div><div class="os-szek"><div class="os-szek-cim">A magyar jogszabályi hierarchia</div><ol class="os-szam"><li><span class="os-kulcs">Alaptörvény</span> — a jogrendszer alapja, önálló, sajátos jogforrás</li><li><span class="os-kulcs">Törvények</span></li><li><span class="os-kulcs">Kormány rendelete, MNB elnökének rendelete</span></li><li><span class="os-kulcs">Kormány tagjainak rendelete</span> (miniszterelnöki, miniszteri)</li><li><span class="os-kulcs">Önálló szabályozó szerv vezetőjének rendeletei</span></li><li><span class="os-kulcs">Helyi önkormányzat rendelete</span></li></ol></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/3.</div><div class="os-tetel-cim">Rendeletalkotás főbb szabályai békeidőben</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Rendeletek fajtái</div><div class="os-grid"><div><div class="alcim">Autonóm (primer)</div><span class="os-kulcs">Eredeti jogalkotói hatáskörben</span> — legmagasabb szinten szabályozza, törvény arról nem rendelkezik</div><div><div class="alcim">Végrehajtási (szekunder)</div><span class="os-kulcs">Felhatalmazáson alapul</span> — törvény végrehajtására · <span class="os-tul">szubdelegálás tilalma</span></div></div></div><div class="os-szek"><div class="os-szek-cim">Központi rendeletek</div><ul class="os-lista"><li><span class="os-kulcs">Kormányrendelet</span> — autonóm vagy végrehajtási; <span class="os-tul">tv-nyel nem lehet ellentétes</span>; miniszterelnök írja alá; Magyar Közlönyben kihirdetve</li><li><span class="os-kulcs">MNB elnökének rendelete</span> — <span class="os-tul">egyenrangú a Korm. rendelettel</span></li><li><span class="os-kulcs">Miniszterelnöki és miniszteri rendelet</span> — csak <span class="os-tul">végrehajtási rendelet</span> lehet, mindig külön felhatalmazás kell; egyformán helyezkednek el a jogforrási rendszerben</li><li><span class="os-kulcs">Önálló szabályozó szerv vezetőjének rendelete</span> — törvényi felhatalmazás alapján, sarkalatos tv. feladatkörében. Pl. <span class="os-tul">NMHH, MEKH, SZTFH, OAH</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Helyi rendeletek</div><ul class="os-lista"><li><span class="os-kulcs">Helyi önkormányzati rendelet</span> — törvény keretei között, helyi közügyek intézése körében</li><li>Törvény által nem szabályozott helyi társ. viszonyok rendezésére, vagy törvényi felhatalmazás alapján</li><li>Nem lehet ellentétes magasabb szintű jogszabállyal és a Kúria önkormányzati határozataira figyelemmel</li><li><span class="os-kulcs">Polgármester és jegyző</span> írja alá; kihirdetést követően felülvizsgálat céljából haladéktalanul megküldik a kormányhivatalnak</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/4.</div><div class="os-tetel-cim">A jogalkotás szakaszainak lényegi tartalma</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">1. Előkészítés — tervezés</div><ul class="os-lista"><li><span class="os-kulcs">Minisztériumok</span>: évente munkatervet készítenek</li><li><span class="os-kulcs">Kormány</span>: félévente jogalkotási tervet készít (havi ütemezésű munkaterv), határozattal állapítja meg</li><li><span class="os-kulcs">Miniszterelnök</span> készíti elő (Miniszterelnöki Kormányiroda közigazgatási államtitkára útján)</li><li>A <span class="os-kulcs">jogalkotási tájékoztatóban</span> közzétételre kerül</li></ul></div><div class="os-szek"><div class="os-szek-cim">1. Előkészítés — társadalmi egyeztetés</div><div class="os-grid"><div><div class="alcim">Általános egyeztetés</div><span class="os-kulcs">Honlapon</span> közzététel · elektronikus levélcímen <span class="os-kulcs">bárki</span> véleményt nyilváníthat · visszaigazolás · elutasított vélemények indokairól tipizált összefoglaló</div><div><div class="alcim">Közvetlen egyeztetés</div><span class="os-kulcs">Stratégiai partnerségi megállapodások</span> a kölcsönös együttműködésre kész, széles érdekű vagy tudományos szervezetekkel</div></div></div><div class="os-szek"><div class="os-szek-cim">1. Előkészítés — Kormány döntéseinek előkészítése</div><ul class="os-lista"><li><span class="os-kulcs">Közigazgatási Államtitkári Értekezlet (KÁT)</span> — minden előterjesztést előzetesen megtárgyal</li><li><span class="os-kulcs">Fejlesztéspolitikai Koordinációs Bizottság (FKB)</span></li><li><span class="os-kulcs">Alkotmányossági Előkészítő Munkacsoport</span> (igazságügyi miniszter vezeti)</li><li><span class="os-kulcs">Kormányzati Költségvetési Előkészítő Munkacsoport</span> (pénzügyminiszter vezeti)</li><li><span class="os-kulcs">Kormány ülése</span> — előterjesztés/jelentés megtárgyalása, döntés (rendelet, határozat, irányelv, elvi állásfoglalás)</li></ul></div><div class="os-szek"><div class="os-szek-cim">2. Elfogadás — jogalkotó aktusa</div><ul class="os-lista"><li><span class="os-kulcs">Törvényjavaslat benyújtói</span>: köztárs. elnök, Kormány, országgyűlési bizottság, országgyűlési képviselő</li><li><span class="os-kulcs">Általános vita</span> a plenáris ülésen</li><li><span class="os-kulcs">Részletes vita</span> a bizottságokban → bizottsági módosító javaslat</li><li><span class="os-kulcs">Törvényalkotási bizottság</span> → összegző módosító javaslat + egységes javaslat</li><li><span class="os-kulcs">Zárószavazás</span> a véglegessé vált szövegről</li></ul></div><div class="os-szek"><div class="os-szek-cim">3. Kihirdetés</div><ul class="os-lista"><li>A kihirdetés <span class="os-kulcs">elengedhetetlen érvényességi kelléke</span> a jogszabályoknak</li><li><span class="os-kulcs">Promulgáció</span> — a szöveg végleges rögzítése és kihirdetés elrendelése</li><li><span class="os-kulcs">Publikáció</span> — hivatalos formában történő hiteles nyilvánosságra hozatal</li><li>Az Ogy elnöke az elfogadást követő <span class="os-tul">5 napon belül</span> kihirdetésre megküldi a köztárs. elnöknek; a köztárs. elnök, ha aláírja, elrendeli a kihirdetését</li><li><span class="os-kulcs">Magyar Közlöny</span> — kivéve az önkormányzati rendeletek</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/5.</div><div class="os-tetel-cim">Jogszabálytervezet megszövegezésére vonatkozó követelmények</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Általános szövegezési követelmények</div><ul class="os-lista"><li><span class="os-kulcs">Pontosság</span> — egyértelmű fogalomhasználat</li><li><span class="os-kulcs">Közérthető nyelvezet</span></li><li><span class="os-kulcs">Konzisztencia</span> más jogszabályokkal</li><li><span class="os-kulcs">Logikai szerkezet</span></li><li>Útmutató segíti a szabályalkotókat (helyes és helytelen példák)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Jogszabály megjelölése</div><ul class="os-lista"><li>Cím: típus + szám / év (pl. <span class="os-tul">2011. évi CXC. törvény</span>)</li><li>Egyértelmű azonosítás</li></ul></div><div class="os-szek"><div class="os-szek-cim">Hivatkozás módja</div><ul class="os-lista"><li><span class="os-kulcs">Paragrafus</span> (§) → <span class="os-kulcs">bekezdés</span> (1) → <span class="os-kulcs">pont</span> a)</li><li>Hatálybalépés és átmeneti rendelkezések kötelezőek</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/6.</div><div class="os-tetel-cim">Ákr. megalkotásának előzményei és a hazai közig. eljárásjog fejlődése</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az Ákr. megalkotásának előzményei</div><ol class="os-szam"><li><span class="os-ev">1957. évi IV. tv.</span> — államigazgatási eljárás általános szabályai (<span class="os-kulcs">Et.</span>)</li><li><span class="os-ev">1981. évi I. tv.</span> — egységes szöveg (<span class="os-kulcs">Áe.</span>)</li><li><span class="os-ev">2004. évi CXL. tv.</span> — közigazgatási hatósági eljárás és szolgáltatás általános szabályai (<span class="os-kulcs">Ket.</span>)</li></ol></div><div class="os-szek"><div class="os-szek-cim">A Ket. és felváltása</div><ul class="os-lista"><li>A Ket. <span class="os-tul">mindent egy törvényben</span> kívánt leszabályozni — <span class="os-kulcs">„túlszabályozás" csapdája</span></li><li>Egyre több ágazati jogszabály <span class="os-tul">kikerült a Ket. hatálya alól</span> → elveszítette általános jellegét</li><li><span class="os-kulcs">Az Ákr.</span> (<span class="os-ev">2016. évi CL. tv.</span>, hatályba <span class="os-tul">2018-tól</span>) megőrizte az alapintézményeket, de <span class="os-kulcs">egyszerűbb szabályozásra</span> törekszik</li></ul></div><div class="os-szek"><div class="os-szek-cim">2014–2020 Közigazgatás- és Közszolgáltatás-fejlesztési Stratégia</div><ul class="os-lista"><li>Célja: <span class="os-kulcs">a szolgáltató állam modell</span> megvalósítása</li></ul></div><div class="os-szek"><div class="os-szek-cim">A hazai közigazgatási eljárás 3 szakasza</div><ol class="os-szam"><li><span class="os-kulcs">Alapeljárás (elsőfokú eljárás)</span> — állandó szakasz</li><li><span class="os-kulcs">Jogorvoslati szakasz</span> — lehetséges, ha kezdeményezik</li><li><span class="os-kulcs">Végrehajtási szakasz</span> — lehetséges, feltételek fennállása esetén</li></ol></div><div class="os-megj">💡 <span class="os-kulcs">Magyary Zoltán</span> szerint az eljárás fogalma: <span class="os-tul">valamely cél elérésére alkalmas cselekedetek megállapított sorrendje</span>.</div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/7.</div><div class="os-tetel-cim">Uniós és nemzetközi tendenciák a közig. eljárásjog fejlődésében</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">OECD-meghatározás</div><ul class="os-lista"><li>A közigazgatás egyszerűsítése: <span class="os-kulcs">az adminisztratív eljárásokból fakadó állami terhek csökkentése</span></li><li>A terhek főként <span class="os-tul">bürokratikus, túlzott, bonyolult, egymást átfedő folyamatokból</span> fakadnak</li><li>Az Ákr. ezért egyszerűbb szabályozásra törekszik</li></ul></div><div class="os-szek"><div class="os-szek-cim">Európa Tanács</div><ul class="os-lista"><li><span class="os-ev">2007</span> Miniszteri Bizottság: <span class="os-kulcs">„A jó közigazgatás kódexe"</span></li><li>Alapelvek: szolgáltatások nyújtása, útmutatók, ésszerű időn belüli cselekvés, szankciók a visszásságokra, megfelelés a teljesítmény, hatékonyság, társadalmi szükségletek követelményeinek</li></ul></div><div class="os-szek"><div class="os-szek-cim">Európai Unió irányadó elvei</div><ul class="os-lista"><li><span class="os-kulcs">EUMSZ 298. cikk (2) bek.</span> — nyitott, hatékony, független európai igazgatás</li><li><span class="os-kulcs">Alapjogi Charta 41. cikke</span> — megfelelő ügyintézés (nagy részben definiálatlan, joggyakorlat alakítja)</li><li><span class="os-kulcs">Helyes hivatali magatartás európai kódexe</span></li><li><span class="os-kulcs">Uniós közigazgatási eljárási kódex</span> kimunkálása (Modell Szabályok, EP 2016. rendelettervezet)</li></ul></div></div></article><article class="os-tetel"><div class="os-tetel-fej"><div class="os-tetel-kod">II/8.</div><div class="os-tetel-cim">Az Ákr. alanyi (szervi és személyi) hatálya</div></div><div class="os-tetel-body"><div class="os-szek"><div class="os-szek-cim">Az eljárás szereplői</div><ul class="os-lista"><li><span class="os-kulcs">Főszemélyek</span>: <span class="os-tul">hatóság</span> és <span class="os-tul">ügyfél</span></li><li><span class="os-kulcs">Egyéb résztvevők</span>: tanú, hatósági tanú, szakértő, tolmács, szemletárgy birtokosa, ügyfél képviselője</li><li>További közreműködők (pl. szakhatóság, rendőrség elővezetésnél)</li></ul></div><div class="os-szek"><div class="os-szek-cim">Hatóság</div><ul class="os-lista"><li>Az a szerv, szervezet vagy személy, amelyet/akit</li><li><span class="os-kulcs">törvény, kormányrendelet vagy önkormányzati rendelet</span> hatósági hatáskör gyakorlására <span class="os-tul">jogosít fel vagy jelöl ki</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Ügyfél</div><ul class="os-lista"><li>Az a természetes vagy jogi személy, egyéb szervezet, akinek (amelynek):</li><li><span class="os-kulcs">jogát vagy jogos érdekét</span> az ügy közvetlenül érinti, VAGY</li><li>akire (amelyre) nézve a <span class="os-kulcs">hatósági nyilvántartás adatot tartalmaz</span>, VAGY</li><li>akit (amelyet) <span class="os-kulcs">hatósági ellenőrzés alá vontak</span></li></ul></div><div class="os-szek"><div class="os-szek-cim">Ex lege ügyfélfogalom</div><ul class="os-lista"><li><span class="os-kulcs">Törvény vagy kormányrendelet</span> meghatározott ügyfajtában megállapíthat olyan személyeket/szervezeteket, akik/amelyek <span class="os-kulcs">a jogszabály erejénél fogva ügyfélnek minősülnek</span></li><li>Pl. építésügyi eljárásnál: az építtető és az é
