var MC={1:"#1a4a6b",2:"#2d6a4f",3:"#6b3a1a",4:"#4a1a6b",5:"#1a3a6b",0:"#444"};
var BC={1:"#2980b9",2:"#27ae60",3:"#d68910",4:"#8e44ad",5:"#1a56db",0:"#888"};
var BG={1:"#e8f4fd",2:"#e8f7ef",3:"#fdf3e8",4:"#f4e8fd",5:"#e8eeff",0:"#f0f0f0"};
var P10={1:"#2980b9",2:"#27ae60",3:"#d68910",4:"#8e44ad",5:"#1a56db",0:"#888"};
var P5={1:"#5b9ecf",2:"#52a87a",3:"#c07722",4:"#7a40a0",5:"#4b72cc",0:"#aaa"};
var TN={tanulas:"&#x1F4D6; &Uacute;j anyag",ismetles:"&#x1F504; Ism&eacute;tl&eacute;s",onellenorzes:"&#x2753; &Ouml;nellenőrz&eacute;s",vazlat:"&#x1F4DD; V&aacute;zlat",potlas:"&#x1F527; P&oacute;tl&aacute;s",piheno:"&#x1F634; Pihenő",unnep:"&#x1F389; &Uuml;nnep",vizsga:"&#x1F3C6; VIZSGA"};

// Csoportosítás hetek szerint
var hetek={};
NAPOK.forEach(function(n){if(!hetek[n.h])hetek[n.h]=[];hetek[n.h].push(n);});
var hl=Object.keys(hetek).map(Number).sort(function(a,b){return a-b;});

var nav=document.getElementById("navBar");
var fo=document.getElementById("fo");

hl.forEach(function(h){
  var btn=document.createElement("button");
  var ns=hetek[h];
  var d1=ns[0].d.split("(")[0].trim();
  var dl=ns[ns.length-1].d.split("(")[0].trim();
  btn.innerHTML=h+". h&eacute;t &bull; "+d1+"&ndash;"+dl;
  btn.id="b"+h;
  btn.onclick=function(){show(h);};
  nav.appendChild(btn);
});

function show(h){
  document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("on");});
  document.getElementById("b"+h).classList.add("on");
  fo.innerHTML="";
  var ns=hetek[h];
  
  // Heti fejléc
  var hf=document.createElement("div");
  hf.className="het-cim";
  var mset={};ns.forEach(function(n){if(n.m>0)mset[n.m]=1;});
  var ml=Object.keys(mset).map(function(m){return["","I.","II.","III.","IV.","V."][m]+" modul";}).join(" + ")||"Ism&eacute;tl&eacute;s";
  hf.innerHTML='<span class="het-badge">'+h+'. h&eacute;t</span><span>'+ns[0].d.split("(")[0].trim()+'&nbsp;&ndash;&nbsp;'+ns[ns.length-1].d.split("(")[0].trim()+'</span><span style="margin-left:auto;font-size:11px;opacity:.8">'+ml+'</span>';
  fo.appendChild(hf);

  ns.forEach(function(nap){
    var dk=MC[nap.m]||"#444";
    var bc=BC[nap.m]||"#888";
    var bg=BG[nap.m]||"#f0f0f0";
    var isSzo=nap.d.indexOf("Szo")>-1;
    var isSpec=["piheno","unnep","vizsga"].indexOf(nap.tip)>-1;
    if(isSzo){bc="#e6c014";bg="#fffbea";dk="#7a6000";}
    if(isSpec){bc="#e88";bg="#fef0f0";dk="#c0392b";}

    // Téma generálás ha nincs explicit
    var tema=nap.tema;
    if(!tema&&nap.t.length>0){
      tema=nap.t.map(function(k){return k+" &ndash; "+(T[k]?T[k].c:k);}).join(" &middot; ");
    }
    if(!tema) tema=TN[nap.tip]||"";

    // Kérdésszám
    var nk=0;
    nap.t.forEach(function(k){var te=T[k];if(te)nk+=te.k15.length+te.k10.length+te.k5.length;});

    var kart=document.createElement("div");
    kart.className="nap-kart";
    kart.style.borderColor=bc;
    kart.style.background=bg;

    var fej=document.createElement("div");
    fej.className="nap-fejlec"+(nap.t.length>0?" kattintható":"");
    var statStr=nap.t.length>0?(nap.t.length+" t&eacute;tel &middot; "+nk+" k&eacute;rd&eacute;s"):TN[nap.tip];
    fej.innerHTML='<div class="nap-datum" style="color:'+dk+'">'+nap.d+'</div>'
      +'<div class="nap-info"><div class="nap-tema" style="color:'+dk+'">'+tema+'</div>'
      +'<div class="nap-stat">'+statStr+'</div></div>'
      +(nap.t.length>0?'<div class="nap-nyil" style="color:'+bc+'">&#9660;</div>':'');

    var tart=document.createElement("div");
    tart.className="nap-tartalom";

    if(nap.t.length>0){
      fej.onclick=function(){
        var open=tart.style.display==="block";
        tart.style.display=open?"none":"block";
        var ny=fej.querySelector(".nap-nyil");
        if(ny)ny.innerHTML=open?"&#9660;":"&#9650;";
      };
      nap.t.forEach(function(k){
        var te=T[k];if(!te)return;
        var tb=document.createElement("div");
        tb.className="tetel-blokk";
        var tf=document.createElement("div");
        tf.className="tetel-cim-sor";
        tf.innerHTML='<span class="tetel-badge" style="background:'+MC[nap.m]+'">'+k+'</span><span class="tetel-cim" style="color:'+MC[nap.m]+'">'+te.c+'</span>';
        tb.appendChild(tf);
        var kl=document.createElement("div");
        kl.className="kerdes-lista";
        te.k15.forEach(function(q){
          var s=document.createElement("div");s.className="ksor k15bg";
          s.innerHTML='<span class="kbadge" style="background:'+MC[nap.m]+';color:#fff">15p</span><span class="kszoveg" style="font-weight:600">'+q+'</span>';
          kl.appendChild(s);
        });
        te.k10.forEach(function(q){
          var s=document.createElement("div");s.className="ksor";
          s.innerHTML='<span class="kbadge" style="background:'+P10[nap.m]+';color:#fff">10p</span><span class="kszoveg">'+q+'</span>';
          kl.appendChild(s);
        });
        te.k5.forEach(function(q){
          var s=document.createElement("div");s.className="ksor";
          s.innerHTML='<span class="kbadge" style="background:'+P5[nap.m]+';color:#fff">5p</span><span class="kszoveg">'+q+'</span>';
          kl.appendChild(s);
        });
        tb.appendChild(kl);
        tart.appendChild(tb);
      });
    }
    kart.appendChild(fej);kart.appendChild(tart);fo.appendChild(kart);
  });
  fo.scrollIntoView({behavior:"smooth"});
}
show(1);
</script>
